# org GitHub App 설치 토큰 발급 (DEPLOY_BOT_PAT 대체).
# 권한은 App 수준이라 토큰을 owner/repositories/permission-*로 좁혀 최소 권한을 만든다.
# reader App(앱 레포 Contents:read 전용) / writer App(homelab Contents+PR write 전용) 분리 —
# 어느 쪽 키가 유출돼도 반대편 표면에는 write가 불가능하다 (트리거 경계: 런북 app-platform).
# ⚠️ composite action은 체크아웃된 레포가 필요하다 — checkout 자체에 토큰이 필요한 워크플로
# (bump/onboard 등)는 이 action 대신 create-github-app-token을 인라인 첫 step으로 쓴다.
name: homelab-token
description: org GitHub App 설치 토큰 발급(스코프 좁힘)
inputs:
  app-id: { description: GitHub App ID, required: true }
  private-key: { description: GitHub App private key (PEM), required: true }
  owner:
    description: 토큰을 발급할 org/owner (앱 레포 read 시 ukyi-app — 미지정이면 현재 레포로 제한)
    required: false
    default: ""
  repositories:
    description: 토큰 범위 레포(쉼표/줄바꿈). 비우면 설치 전체. 앱 레포 read 시 그 레포만.
    required: false
    default: ""
  permission-contents:
    description: "read | write (앱 레포 read 토큰은 read)"
    required: false
    default: ""
  permission-pull-requests:
    description: "read | write (homelab PR 생성 시 write)"
    required: false
    default: ""
outputs:
  token: { description: 설치 액세스 토큰, value: "${{ steps.app-token.outputs.token }}" }
runs:
  using: composite
  steps:
    - id: app-token
      # full commit SHA 핀 — mutable 태그는 private key를 변조된 action에 넘길 수 있다
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}
        repositories: ${{ inputs.repositories }}
        permission-contents: ${{ inputs.permission-contents }}
        permission-pull-requests: ${{ inputs.permission-pull-requests }}
