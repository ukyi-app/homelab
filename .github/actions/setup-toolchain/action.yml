name: setup-toolchain
description: 핀된 차트/정책/시크릿 툴체인 설치 (버전 SSOT). 필요한 도구만 입력으로 켠다. 러너=ubuntu-24.04-arm(arm64).
# ⚠️ supplychain-5: 모든 다운로드는 받기→sha256sum -c→설치 패턴(TLS만 신뢰 금지 — 미러/계정 침해 시 변조 차단).
# 체크섬은 각 핀 버전 자산을 직접 받아 산출한 실 SHA256(placeholder 금지 — test_toolchain-checksums.bats가 강제).
# 버전 bump 시 Renovate가 URL을 갱신하면 SHA도 함께 갱신해야 한다(불일치 시 gate가 sha256sum 실패로 즉시 차단).

inputs:
  yq:          { description: yq v4.53.3,            default: 'false' }
  kubeconform: { description: kubeconform v0.6.7,    default: 'false' }
  helm:        { description: helm v3.21.2,          default: 'false' }
  kustomize:   { description: kustomize v5.8.1,      default: 'false' }
  conftest:    { description: conftest v0.68.2,      default: 'false' }
  bats:        { description: bats (apt),            default: 'false' }
  shellcheck:  { description: shellcheck v0.11.0,    default: 'false' }
  sops:        { description: sops v3.13.1,           default: 'false' }
  age:         { description: age v1.3.1,            default: 'false' }
  kubeseal:    { description: kubeseal v0.38.1,       default: 'false' }
  actionlint:  { description: actionlint v1.7.12,     default: 'false' }

runs:
  using: composite
  steps:
    - if: ${{ inputs.yq == 'true' }}
      shell: bash
      run: |
        # yq는 직접 바이너리 — snap yq는 strict confinement라 mktemp -d /tmp 픽스처를 못 읽는다(라이브 검증된 함정).
        f=/tmp/yq; curl -fsSL https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_arm64 -o "$f"
        echo "578648e463a11c1b6db6010cbf41eafed6bee79466fcffa1bb446672cf7945ea  $f" | sha256sum -c -
        sudo install -m 0755 "$f" /usr/local/bin/yq
    - if: ${{ inputs.kubeconform == 'true' }}
      shell: bash
      run: |
        f=/tmp/kubeconform.tgz
        curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-arm64.tar.gz -o "$f"
        echo "dc82f79bb03c5479b1ae5fd4af221e4b5a3111f62bf01a2795d9c5c20fa96644  $f" | sha256sum -c -
        sudo tar -xz -C /usr/local/bin -f "$f" kubeconform
    - if: ${{ inputs.helm == 'true' }}
      shell: bash
      run: |
        # helm 고정 버전 핀 — get-helm-3(latest)는 helm major가 chart-test를 깨면 유일 required check를 막는 시한폭탄(m6-tools >=3.16과 정합).
        f=/tmp/helm.tgz
        curl -fsSL https://get.helm.sh/helm-v3.21.2-linux-arm64.tar.gz -o "$f"
        echo "bbd559fc0547f1d96ccbc68fe4f1cb98f01808f36538139e669369066b781267  $f" | sha256sum -c -
        tar -xz -C /tmp -f "$f" && sudo mv /tmp/linux-arm64/helm /usr/local/bin/helm
    - if: ${{ inputs.kustomize == 'true' }}
      shell: bash
      run: |
        f=/tmp/kustomize.tgz
        curl -fsSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_arm64.tar.gz -o "$f"
        echo "0953ea3e476f66d6ddfcd911d750f5167b9365aa9491b2326398e289fef2c142  $f" | sha256sum -c -
        sudo tar -xz -C /usr/local/bin -f "$f" kustomize
    - if: ${{ inputs.conftest == 'true' }}
      shell: bash
      run: |
        f=/tmp/conftest.tgz
        curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_arm64.tar.gz -o "$f"
        echo "4005441089655ded475384cb87d57762ae08ebef78305bada49c70530d2f4184  $f" | sha256sum -c -
        sudo tar -xz -C /usr/local/bin -f "$f" conftest
    - if: ${{ inputs.bats == 'true' }}
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y bats
    - if: ${{ inputs.shellcheck == 'true' }}
      shell: bash
      run: |
        # shellcheck v0.11.0 핀(aarch64) — apt 버전은 러너마다 달라 SC2015 등 info 체크가 로컬과 드리프트한다.
        f=/tmp/shellcheck.tar.xz
        curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.aarch64.tar.xz -o "$f"
        echo "12b331c1d2db6b9eb13cfca64306b1b157a86eb69db83023e261eaa7e7c14588  $f" | sha256sum -c -
        tar -xJ -C /tmp -f "$f" && sudo mv /tmp/shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
    - if: ${{ inputs.sops == 'true' }}
      shell: bash
      run: |
        f=/tmp/sops; curl -fsSL https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.arm64 -o "$f"
        echo "19576fb1734dbf8fb77eda0cf0f3a2218f99bf4d33b814318e5e10d6babb9820  $f" | sha256sum -c -
        sudo install -m 0755 "$f" /usr/local/bin/sops
    - if: ${{ inputs.age == 'true' }}
      shell: bash
      run: |
        # age 버전 핀 + 체크섬 — 무핀 latest(dl.filippo.io)는 공급망/재현성 구멍(supplychain-5).
        f=/tmp/age.tgz
        curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-arm64.tar.gz -o "$f"
        echo "c6878a324421b69e3e20b00ba17c04bc5c6dab0030cfe55bf8f68fa8d9e9093a  $f" | sha256sum -c -
        tar -xz -C /tmp -f "$f" && sudo mv /tmp/age/age /tmp/age/age-keygen /usr/local/bin/
    - if: ${{ inputs.kubeseal == 'true' }}
      shell: bash
      run: |
        # kubeseal 버전 핀 — 컨트롤러 appVersion(platform/sealed-secrets app v0.38.1)과 동일해야 seal/unseal 호환.
        # 봉인 워크플로(_create-cache/_create-database)가 제각각 핀하던 v0.27.3/v0.37.0을 이 한 곳으로 수렴.
        f=/tmp/kubeseal.tgz
        curl -fsSL https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.38.1/kubeseal-0.38.1-linux-arm64.tar.gz -o "$f"
        echo "4637aac2ee095d6555242cc1ad51f13b9dfcfee7db6b0a4cf4f5a1443309d05e  $f" | sha256sum -c -
        sudo tar -xz -C /usr/local/bin -f "$f" kubeseal
    - if: ${{ inputs.actionlint == 'true' }}
      shell: bash
      run: |
        # actionlint 버전 핀 + 체크섬(rhysd/actionlint, arm64). run: 블록 shellcheck 통합 검사.
        f=/tmp/actionlint.tgz
        curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_arm64.tar.gz -o "$f"
        echo "325e971b6ba9bfa504672e29be93c24981eeb1c07576d730e9f7c8805afff0c6  $f" | sha256sum -c -
        sudo tar -xz -C /usr/local/bin -f "$f" actionlint
