name: setup-toolchain
description: 핀된 차트/정책/시크릿 툴체인 설치 (버전 SSOT). 필요한 도구만 입력으로 켠다. 러너=ubuntu-24.04-arm(arm64).

inputs:
  yq:          { description: yq v4.44.6,            default: 'false' }
  kubeconform: { description: kubeconform v0.6.7,    default: 'false' }
  helm:        { description: helm v3.16.4,          default: 'false' }
  kustomize:   { description: kustomize v5.4.3,      default: 'false' }
  conftest:    { description: conftest v0.56.0,      default: 'false' }
  bats:        { description: bats (apt),            default: 'false' }
  shellcheck:  { description: shellcheck v0.11.0,    default: 'false' }
  sops:        { description: sops v3.9.4,           default: 'false' }
  age:         { description: age latest,            default: 'false' }
  kubeseal:    { description: kubeseal v0.37.0,       default: 'false' }

runs:
  using: composite
  steps:
    - if: ${{ inputs.yq == 'true' }}
      shell: bash
      run: |
        # yq는 직접 바이너리 — snap yq는 strict confinement라 mktemp -d /tmp 픽스처를 못 읽는다(라이브 검증된 함정).
        sudo curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_arm64 -o /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq
    - if: ${{ inputs.kubeconform == 'true' }}
      shell: bash
      run: curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-arm64.tar.gz | sudo tar xz -C /usr/local/bin kubeconform
    - if: ${{ inputs.helm == 'true' }}
      shell: bash
      run: |
        # helm 고정 버전 핀 — get-helm-3(latest)는 helm major가 chart-test를 깨면 유일 required check를 막는 시한폭탄(m6-tools >=3.16과 정합).
        curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-arm64.tar.gz | tar xz -C /tmp && sudo mv /tmp/linux-arm64/helm /usr/local/bin/helm
    - if: ${{ inputs.kustomize == 'true' }}
      shell: bash
      run: curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_arm64.tar.gz | sudo tar xz -C /usr/local/bin kustomize
    - if: ${{ inputs.conftest == 'true' }}
      shell: bash
      run: curl -sSL https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_arm64.tar.gz | sudo tar -xz -C /usr/local/bin conftest
    - if: ${{ inputs.bats == 'true' }}
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y bats
    - if: ${{ inputs.shellcheck == 'true' }}
      shell: bash
      run: |
        # shellcheck v0.11.0 핀(aarch64) — apt 버전은 러너마다 달라 SC2015 등 info 체크가 로컬과 드리프트한다.
        curl -sSL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.aarch64.tar.xz \
          | tar -xJ -C /tmp && sudo mv /tmp/shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
    - if: ${{ inputs.sops == 'true' }}
      shell: bash
      run: |
        curl -sSL https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.arm64 -o /usr/local/bin/sops
        chmod +x /usr/local/bin/sops
    - if: ${{ inputs.age == 'true' }}
      shell: bash
      run: |
        curl -sSL https://dl.filippo.io/age/latest?for=linux/arm64 | tar -xz -C /tmp
        sudo mv /tmp/age/age /tmp/age/age-keygen /usr/local/bin/
    - if: ${{ inputs.kubeseal == 'true' }}
      shell: bash
      run: |
        # kubeseal 버전 핀 — 컨트롤러 appVersion(platform/sealed-secrets app v0.37.0)과 동일해야 seal/unseal 호환.
        # 봉인 워크플로(_create-cache/_create-database)가 제각각 핀하던 v0.27.3/v0.37.0을 이 한 곳으로 수렴.
        curl -fsSL https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.37.0/kubeseal-0.37.0-linux-arm64.tar.gz \
          | sudo tar xz -C /usr/local/bin kubeseal
