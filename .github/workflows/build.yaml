name: build
on:
  push:
    branches: [main]
    paths:
      - "ops/**" # 플랫폼 ops 이미지 소스(pg-tools 등). 배포-전용 apps/는 빌드 대상 아님(외부 레포에서 빌드)
      - ".github/workflows/build.yaml"
  # 신규 기본 브랜치 생성 push는 paths diff가 없어 트리거가 스킵된다(첫 라이브 push에서 확인)
  # — 초기 시드/재빌드용 수동 트리거.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm # 네이티브 arm64 runner — QEMU 불필요
    strategy:
      fail-fast: false
      matrix:
        # 사용자 앱은 외부 레포(ukyi-app/<app>)에서 빌드된다. homelab은 플랫폼 ops 이미지만 빌드.
        app: [pg-tools]
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 변경 감지가 git diff $BEFORE..$SHA를 쓴다 — 기본 depth=1이면 BEFORE 커밋이 없어
          # diff가 항상 실패(빌드 스킵)한다.
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: detect changed app
        id: changed
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          APP: ${{ matrix.app }}
        run: |
          # workflow_dispatch(수동 시드)와 신규 브랜치 push(BEFORE가 비었거나 0…0)는 diff가 불가능
          # → 전체 빌드. 첫 라이브에서 둘 다 build=false로 빠져 이미지 0개가 됐던 버그.
          if [ "$EVENT" = "workflow_dispatch" ] || [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          # ops/ 소스(Dockerfile 등) 변경만 "changed"로 간주 (ops 이미지엔 deploy/ 없음 — 자기-루프 무관)
          elif git diff --name-only "$BEFORE" "$SHA" \
               | grep -qE "^ops/${APP}/"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi
      - name: compute extra tag (pg-tools carries the canonical 16-rclone tag M4 references)
        id: tags
        env:
          OWNER: ${{ github.repository_owner }}
          APP: ${{ matrix.app }}
          SHA: ${{ github.sha }}
        run: |
          TAGS="ghcr.io/${OWNER}/${APP}:sha-${SHA}"
          if [ "${APP}" = "pg-tools" ]; then
            TAGS="${TAGS},ghcr.io/${OWNER}/pg-tools:16-rclone"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
      - name: build & push
        if: steps.changed.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ops/${{ matrix.app }}
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
      # 실제로 빌드된 앱만 기록해 write-back(bump.yaml)이 그 앱들만 bump하게 한다 —
      # 변경 없는 앱을 push된 적 없는 :sha 태그로 가리키는 일이 없도록 (→ ImagePullBackOff).
      - name: record built app
        if: steps.changed.outputs.build == 'true'
        env:
          APP: ${{ matrix.app }}
        run: mkdir -p built && printf '%s' "${APP}" > "built/${APP}"
      - name: upload built-app marker
        if: steps.changed.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: built-${{ matrix.app }}
          path: built/${{ matrix.app }}
          retention-days: 1
      # 빌드 결과를 owner에게 가시화 — push 실패가 Actions UI에만 묻히지 않게(if: always()).
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 배포
          title: 이미지 빌드
          ident: ${{ matrix.app }}@${{ github.sha }}
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
