# stale auto-merge-pending PR 스위퍼 (races-3/obs-5).
# strict=true 분기보호 + 비동기 auto-merge면 동시 2번째 봇 PR이 main 뒤로 처져(BEHIND) auto-merge가
# 영원히 무장만 한 채 멈춘다("PR 생성됨(머지 대기)"는 "배포됨"이 아니다 — obs-5). 주기적으로 열린
# 봇 PR 중 auto-merge 무장 + BEHIND인 것만 update-branch해 수렴을 깨운다. 다른 PR은 손대지 않는다.
name: "🔁 pr-sweeper"
run-name: "🔁 pr-sweeper — ${{ github.event_name == 'schedule' && '스케줄' || format('수동({0})', github.actor) }}"
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# 직렬화 불필요(읽고 update-branch만; 머지는 GitHub auto-merge가) — 단 동시 중복은 무의미하니 single.
concurrency:
  group: pr-sweeper
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: actor 가드 (workflow_dispatch 한정 — 스케줄/기타 트리거 무영향)
        if: github.event_name == 'workflow_dispatch'
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ vars.HOMELAB_OWNER }}
        run: |
          # 디스패치 자격(actions:write)은 워크플로 단위 스코프가 불가 — 허용목록(bump-poll) 외 전 진입점 가드(P2-1).
          [ -n "$OWNER" ] || { echo "::error::repo variable HOMELAB_OWNER 미설정 — actor 가드 fail-closed"; exit 1; }
          [ "$ACTOR" = "$OWNER" ] || { echo "::error::workflow_dispatch는 owner($OWNER)만 실행 가능 — actor=$ACTOR 거부"; exit 1; }
      # ⚠️ codex pass2 F8: 로컬 composite(아래 telegram-notify)는 체크아웃된 레포에서 resolve된다 —
      # checkout이 없으면 failure 알림 스텝이 액션 로드 실패로 죽어 알림 자체가 안 간다. 첫 스텝으로 checkout.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # writer App: 봇 PR 브랜치 update + auto-merge 무장 확인(Contents+PR write).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: behind한 auto-merge-pending 봇 PR을 update-branch
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          # 열린 PR 중 봇 head prefix만 — autoMergeRequest!=null(무장됨) && mergeStateStatus=BEHIND.
          # update-branch는 main을 머지해 BEHIND를 풀고, gate 재실행 → green이면 auto-merge가 머지한다.
          #
          # ★★ `bump-poll/`은 이 목록에 **없다**(structure r7 R-25). 그 네임스페이스의 원격 상태는
          #    **tools/ensure-bump-pr.ts가 유일한 소유자**다. 이유 둘:
          #    ① 승인 게이트 우회 — 스위퍼는 **레인을 보지 않는다**. `.bindings.json`의 autoDeploy가
          #       true→false로 바뀌어도 이미 무장된 PR은 무장된 채 남는데, 스위퍼가 브랜치를 갱신해
          #       체크를 재시작시키면 green 시점에 GitHub이 **사람 승인 없이 auto-merge** 한다.
          #       레인 reconcile(무장/해제)은 실행기만 할 수 있다 — 그러니 전진(advance)도 실행기 몫이다.
          #    ② 소유권 인터록 파괴 — `gh pr update-branch`는 head에 **머지 커밋**을 만든다. 실행기는
          #       head가 자기 bump 커밋(결정적 메시지 + writer ident)임을 증명해야 무장/force-push하는데,
          #       머지 커밋이 얹히면 그 증명이 **영구 실패**한다 → 해당 앱의 bump가 영구 fail-closed.
          #    실행기는 BEHIND를 **최신 main에서 재구축한 leased force-push**로 수렴시킨다(머지 커밋 0).
          #    나머지 접두(bump·create-*·update-secrets)는 그대로 — 그 PR들엔 레인 개념이 없다.
          gh pr list --repo "$REPO" --state open \
            --json number,headRefName,mergeStateStatus,autoMergeRequest \
            --jq '.[] | select(.autoMergeRequest != null)
                       | select(.mergeStateStatus == "BEHIND")
                       | select(.headRefName | test("^(bump|create-database|create-cache|create-app|update-secrets)/"))
                       | .number' > /tmp/behind.txt
          if [ ! -s /tmp/behind.txt ]; then echo "behind한 봇 PR 없음 — no-op"; exit 0; fi
          # ⚠️ codex restale3 F2: 실패를 ::warning::로 삼키고 green으로 끝내면 멈춘 PR(이 스위퍼가 잡으려던 모드)이
          # 무알림으로 묻힌다 → 실패 PR을 모아 잡을 nonzero 종료(아래 failure() telegram이 발화해 owner에게 알림).
          failed=""
          while read -r n; do
            [ -n "$n" ] || continue
            echo "update-branch PR #$n"
            if ! gh pr update-branch "$n" --repo "$REPO"; then
              echo "::warning::PR #$n update-branch 실패(충돌/권한/API) — 수동 확인 필요"
              failed="$failed #$n"
            fi
          done < /tmp/behind.txt
          if [ -n "$failed" ]; then echo "::error::update-branch 실패 PR:$failed"; exit 1; fi
      - name: telegram notify (실패 시)
        if: failure()
        uses: ./.github/actions/telegram-notify
        with:
          status: failure
          source: 변이
          title: PR 스위퍼
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
