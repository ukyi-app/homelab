# update-secrets reusable — dispatcher(action=update-secrets)가 호출한다.
# 앱 레포 main HEAD에서 deploy/<app>-secrets.sealed.yaml을 read해 봉인본 키 기준으로 검증 후 homelab에 갱신 PR.
# 재시작은 명령형 rollout restart가 아니라 선언적으로: 공유 차트가 envFrom 시크릿의 봉인
# 콘텐츠 해시를 pod template annotation(checksum/secrets)으로 렌더하면 ArgoCD가 그 변경만으로
# 롤링한다 — 같은 봉인본 재실행은 같은 해시로 수렴(멱등). 첫 시크릿 추가도 envFrom/resources를 함께 배선한다.
name: "🧰 _update-secrets"
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string

jobs:
  rotate:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: reader
        with:
          app-id: ${{ secrets.HOMELAB_READER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_READER_APP_PRIVATE_KEY }}
          owner: ukyi-app
          repositories: ${{ inputs.app }} # owner 없는 레포명(= 앱 이름) — org는 ukyi-app 고정
          permission-contents: read
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - name: 앱 레포 sealed 시크릿 read (main HEAD)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ukyi-app/${{ inputs.app }}   # org는 ukyi-app 고정 — 앱 이름으로 레포 경로 구성
          ref: main
          token: ${{ steps.reader.outputs.token }}
          path: .apprepo
          sparse-checkout: |
            deploy
      - uses: ./.github/actions/setup-bun
        with:
          install: 'true'
      - name: 검증 + 갱신 PR (auto-merge)
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }}
          APP: ${{ inputs.app }}
          RUN_ID: ${{ github.run_id }}
        run: |
          bun tools/update-secrets.ts --app "$APP" --repo-root . --app-repo-root .apprepo
          # 신규(미추적) 봉인본은 `git diff --quiet`가 항상 0(추적 변경 없음)이라 첫 시크릿 추가가
          # 조용히 no-op이 된다 → staged diff로 검사(신규 파일 추가도 감지).
          git add "apps/${APP}/deploy/prod/${APP}-secrets.sealed.yaml" \
            "apps/${APP}/deploy/prod/values.yaml" \
            "apps/${APP}/deploy/prod/kustomization.yaml"
          if git diff --cached --quiet; then echo "동일 봉인본 — 멱등 no-op"; exit 0; fi
          git config user.name "ukyi-homelab-writer[bot]"
          git config user.email "293311924+ukyi-homelab-writer[bot]@users.noreply.github.com"
          branch="update-secrets/${APP}-${RUN_ID}"
          git checkout -b "$branch"
          git commit -m "chore: ${APP} SealedSecret 회전 (update-secrets)"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore: ${APP} 시크릿 회전" \
            --body "update-secrets — 봉인본 검증 통과. gate 통과 시 auto-merge. (반영은 checksum annotation 롤링)"
          bash scripts/auto-merge-or-fail.sh "$branch"
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 시크릿갱신
          title: 시크릿 회전
          ident: ${{ inputs.app }}
          body: "PR 생성됨(머지 대기)"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
