# update-secrets reusable — dispatcher(action=update-secrets)가 호출한다.
# 앱 레포 main HEAD에서 deploy/<app>-secrets.sealed.yaml을 read해 봉인본 키 기준으로 검증 후 homelab에 갱신 PR.
# 재시작은 명령형 rollout restart가 아니라 선언적으로: 공유 차트가 envFrom 시크릿의 봉인
# 콘텐츠 해시를 pod template annotation(checksum/secrets)으로 렌더하면 ArgoCD가 그 변경만으로
# 롤링한다 — 같은 봉인본 재실행은 같은 해시로 수렴(멱등). 첫 시크릿 추가도 envFrom/resources를 함께 배선한다.
name: "🧰 _update-secrets"
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string

# 기본 셸(bash -e {0})은 pipefail 부재 — 명시 bash로 전 run 스텝에 -eo pipefail 강제
# (가드: tests/gates/test_workflow-pipefail.bats)
defaults:
  run:
    shell: bash

jobs:
  rotate:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: reader
        with:
          app-id: ${{ secrets.HOMELAB_READER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_READER_APP_PRIVATE_KEY }}
          owner: ukyi-app
          repositories: ${{ inputs.app }} # owner 없는 레포명(= 앱 이름) — org는 ukyi-app 고정
          permission-contents: read
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - name: 앱 레포 sealed 시크릿 read (main HEAD)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ukyi-app/${{ inputs.app }}   # org는 ukyi-app 고정 — 앱 이름으로 레포 경로 구성
          ref: main
          token: ${{ steps.reader.outputs.token }}
          path: .apprepo
          sparse-checkout: |
            deploy
      - uses: ./.github/actions/setup-bun
        with:
          install: 'true'
      - name: update-secrets 재검증 (경계 defense-in-depth — 디스패처 외 호출 대비)
        env:
          APP: ${{ inputs.app }}
        run: |
          jq -n --arg app "$APP" '{action:"update-secrets", app:$app}' > /tmp/mv-payload.json
          bun tools/validate-mutation.ts --action update-secrets --payload-file /tmp/mv-payload.json
      - name: 검증 + 봉인본 복사 (main HEAD)
        env:
          APP: ${{ inputs.app }}
        run: |
          bun tools/update-secrets.ts --app "$APP" --repo-root . --app-repo-root .apprepo
          printf '%s\n' "update-secrets — 봉인본 검증 통과. gate 통과 시 auto-merge. (반영은 checksum annotation 롤링)" > /tmp/pr-body.md
      - name: PR-first 커밋 + auto-merge (멱등 no-op)
        id: commit
        uses: ./.github/actions/pr-first-commit
        with:
          branch: update-secrets/${{ inputs.app }}-${{ github.run_id }}
          add-paths: apps/${{ inputs.app }}/deploy/prod/${{ inputs.app }}-secrets.sealed.yaml apps/${{ inputs.app }}/deploy/prod/values.yaml apps/${{ inputs.app }}/deploy/prod/kustomization.yaml
          commit-message: "chore: ${{ inputs.app }} SealedSecret 갱신 (update-secrets)"
          pr-title: "chore: ${{ inputs.app }} 시크릿 갱신"
          pr-body-file: /tmp/pr-body.md
          auto-merge: 'true'
          skip-if-empty: 'true'
          gh-token: ${{ steps.writer.outputs.token }}
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 시크릿갱신
          title: "${{ steps.commit.outputs.result == 'pr' && '시크릿 갱신 PR' || '시크릿 갱신' }}"
          ident: ${{ inputs.app }}
          body: "${{ job.status == 'success' && (steps.commit.outputs.result == 'noop' && '변경 없음(동일 봉인본)' || 'PR 생성됨(머지 대기)') || '' }}"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
