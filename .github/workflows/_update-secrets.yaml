# update-secrets reusable — dispatcher(action=update-secrets)가 호출한다.
# 앱 레포 SHA 고정으로 deploy/<app>-secrets.sealed.yaml을 read해 검증 후 homelab에 갱신 PR.
# 재시작은 명령형 rollout restart가 아니라 선언적으로: 공유 차트가 envFrom 시크릿의 봉인
# 콘텐츠 해시를 pod template annotation(checksum/secrets)으로 렌더하면 ArgoCD가 그 변경만으로
# 롤링한다 — 같은 봉인본 재실행은 같은 해시로 수렴(멱등). (차트 측 annotation은 Phase 5에서.)
name: _update-secrets
on:
  workflow_call:
    inputs:
      app_repo:
        required: true
        type: string
      sha:
        required: true
        type: string

jobs:
  rotate:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - id: names
        env:
          APP_REPO: ${{ inputs.app_repo }}
        run: echo "repo=${APP_REPO#ukyi-app/}" >> "$GITHUB_OUTPUT"
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: reader
        with:
          app-id: ${{ secrets.HOMELAB_READER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_READER_APP_PRIVATE_KEY }}
          owner: ukyi-app
          repositories: ${{ steps.names.outputs.repo }}
          permission-contents: read
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - name: 앱 레포 sealed 시크릿 SHA 고정 read
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.app_repo }}
          ref: ${{ inputs.sha }}
          token: ${{ steps.reader.outputs.token }}
          path: .apprepo
          sparse-checkout: deploy
      - name: 검증 + 갱신 PR (auto-merge)
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }}
          APP: ${{ steps.names.outputs.repo }}
          RUN_ID: ${{ github.run_id }}
        run: |
          src=".apprepo/deploy/${APP}-secrets.sealed.yaml"
          dst="apps/${APP}/deploy/prod/${APP}-secrets.sealed.yaml"
          [ -f "$src" ] || { echo "::error::${src} 없음 — 앱 레포에서 pnpm secret:seal 먼저"; exit 1; }
          [ -d "apps/${APP}/deploy/prod" ] || { echo "::error::미온보딩 앱 '${APP}' — create-app 먼저"; exit 1; }
          # 봉인본 메타데이터 검증(kind/namespace/name) — 평문은 어디에도 없다
          yq -e '.kind == "SealedSecret"' "$src" >/dev/null || { echo "::error::kind가 SealedSecret 아님"; exit 1; }
          yq -e '.metadata.namespace == "prod"' "$src" >/dev/null || { echo "::error::namespace prod 아님"; exit 1; }
          yq -e ".metadata.name == \"${APP}-secrets\"" "$src" >/dev/null || { echo "::error::name ${APP}-secrets 아님"; exit 1; }
          cp "$src" "$dst"
          vals="apps/${APP}/deploy/prod/values.yaml"
          # 선언적 회전(checksum 롤링): 봉인본 해시를 pod template annotation에 반영해야 envFrom
          # 변경이 파드에 적용된다(차트 podAnnotations → ArgoCD가 Deployment 롤링). 명령형
          # rollout restart는 취소/실패 시 옛 값 무한 유지라 선언적으로.
          sha="$(sha256sum "$dst" | cut -c1-16)"
          yq -i ".podAnnotations.\"checksum/secrets\" = \"$sha\"" "$vals"
          # 신규(미추적) 봉인본은 `git diff --quiet`가 항상 0(추적 변경 없음)이라 첫 시크릿 추가가
          # 조용히 no-op이 된다 → staged diff로 검사(신규 파일 추가도 감지).
          git add "$dst" "$vals"
          if git diff --cached --quiet; then echo "동일 봉인본 — 멱등 no-op"; exit 0; fi
          git config user.name "homelab-bot"
          git config user.email "bot@users.noreply.github.com"
          branch="update-secrets/${APP}-${RUN_ID}"
          git checkout -b "$branch"
          git commit -m "chore: ${APP} SealedSecret 회전 (update-secrets)"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore: ${APP} 시크릿 회전" \
            --body "update-secrets — 봉인본 검증 통과. gate 통과 시 auto-merge. (반영은 checksum annotation 롤링)"
          bash scripts/auto-merge-or-fail.sh "$branch"
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 시크릿갱신
          title: 시크릿 회전
          ident: ${{ steps.names.outputs.repo }}
          body: "PR 생성됨(머지 대기)"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
