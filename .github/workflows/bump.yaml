name: bump
on:
  workflow_run:
    workflows: [build]
    types: [completed]
  # 외부 앱 레포의 reusable-app-build가 보내는 배포 dispatch (멀티레포 앱 플랫폼).
  # ⚠️ 과도기 경로: Task 3.4(bump-poll GHCR 폴링)가 라이브 검증되면 이 트리거와
  #    앱 레포의 HOMELAB_DISPATCH_PAT를 함께 제거한다(인증 마이그레이션 단위).
  repository_dispatch:
    types: [app-image]

# 직렬화: write-back은 한 번에 하나만 실행; 진행 중인 커밋은 절대 취소하지 않는다.
# (workflow_run 경로와 repository_dispatch 경로가 같은 그룹을 공유 — 교차 직렬화)
concurrency:
  group: values-writeback
  cancel-in-progress: false

# GITHUB_TOKEN은 최소 권한만: main 쓰기는 writer App 토큰의 PR 경로가 전담한다.
permissions:
  contents: read
  actions: read # download-artifact가 다른 run의 아티팩트를 읽는 데 필요
  packages: read # docker manifest inspect용 — 없으면 GHCR 조회가 익명 처리되어 digest 검증이 항상 실패

jobs:
  writeback:
    # 이 레포의 `main`에서 돈 성공한 build에만 반응한다 (fork/PR build는 절대 아님) —
    # 아니면 공격자가 통제한 아티팩트 내용이 write-back PR 내용을 조종할 수 있다.
    if: >-
      ${{ github.event_name == 'workflow_run'
          && github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_repository.full_name == github.repository
          && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04-arm
    # matrix 없음: 직렬화된 단일 job이 실제로 빌드된 앱만 bump하고
    # (build.yaml의 `built-*` 아티팩트에서 도출), 각 digest 실존을 검증한 뒤 한 번만 커밋한다.
    steps:
      # writer App 토큰(homelab 전용 설치): App 토큰은 branch protection을 우회하지 못하므로
      # main 직접 push가 아니라 PR + auto-merge로 쓴다(required check `gate`가 리뷰 게이트).
      # composite action(homelab-token)은 체크아웃이 선행돼야 해서 여기서는 인라인으로 발급한다.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.token.outputs.token }}
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: download built-app markers from the build run
        uses: actions/download-artifact@v4
        with:
          pattern: built-*
          path: built
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: derive the set of apps that were actually built
        id: set
        run: |
          built_apps="$(find built -mindepth 1 -maxdepth 1 -type f -printf '%f ' 2>/dev/null | sed 's/ *$//')"
          if [ -z "$built_apps" ]; then
            echo "apps=" >> "$GITHUB_OUTPUT"; echo "nothing built — no write-back"; exit 0
          fi
          echo "apps=$built_apps" >> "$GITHUB_OUTPUT"
          echo "built: $built_apps"
      - name: verify digests + bump ONLY built apps + PR once (auto-merge)
        if: steps.set.outputs.apps != ''
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          SHA: "sha-${{ github.event.workflow_run.head_sha }}"
          OWNER: "${{ github.repository_owner }}"
          APPS: ${{ steps.set.outputs.apps }}
          RUN_ID: ${{ github.run_id }}
        run: |
          for app in $APPS; do
            # 아티팩트 유래 이름 정제: 엄격한 소문자 앱 이름이 아니면 전부 건너뛴다
            case "$app" in
              ''|*[!a-z0-9-]*) echo "skip suspicious app name: '$app'"; continue ;;
            esac
            # 배포되는 앱만 bump할 values.yaml이 있다 (pg-tools에는 없음)
            [ -f "apps/$app/deploy/prod/values.yaml" ] || { echo "skip $app (no deploy values.yaml)"; continue; }
            echo "verify ghcr.io/$OWNER/$app:$SHA exists BEFORE bumping"
            docker manifest inspect "ghcr.io/$OWNER/$app:$SHA" >/dev/null 2>&1 \
              || { echo "::error::ghcr.io/$OWNER/$app:$SHA missing — refusing to bump (would ImagePullBackOff)"; exit 1; }
            node tools/bump-tag.mjs "$app" "$SHA"
          done
          if git diff --quiet; then echo "no values changed"; exit 0; fi
          git config user.name "homelab-bot"
          git config user.email "bot@users.noreply.github.com"
          branch="bump/build-${RUN_ID}"
          git checkout -b "$branch"
          git add apps/*/deploy/prod/values.yaml
          git commit -m "chore: 빌드된 앱 이미지 태그를 ${SHA}로 갱신 (${APPS})"
          git push -u origin "$branch"
          # PR-first 쓰기 모델: gate 통과 시 자동 머지(squash). 머지 후 브랜치는 자동 삭제(repo 설정).
          gh pr create --base main --head "$branch" \
            --title "chore: 이미지 태그 갱신 (${APPS})" \
            --body "build → write-back 자동 PR. required check \`gate\` 통과 시 auto-merge."
          # 이미 clean(체크 완료) 상태의 PR엔 --auto가 에러를 낸다(라이브 검증된 GitHub 계약) → 직접 머지 폴백
          gh pr merge --auto --squash "$branch" || gh pr merge --squash "$branch"
      - name: telegram notify
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          APPS: ${{ steps.set.outputs.apps }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          STATUS: ${{ job.status }}
        run: |
          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="deploy write-back ${STATUS}: apps=[${APPS}] -> sha-${HEAD_SHA}"

  # ── 외부 앱 레포 경로 (repository_dispatch: app-image) ────────────────────────────────────
  # client_payload는 비신뢰 입력(dispatch 자격 소지자가 임의 값 전송 가능) — 전부 env로만 받고,
  # regex + source-repo 바인딩 파일 + GHCR digest 실존의 3중 검증을 통과해야만 bump한다.
  writeback-dispatch:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.token.outputs.token }}
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: validate payload + verify digest + bump + PR (auto-merge)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          APP: ${{ github.event.client_payload.app }} # 비신뢰 — 아래에서 regex 검증
          TAG: ${{ github.event.client_payload.tag }} # 비신뢰 — 아래에서 regex 검증
          SRC: ${{ github.event.client_payload.repo }} # 비신뢰 — source-repo 바인딩과 대조
          OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ github.run_id }}
        run: |
          case "$APP" in ''|*[!a-z0-9-]*) echo "::error::app 이름 불량: '$APP'"; exit 1 ;; esac
          echo "$TAG" | grep -qE '^sha-[0-9a-f]{7,40}$' || { echo "::error::tag 형식 불량: '$TAG'"; exit 1; }
          echo "$SRC" | grep -qE '^[A-Za-z0-9-]+/[A-Za-z0-9._-]+$' || { echo "::error::repo 형식 불량: '$SRC'"; exit 1; }
          vals="apps/$APP/deploy/prod/values.yaml"
          [ -f "$vals" ] || { echo "::error::미온보딩 앱 '$APP' — onboard PR부터 머지하라"; exit 1; }
          # 발신 레포 바인딩: 온보딩 때 기록된 source-repo와 payload.repo가 일치해야 한다
          bind="apps/$APP/deploy/prod/source-repo"
          [ -f "$bind" ] || { echo "::error::$bind 없음 — 외부 앱이 아니거나 바인딩 누락"; exit 1; }
          [ "$(tr -d '[:space:]' < "$bind")" = "$SRC" ] \
            || { echo "::error::source-repo 바인딩 불일치: 기대 $(cat "$bind") vs payload '$SRC'"; exit 1; }
          echo "verify ghcr.io/$OWNER/$APP:$TAG exists BEFORE bumping"
          docker manifest inspect "ghcr.io/$OWNER/$APP:$TAG" >/dev/null 2>&1 \
            || { echo "::error::ghcr.io/$OWNER/$APP:$TAG missing — refusing to bump"; exit 1; }
          node tools/bump-tag.mjs "$APP" "$TAG"
          if git diff --quiet; then echo "no change (same tag)"; exit 0; fi
          git config user.name "homelab-bot"
          git config user.email "bot@users.noreply.github.com"
          branch="bump/${APP}-${RUN_ID}"
          git checkout -b "$branch"
          git add "apps/$APP/deploy/prod/values.yaml"
          git commit -m "chore: ${APP} 이미지 태그를 ${TAG}로 갱신 (외부 레포 dispatch)"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore: ${APP} 이미지 태그 갱신" \
            --body "외부 레포 dispatch → write-back 자동 PR. required check \`gate\` 통과 시 auto-merge."
          # 이미 clean(체크 완료) 상태의 PR엔 --auto가 에러를 낸다 → 직접 머지 폴백
          gh pr merge --auto --squash "$branch" || gh pr merge --squash "$branch"
      - name: telegram notify
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP: ${{ github.event.client_payload.app }}
          TAG: ${{ github.event.client_payload.tag }}
          STATUS: ${{ job.status }}
        run: |
          curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="deploy write-back ${STATUS}: ${APP} -> ${TAG} (dispatch)"
