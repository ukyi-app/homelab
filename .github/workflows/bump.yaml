name: "🔼 bump"
on:
  workflow_run:
    workflows: ["📦 build"]
    types: [completed]
  # 외부 앱 레포의 v1 dispatch 경로는 폐기됨 — 배포 반영은 GHCR 폴링(bump-poll.yaml)과
  # 앱 release의 bump-poll 디스패치가 권위.

# 직렬화: 모든 main 변이(변이 디스패처/bump-poll/bump)가 공유하는 전역 큐에 합류한다.
# values-writeback 전용 그룹은 queue:max가 없어 동시 3번째 write-back이 대기 건을 조용히 취소했다
# (races-1/2 — 인-repo bump 유실). 진행 중인 커밋은 절대 취소하지 않는다(cancel-in-progress:false).
# queue:max(2026-05 GA)는 cancel-in-progress:true와 병용 불가 — false 유지.
concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

# GITHUB_TOKEN은 최소 권한만: main 쓰기는 writer App 토큰의 PR 경로가 전담한다.
permissions:
  contents: read
  actions: read # download-artifact가 다른 run의 아티팩트를 읽는 데 필요
  packages: read # docker manifest inspect용 — 없으면 GHCR 조회가 익명 처리되어 digest 검증이 항상 실패

jobs:
  writeback:
    # 이 레포의 `main`에서 돈 성공한 build에만 반응한다 (fork/PR build는 절대 아님) —
    # 아니면 공격자가 통제한 아티팩트 내용이 write-back PR 내용을 조종할 수 있다.
    if: >-
      ${{ github.event_name == 'workflow_run'
          && github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.head_repository.full_name == github.repository
          && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04-arm
    # matrix 없음: 직렬화된 단일 job이 실제로 빌드된 앱만 bump하고
    # (build.yaml의 `built-*` 아티팩트에서 도출), 각 digest 실존을 검증한 뒤 한 번만 커밋한다.
    steps:
      # writer App 토큰(homelab 전용 설치): App 토큰은 branch protection을 우회하지 못하므로
      # main 직접 push가 아니라 PR + auto-merge로 쓴다(required check `gate`가 리뷰 게이트).
      # checkout 자체에 토큰이 필요해 이 첫 step에서 create-github-app-token을 인라인 발급한다
      # (핀 SSOT: tests/gates/test_app-token-sha-ssot.bats가 전 콜사이트 동일 SHA 강제).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.token.outputs.token }}
      - uses: ./.github/actions/setup-bun
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: download built-app markers from the build run
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          pattern: built-*
          path: built
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: derive the set of apps that were actually built
        id: set
        run: |
          built_apps="$(find built -mindepth 1 -maxdepth 1 -type f -printf '%f ' 2>/dev/null | sed 's/ *$//')"
          if [ -z "$built_apps" ]; then
            echo "apps=" >> "$GITHUB_OUTPUT"; echo "nothing built — no write-back"; exit 0
          fi
          echo "apps=$built_apps" >> "$GITHUB_OUTPUT"
          echo "built: $built_apps"
      - name: verify digests + bump ONLY built apps + PR once (auto-merge)
        id: bump
        if: steps.set.outputs.apps != ''
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          SHA: "sha-${{ github.event.workflow_run.head_sha }}"
          OWNER: "${{ github.repository_owner }}"
          APPS: ${{ steps.set.outputs.apps }}
          RUN_ID: ${{ github.run_id }}
        run: |
          for app in $APPS; do
            # 아티팩트 유래 이름 정제: 엄격한 소문자 앱 이름이 아니면 전부 건너뛴다
            case "$app" in
              ''|*[!a-z0-9-]*) echo "skip suspicious app name: '$app'"; continue ;;
            esac
            # 배포되는 앱만 bump할 values.yaml이 있다 (pg-tools에는 없음)
            [ -f "apps/$app/deploy/prod/values.yaml" ] || { echo "skip $app (no deploy values.yaml)"; continue; }
            echo "verify ghcr.io/$OWNER/$app:$SHA exists BEFORE bumping"
            docker manifest inspect "ghcr.io/$OWNER/$app:$SHA" >/dev/null 2>&1 \
              || { echo "::error::ghcr.io/$OWNER/$app:$SHA missing — refusing to bump (would ImagePullBackOff)"; exit 1; }
            bun tools/bump-tag.ts "$app" "$SHA"
          done
          if git diff --quiet; then echo "no values changed"; exit 0; fi
          git config user.name "ukyi-homelab-writer[bot]"
          git config user.email "293311924+ukyi-homelab-writer[bot]@users.noreply.github.com"
          branch="bump/build-${RUN_ID}"
          git checkout -b "$branch"
          git add apps/*/deploy/prod/values.yaml
          git commit -m "chore: 빌드된 앱 이미지 태그를 ${SHA}로 갱신 (${APPS})"
          git push -u origin "$branch"
          # PR-first 쓰기 모델: gate 통과 시 자동 머지(squash). 머지 후 브랜치는 자동 삭제(repo 설정).
          gh pr create --base main --head "$branch" \
            --title "chore: 이미지 태그 갱신 (${APPS})" \
            --body "build → write-back 자동 PR. required check \`gate\` 통과 시 auto-merge."
          # PR 생성 확정 후 신호 — 이후 auto-merge 실패해도 PR은 존재(알림이 PR 생성을 정확히 반영)
          echo "result=pr" >> "$GITHUB_OUTPUT"
          bash scripts/auto-merge-or-fail.sh "$branch"
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 배포
          title: 이미지 태그 갱신
          ident: "apps=[${{ steps.set.outputs.apps }}] -> sha-${{ github.event.workflow_run.head_sha }}"
          body: "${{ job.status == 'success' && steps.bump.outputs.result == 'pr' && 'PR 생성됨(머지 대기)' || '' }}"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
