name: iac
on:
  pull_request:
    paths:
      - "infra/**"
      - "platform/argocd/**"
      - "Makefile"
      - "scripts/**"
  # post-merge SHA 고정 apply: 머지된 커밋의 apps.json/dns/tunnel 상태를 그대로 적용한다.
  # 트랜잭션 안전: 라이브 Cloudflare는 commit 전에 절대 건드리지 않는다(커밋된 상태만 apply).
  push:
    branches: [main]
    paths:
      - "infra/cloudflare/**"

permissions:
  contents: read

jobs:
  iac-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: terraform init (no backend) + validate all roots
        run: |
          for r in cloudflare tailscale github; do
            # -lockfile=readonly: 커밋된 멀티플랫폼 lock과 어긋나면(provider 추가/버전 변경) 실패 → 드리프트 게이트화.
            terraform -chdir=infra/$r init -backend=false -lockfile=readonly
          done
          make tf-validate
      - name: terraform 의존 bats 가드 (fmt/validate·prevent_destroy·reconcile 불변식)
        # gate(terraform 미설치)에 못 넣는 terraform-결합 테스트만 여기서 advisory로 실행한다.
        # argocd_values·root_app은 platform/argocd로 이동 → required gate 러너가 수집·실행(이중실행 방지로 제외).
        run: |
          bats infra/_tests/test_tf_validate.bats # tf fmt/validate + R2 prevent_destroy 가드(이전엔 미게이트)
          bats infra/_tests/test_tf_reconcile.bats # 드리프트 잡(github/tailscale)은 plan-only(무인 apply 금지) 불변식 가드
          bats infra/cloudflare/test_apps_data.bats # apps.json DNS/tunnel SSOT(active/public·ingress 순서·host 유일성) — terraform validate 의존이라 gate 불가

  # ── PR: cloudflare 루트 plan 미리보기 — 머지 전 add/change/destroy를 job summary에 게시(드리프트/변경 가시성) ──
  # 라이브 state(R2) 대비 실제 plan을 돌려 리뷰어가 머지 전에 적용 diff를 본다. 정보성(required check는 gate) —
  # plan은 entitlement 400(무료 플랜 rate-limit 등 apply-time 거부)까지는 못 잡지만 리소스 add/change/destroy는 보여준다.
  iac-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      # 시크릿 부재(Phase 0 미완/외부 기여) 시 skip — 깨끗한 성공(required 아님).
      - id: pf
        env:
          CF: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          R2: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          if [ -n "$CF" ] && [ -n "$R2" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TF/R2 시크릿 미설정 — cloudflare plan 미리보기 skip"
          fi
      - uses: hashicorp/setup-terraform@v3
        if: steps.pf.outputs.configured == 'true'
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: terraform init (R2 backend, readonly)
        if: steps.pf.outputs.configured == 'true'
        uses: ./.github/actions/tf-r2-init
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        with:
          root: cloudflare
          state-key: cloudflare/prod/terraform.tfstate
      - name: terraform plan → job summary
        if: steps.pf.outputs.configured == 'true'
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_zone_name: ${{ secrets.TF_DOMAIN }}
          TF_VAR_internal_suffix: home.${{ secrets.TF_DOMAIN }}
        run: |
          set +e
          terraform -chdir=infra/cloudflare plan -input=false -lock-timeout=120s -no-color \
            -detailed-exitcode -out=tf.plan > plan.txt 2>&1
          rc=$?
          set -e
          {
            echo "## Cloudflare plan 미리보기"
            case "$rc" in
              0) echo "✅ 변경 없음 (no-op)" ;;
              2) echo "ℹ️ 적용 대기 변경 있음 — 아래 plan 확인" ;;
              *) echo "⚠️ plan 실패(exit $rc)" ;;
            esac
            echo '```'
            tail -c 60000 plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # 0(no-op)·2(변경 있음)는 정상, 그 외만 실패로 가시화(required 아님 → PR 차단 안 함).
          [ "$rc" = "0" ] || [ "$rc" = "2" ] || exit "$rc"
      # 인라인 destroy jq 경고를 tf-destroy-guard composite(warn)로 치환 — 산출된 tf.plan을 검사.
      - name: destroy 사전 경고 (warn)
        if: steps.pf.outputs.configured == 'true'
        uses: ./.github/actions/tf-destroy-guard
        with:
          mode: warn
          root: infra/cloudflare
          plan: tf.plan

  # ── push-to-main: cloudflare 루트 plan→apply (R2 state) ─────────────────────────────
  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    # 전역 변이 직렬화 그룹 공유 — tfstate race 차단. queue:max로 취소 누락 차단.
    # 그래도 취소/실패하면 tf-reconcile.yaml(주기)이 다음 주기에 수렴시킨다.
    concurrency:
      group: homelab-mutation
      cancel-in-progress: false
      queue: max
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_zone_name: ${{ secrets.TF_DOMAIN }}
      TF_VAR_internal_suffix: home.${{ secrets.TF_DOMAIN }}
    steps:
      - uses: actions/checkout@v4 # push 이벤트의 머지 SHA가 기본 체크아웃 — SHA 고정
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: terraform init (R2 backend)
        uses: ./.github/actions/tf-r2-init
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        with:
          root: cloudflare
          state-key: cloudflare/prod/terraform.tfstate
      - name: terraform plan (-out=tf.plan)
        run: terraform -chdir=infra/cloudflare plan -input=false -lock-timeout=120s -out=tf.plan
      # primary merge→apply 경로 destroy 가드 — DNS/tunnel/ruleset의 delete/replace를 무인 apply 차단.
      # (prevent_destroy R2 버킷은 plan에서 이미 막히지만, 그 외 리소스 replace=delete+create도 차단.)
      - name: destroy 가드 (block)
        uses: ./.github/actions/tf-destroy-guard
        with:
          mode: block
          root: infra/cloudflare
          plan: tf.plan
      - name: terraform apply (plan 산출물만 적용)
        run: terraform -chdir=infra/cloudflare apply -input=false tf.plan
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: IaC
          title: Cloudflare 적용
          ident: ${{ github.sha }}
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
