# create-cache 변이 디스패처 — 앱용 redis 프로비전(입력 → spec 조립 → 캐시 산출물 PR). owner는 name만(고정).
# 변이 로직은 _create-cache.yaml(reusable)에 있다 — 이 파일은 trigger+조립+validate+notify 셸.
# 입력은 평평한 필드(name + 선택 maxmemory) — validate 잡이 spec JSON으로 조립해 reusable에 넘긴다.
name: "✨ create-cache"
run-name: "✨ create-cache — ${{ inputs.name }}"
on:
  workflow_dispatch:
    inputs:
      name:
        description: "캐시 이름 (소문자 시작, 영숫자/하이픈, ≤30자)"
        required: true
      maxmemory_mi:
        description: "maxmemory (Mi, 16..1024, 비우면 기본 64)"
        required: false
        default: ""

concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    outputs:
      spec: ${{ steps.assemble.outputs.spec }}   # 조립한 spec JSON을 reusable 호출 잡으로 전달
    steps:
      - name: actor 가드 (owner 전용 변이 — bump-poll/audit는 비대상)
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ vars.HOMELAB_OWNER }}
        run: |
          # 변이 디스패처는 owner만 트리거 가능. 앱 레포 dispatch 자격(actions:write)이 변이까지
          # 트리거하는 표면을 차단(B11 선행 조건). vars.HOMELAB_OWNER 미설정 시 fail-closed(빈 값 거부 — vacuous 방지).
          [ -n "$OWNER" ] || { echo "::error::repo variable HOMELAB_OWNER 미설정 — actor 가드 fail-closed"; exit 1; }
          [ "$ACTOR" = "$OWNER" ] || { echo "::error::변이 디스패처는 owner($OWNER)만 실행 가능 — actor=$ACTOR 거부"; exit 1; }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with: { ref: main }
      - uses: ./.github/actions/setup-bun
        with: { install: 'false' }     # validate-mutation 체크는 deps 불요
      - name: 입력 → spec JSON 조립 (maxmemory 비우면 생략 → reusable 기본 64)
        id: assemble
        env: # 비신뢰 입력 — env 경유, run 안 인라인 보간 금지
          NAME: ${{ inputs.name }}
          MAXMEMORY: ${{ inputs.maxmemory_mi }}
        run: |
          spec=$(jq -cn --arg name "$NAME" --arg mm "$MAXMEMORY" \
            '{name: $name}
             + (if $mm == "" then {}
                elif ($mm | test("^[0-9]+$")) then {maxmemory_mi: ($mm | tonumber)}
                else {maxmemory_mi: $mm} end)')   # 비숫자는 문자열로 둬서 validate-mutation이 "정수" 거부
          printf 'spec=%s\n' "$spec" >> "$GITHUB_OUTPUT"
      - name: spec 계약 검증 (허용 밖 필드·예약 이름·maxmemory 범위 거부 — fail-closed)
        env:
          SPEC: ${{ steps.assemble.outputs.spec }}
        run: |
          jq -n --arg action create-cache --arg spec "$SPEC" '{action: $action, spec: $spec}' > /tmp/payload.json
          bun tools/validate-mutation.ts --action create-cache --payload-file /tmp/payload.json

  create-cache:
    needs: validate
    uses: ./.github/workflows/_create-cache.yaml
    with:
      spec: ${{ needs.validate.outputs.spec }}   # validate가 조립·검증한 spec JSON
    secrets: inherit
    permissions:
      contents: read

  notify:
    needs: [validate, create-cache]
    if: failure() || cancelled()
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/mutation-notify
        with:
          results: ${{ toJSON(needs) }}
          title: create-cache 실행
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
