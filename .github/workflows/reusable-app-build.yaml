# 외부 앱 레포가 호출하는 재사용 빌드 워크플로 (빌드 로직의 SSOT) — build-only.
# 앱 레포의 caller(템플릿 제공)는 main push에서 이걸 호출만 한다:
#   uses: <owner>/homelab/.github/workflows/reusable-app-build.yaml@main
#   with: { app: ${{ github.event.repository.name }} }
#
# 계약(v1 dispatch 경로 폐기 완료):
# - 빌드 + GHCR push만 한다. homelab dispatch는 없음 — 배포 반영은 homelab측 GHCR 폴링
#   (bump-poll.yaml)이 권위 처리하고, 빌드 직후 즉시 반영은 앱 release의 bump-poll 디스패치다.
# - 구 dispatch 입력(secrets)·org secret·bump.yaml의 외부 dispatch 경로는 모두 폐기됨
#   (인증 마이그레이션 완료). caller는 secrets 블록을 넘기지 않는다.
name: "📦 reusable-app-build"
on:
  workflow_call:
    inputs:
      app:
        description: "앱 이름 (관례: 레포 이름과 동일)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm # native arm64 — QEMU 불필요 (homelab build.yaml과 동일)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - id: meta
        env:
          APP: ${{ inputs.app }}
        run: |
          case "$APP" in
            ''|*[!a-z0-9-]*) echo "::error::app 이름 불량: '$APP'"; exit 1 ;;
          esac
          echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build + push (arm64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.app }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # 빌드 완료 후 흐름: bump-poll(10분 주기)이 main reachable + descendant + digest 검증 후
      # autoDeploy면 자동 PR+머지, 아니면 승인 PR을 만든다. 즉시 반영: owner가
      # homelab에서 `gh workflow run bump-poll.yaml`.
