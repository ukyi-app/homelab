# teardown-app reusable — dispatcher(action=teardown-app)가 호출. writer App 토큰으로 fresh main 브랜치에서
# apps/<app> 제거 + apps.json/원장 갱신 → PR(required check `gate`). **auto-merge 안 함 = 파괴는 수동 머지.**
name: "🧰 _teardown-app"
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      confirm:
        required: true
        type: string

# 기본 셸(bash -e {0})은 pipefail 부재 — 명시 bash로 전 run 스텝에 -eo pipefail 강제
# (가드: tests/gates/test_workflow-pipefail.bats)
defaults:
  run:
    shell: bash

jobs:
  teardown:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - uses: ./.github/actions/setup-bun
      - name: confirm 가드 재검증 (파괴 경계 — defense-in-depth, teardown 前)
        env:
          APP: ${{ inputs.app }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          # 외부 디스패처가 이미 검사했어도 파괴 경계(reusable)에서 confirm===app을 다시 강제 —
          # 다른/미래 호출자가 confirm 없이·불일치로 호출하는 것을 차단(env 경유, 인라인 보간 금지).
          # writer 토큰의 destructive 사용(push/PR)은 이 검증 통과 후에만 일어난다.
          printf '{"app":"%s","confirm":"%s"}' "$APP" "$CONFIRM" > /tmp/td-payload.json
          bun tools/validate-mutation.ts --action teardown-app --payload-file /tmp/td-payload.json
      - name: 철거 plan + PR 본문 (수동 머지)
        env:
          APP: ${{ inputs.app }}
        run: |
          [ -d "apps/$APP" ] || { echo "::error::apps/$APP 없음 — 이미 철거됐거나 이름 오류"; exit 1; }
          # 사전 active 상태 기록(롤백 시 DNS 복원 필요 여부 판단용)
          active=$(jq -r --arg a "$APP" '(map(select(.name==$a)) | .[0].active) // false' infra/cloudflare/apps.json 2>/dev/null || echo unknown)
          bun tools/teardown-app.ts --app "$APP" --repo-root . | tee /tmp/plan.json
          {
            echo "teardown-app 자동 생성 PR입니다. **머지 = 철거 승인** — ArgoCD가 Application/워크로드/SealedSecret prune; active였으면 머지 후 iac.yaml이 DNS/tunnel ingress를 **자동 제거**(app 공개 DNS는 destroy 가드 allowlist라 무인 apply 허용). 별도 수동 terraform apply 불필요."
            echo
            echo "**사전 상태**: active=${active} (롤백 시 DNS 복원 필요 여부 판단)"
            echo "**롤백**: 잘못 머지하면 이 PR을 git revert(또는 GitHub Revert) → apps/${APP}/(SealedSecret 포함)+apps.json 행+원장 행 복원 → ArgoCD 재생성 + (active였으면) iac DNS 재적용."
            echo
            echo '```json'
            cat /tmp/plan.json
            echo '```'
          } > /tmp/pr-body.md
      - name: PR-first 커밋 (auto-merge 안 함 — 파괴는 수동 머지)
        uses: ./.github/actions/pr-first-commit
        with:
          branch: teardown/teardown-app-${{ inputs.app }}-${{ github.run_id }}
          add-paths: apps docs/memory-ledger.md infra/cloudflare/apps.json platform
          commit-message: "chore: ${{ inputs.app }} 앱 철거 (teardown-app)"
          pr-title: "chore: ${{ inputs.app }} 앱 철거 (teardown-app)"
          pr-body-file: /tmp/pr-body.md
          auto-merge: 'false'
          gh-token: ${{ steps.writer.outputs.token }}
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 해체
          title: "${{ job.status == 'success' && '앱 철거 PR' || '앱 철거' }}"
          ident: ${{ inputs.app }}
          body: "${{ job.status == 'success' && 'PR 생성됨(수동 머지 대기)' || '' }}"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
