name: "🧪 ci"
# 권위 게이트: 이 워크플로의 job 'gate'가 유일한 required check(infra/github/repo.tf contexts=["gate"]).
# 메모리 원장(bun run verify:ledger)·테스트 수집(run-bats.sh)·chart·shellcheck·e2e를 권위 게이트한다.
# verify.yaml(job 'verify')은 non-required 보조(skeleton·sops 왕복 ephemeral·pre-commit) — ledger 중복은 W7에서 제거.
on:
  pull_request:
  push:
    branches: [main]

# PR엔 같은 PR의 이전 run을 취소(러너 절약 + gate에 stale 잔류 방지), main push는 sha 고유라 보존.
# queue:max는 안 쓰므로 cancel-in-progress 병용 함정(AGENTS.md)과 무관.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: ./.github/actions/setup-bun
      - name: typecheck (tsc --noEmit — erasableSyntaxOnly 게이트, make ci 패리티)
        run: bun run typecheck
      - name: install chart toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          yq: 'true'
          kubeconform: 'true'
          helm: 'true'
          kustomize: 'true'
          conftest: 'true'
          bats: 'true'
          shellcheck: 'true'
          actionlint: 'true'
      - name: secret-guard — gitleaks(누출) + sops-guard(평문 enc.yaml) 강제
        # verify.yaml의 gitleaks/sops-guard는 required가 아니라(분기보호 contexts=["gate"]),
        # 누출 PR이 gate만 통과하면 머지된다 → required `gate` 잡에 폴딩(코드 전용, 머지 즉시 발효).
        # gitleaks는 pre-commit rev와 동일 버전을 핀(SSOT 드리프트 방지). 러너=arm64.
        run: |
          ver=$(yq '.repos[] | select(.repo == "https://github.com/gitleaks/gitleaks") | .rev' .pre-commit-config.yaml | sed 's/^v//')
          [ -n "$ver" ] || { echo "::error::gitleaks rev를 .pre-commit-config.yaml에서 못 찾음"; exit 1; }   # fail-loud(빈 버전 차단)
          # ⚠️ codex pass5 F3 + restale F1: curl|tar 직접 추출은 체크섬 없는 실행체 공급망 표면(supplychain-5 동일).
          # 하드코딩 SHA256 placeholder 금지(게이트 깨짐) — 릴리스 **공식 checksums.txt**를 받아 그 라인으로 검증 후
          # 추출한다(버전 핀 v${ver}만 Renovate가 갱신; 해시는 매니페스트에서 자동 일치, stale 위험 0).
          ( cd /tmp
            curl -fsSL -O "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_arm64.tar.gz"
            curl -fsSL -O "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_checksums.txt"
            grep "  gitleaks_${ver}_linux_arm64.tar.gz$" "gitleaks_${ver}_checksums.txt" | sha256sum -c -
            sudo tar -xz -C /usr/local/bin -f "gitleaks_${ver}_linux_arm64.tar.gz" gitleaks )
          # git 히스토리 전체 스캔(pre-commit 훅과 동등). --redact: 발견 시 시크릿 평문 미출력.
          # ⚠️ codex pass4 F2: bare 'gitleaks detect'는 git 히스토리 전체 스캔 → 과거 false-positive/회전된
          # 옛 시크릿 하나가 모든 PR을 영구 머지불가(게이트 red)로 만든다. pre-commit 훅처럼 작업트리만 스캔.
          gitleaks detect --no-git --source . --redact --no-banner --exit-code 1
      - name: sops-guard — 추적된 모든 *.enc.yaml 구조 검증
        # 평문 *.enc.yaml(또는 부분 암호화)을 차단. gate는 setup-toolchain에서 yq를 이미 설치했다.
        run: git ls-files '*.enc.yaml' | xargs -r scripts/sops-guard.sh
      - name: chart render + validate (all kinds)
        run: make chart-test
      - name: memory ledger onboarding gate (M0-owned)
        run: bun run verify:ledger
      - name: registry/binding 정합 게이트 (배포 깨는 드리프트 차단)
        # 차단(--ci)은 배포/노출을 깨는 유형만: orphan-dns(active 행 매니페스트 부재 → 빈 백엔드 DNS),
        # activation-exposure-drift(노출 행 변경 → 재승인 필요).
        # 그 외(원장 행·미등록·incomplete-purge 등)는 비차단(정보/경고). 연결=SealedSecret이라 db/redis 바인딩 검사는 없다.
        run: bun tools/audit-orphans.ts --ci
      - name: skeleton + 네이밍/CJK/dirmap 가드 (required — 기존 verify.yaml non-required서 승격)
        run: bash scripts/check-skeleton.sh
      - name: gate bats suite (run-bats.sh — 단일 수집 SSOT)
        # 수집은 scripts/run-bats.sh 단일 진입점: git-tracked test_*.bats − platform/charts(chart-test 별도) −
        # tests/.ci-exclude(라이브/docker/age/terraform). make ci 와 동일 호출 → 이중 SSOT 제거.
        # 하드코딩/글롭 누락 클래스를 구조적으로 차단(미접두는 check-skeleton 네이밍 가드가 별도 차단).
        # CI-safe infra 정적 가드(k3s-bootstrap·argocd lint)도 이제 required gate가 보호(죽은 커버리지 해소).
        run: ./scripts/run-bats.sh
      - name: shell script lint (전 추적 .sh)
        # 전 추적 *.sh를 shellcheck — scripts/(DR/파괴적)뿐 아니라 notify.sh(알림 경로)·
        # restore-drill-script.sh·infra/k3s-bootstrap·e2e까지. 벤더 charts/는 untracked라 git ls-files에 안 잡힘.
        run: git ls-files '*.sh' | xargs shellcheck
      - name: actionlint — 워크플로 정적 검사(run 셸인젝션·표현식·문법)
        # required gate 잡 안 스텝(별도 잡이면 비-required라 무성 회귀). setup-toolchain이 설치.
        # .github/actionlint.yaml로 queue:max(2026-05 GA) schema-lag 오탐만 좁게 무시(직렬화 계약 유지).
        run: actionlint
      - name: telegram 메시지 렌더 e2e (containerized AM v0.27)
        # amtool/grep이 못 잡는 inline message Go-template의 실제 컴파일·렌더를 사전 증명한다
        # (한국어 제목·글리프·자동 escape·링크). required gate 잡 스텝 → branch protection이 강제.
        # docker/python3는 ubuntu 러너 기본 제공, yq는 위 install 스텝에서 설치됨.
        run: bash tests/gates/alertmanager-render-e2e.sh
      - name: vector config validate (containerized — render 미차단 vector 의미오류)
        # alertmanager-render-e2e 선례 — kustomize render는 vector config 의미오류를 못 잡는다. docker는 러너 기본.
        run: bash tests/gates/vector-validate.sh
      - name: vmalert rule validate (containerized — render/grep 미차단 룰 expr 오류)
        # grep만으론 오류 PromQL/MetricsQL이 통과(test_vmalert-config는 존재 grep) → vmalert -dryRun으로 파싱 검증.
        run: bash tests/gates/vmalert-rules-validate.sh
      # app-shared .mts가 node strip-types(앱 레포 secret:seal 경로)에서도 실행됨을 required gate가 보장 (A.5 F1·pass3) —
      # 별도 잡이면 비-required라 무성 회귀라 gate 잡 안 스텝으로. node 22.18은 strip-types 실행용 의식적 예외(setup-bun ban 유일 예외).
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4 — node strip-types 실행용
        with: { node-version: "22.18" }
      - run: tests/gates/app-shared-node-smoke.sh
