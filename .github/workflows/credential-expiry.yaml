# 자격증명 만료 감시(메타갭 ④ W1-B) — policy/credential-expiry.json의 만료일을 주 1회 점검해
# D-14 이내 항목을 telegram 경고(⚠️ firing-warning)로 중계한다. 값(토큰) 미보유 — 만료일 원장만. 읽기 전용.
# rc=1(만료 임박)은 잡을 실패시키지 않고 telegram 경고로만(vmalert 경고와 동일 채널 규율);
# rc>=2(체커/원장 형식 오류)는 fail-loud로 잡 실패 → GitHub이 owner에 통지.
name: "🔁 credential-expiry — 자격증명 만료 감시"
run-name: "🔁 credential-expiry — ${{ github.event_name == 'schedule' && '스케줄' || format('수동({0})', github.actor) }}"
on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월 00:00 UTC = 09:00 KST. GHA cron=UTC.
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: credential-expiry
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: actor 가드 (workflow_dispatch 한정 — 스케줄 무영향, B6 전수 가드 불변식)
        if: github.event_name == 'workflow_dispatch'
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ vars.HOMELAB_OWNER }}
        run: |
          # B6 불변식(codex pass3 P3-1): dispatch 진입점은 허용목록(bump-poll) 외 전부 actor 가드.
          [ -n "$OWNER" ] || { echo "::error::repo variable HOMELAB_OWNER 미설정 — actor 가드 fail-closed"; exit 1; }
          [ "$ACTOR" = "$OWNER" ] || { echo "::error::workflow_dispatch는 owner($OWNER)만 실행 가능 — actor=$ACTOR 거부"; exit 1; }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with: { ref: main }
      - id: exp
        # `bash`로 명시 호출 — 실행비트 비의존(bats도 bash 호출이라 계약 일치, F4).
        run: |
          set +e
          out="$(bash scripts/check-credential-expiry.sh --days 14)"; rc=$?
          printf '%s\n' "$out"
          {
            echo "body<<EOF"
            printf '%s\n' "$out"
            echo "EOF"
            echo "rc=$rc"
          } >> "$GITHUB_OUTPUT"
          # rc=1(만료 임박)은 fail시키지 않고 telegram으로만 알린다. rc>=2(오류)는 fail-loud.
          if [ "$rc" -ge 2 ]; then exit "$rc"; fi
      - name: telegram report (만료 임박 시에만)
        if: steps.exp.outputs.rc == '1'
        uses: ./.github/actions/telegram-notify
        with:
          status: firing-warning
          source: 자격만료
          title: 자격증명 만료 임박
          ident: D-14 이내
          body: ${{ steps.exp.outputs.body }}
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
