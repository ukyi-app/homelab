# Self-hosted Renovate — 조직 레포의 의존성(이미지 digest·terraform·k3s/local-path·helm 차트·npm) 자동 갱신 PR.
# 대상은 autodiscover + requireConfig=required로 정한다: renovate.json이 있는 레포만 돈다(설정 = opt-in).
# 트리거 경계: homelab writer App 토큰(Contents+PR+Issues write)으로 PR-first. App 토큰 PR이라 required
# check `gate`가 정상 발화한다(GITHUB_TOKEN PR은 CI가 안 돌아 머지 불가 — App 토큰 필수). 설정은 각 레포의 renovate.json.
# ⚠️ github-actions manager는 renovate.json에서 비활성 — uses: 핀 갱신은 토큰에 workflows:write가 필요한데
#    writer App은 Contents+PR write 전용이다. writer App에 workflows:write 부여(Phase-0) + 아래 토큰에
#    permission-workflows: write 추가 + renovate.json의 "github-actions".enabled=true로 함께 켤 것.
name: "🔁 renovate"
run-name: "🔁 renovate — ${{ github.event_name == 'schedule' && '스케줄' || format('수동({0})', github.actor) }}"
on:
  schedule:
    - cron: "0 19 * * 0" # 일요일 19:00 UTC = 월요일 04:00 KST (renovate.json schedule 창 0-6 Mon 내)
  workflow_dispatch: {}

concurrency:
  group: renovate # 변이 디스패처(homelab-mutation)와 독립 — Renovate는 자체 PR만 만든다
  cancel-in-progress: false

permissions:
  contents: read # 실제 쓰기는 아래 App 토큰이 수행(워크플로 GITHUB_TOKEN은 최소 권한 유지)

jobs:
  # Phase 0(writer App secret 등록) 전 머지되면 매주 실패하지 않도록 — 미설정 시 skip(clean success).
  preflight:
    runs-on: ubuntu-24.04-arm
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: actor 가드 (workflow_dispatch 한정 — 스케줄/기타 트리거 무영향)
        if: github.event_name == 'workflow_dispatch'
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ vars.HOMELAB_OWNER }}
        run: |
          # 디스패치 자격(actions:write)은 워크플로 단위 스코프가 불가 — 허용목록(bump-poll) 외 전 진입점 가드(P2-1).
          [ -n "$OWNER" ] || { echo "::error::repo variable HOMELAB_OWNER 미설정 — actor 가드 fail-closed"; exit 1; }
          [ "$ACTOR" = "$OWNER" ] || { echo "::error::workflow_dispatch는 owner($OWNER)만 실행 가능 — actor=$ACTOR 거부"; exit 1; }
      - id: check
        env:
          WRITER: ${{ secrets.HOMELAB_WRITER_APP_ID }}
        run: |
          if [ -n "$WRITER" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Phase 0 미완(HOMELAB_WRITER_APP_ID 미설정) — renovate skip"
          fi

  renovate:
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      # writer App 토큰: Contents+PR write + Issues write(workflows write 미요청 — github-actions manager 비활성).
      # issues:write는 Dependency Dashboard(#92, ":dependencyDashboard") 쓰기에 필수 — 미요청 시 renovate가
      # "Could not ensure issue"로 대시보드 갱신 실패해 pin-CREATION 추적이 동결된다(2026-07-08 실측·복구).
      # ⚠️ owner를 반드시 준다 — create-github-app-token은 owner가 없으면 토큰을 '현재 레포'로만 스코프한다.
      #    (실측: owner 없이 autodiscover를 켜자 homelab 하나만 발견됐다.) owner만 주고 repositories는 비우면
      #    토큰이 'App이 그 owner에 설치된 모든 레포'를 커버하고, 그게 곧 autodiscover의 실효 범위가 된다.
      #    repositories를 열거하지 않는 이유: 미설치 레포를 적으면 토큰 발급이 hard-fail한다(그 트랩을 피한다).
      #    설치 범위가 좁으면 그 레포는 안 보일 뿐 실패하지 않는다(fail-safe).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }} # 없으면 토큰이 현재 레포로만 스코프된다(위 주석)
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
      - uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_PLATFORM: github
          # 명시 목록 → autodiscover 전환. 명시 목록은 '앱을 새로 만들 때마다 이 줄을 고쳐야 한다'는 수동 단계를
          # 요구했고, 그 단계가 실제로 빠져 page·trip-mate-api가 base 이미지·의존성 갱신을 전혀 못 받고 정체했다.
          # autodiscover의 유일한 위험(원치 않는 레포에 PR)은 requireConfig=required가 구조적으로 막는다:
          # renovate.json이 없는 레포는 disabled-no-config로 스킵된다(실측: files·mac-uptime-guard 자동 제외).
          # 즉 '설정 파일의 존재 = opt-in'이고, 템플릿이 그 설정을 동봉하므로 신규 앱은 자동 편입된다.
          RENOVATE_AUTODISCOVER: "true"
          RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository_owner }}/*" # 조직 밖 레포 차단(App 설치 범위와 이중 방어)
          RENOVATE_REQUIRE_CONFIG: "required" # 기본값이지만 명시한다 — 위 opt-in 메커니즘이 이 값에 걸려 있다
          RENOVATE_ONBOARDING: "false" # 온보딩 PR 금지(설정 없는 레포는 스킵이지 온보딩 대상이 아니다)
          LOG_LEVEL: info
