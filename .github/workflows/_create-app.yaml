# create-app reusable — dispatcher(action=create-app)가 호출한다.
# homelab이 reader App 토큰으로 앱 레포 main HEAD에서 .app-config.yml(+ sealed 시크릿)을 read하고
# 그 HEAD 커밋 SHA로 이미지 태그를 핀한다(앱 레포가 payload로 SHA를 보내지 않음 — 변조 방지).
# 결과물은 PR(required check `gate`) — 사람 머지 = 첫 배포 승인 + 공개 승인.
# apps.json은 active:true로 생성되어 머지 후 iac.yaml이 DNS/tunnel을 적용한다.
name: "🧰 _create-app"
on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string

jobs:
  create:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read # digest 해석(docker imagetools)
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: reader
        with:
          app-id: ${{ secrets.HOMELAB_READER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_READER_APP_PRIVATE_KEY }}
          owner: ukyi-app
          repositories: ${{ inputs.app }} # owner 없는 레포명(= 앱 이름) — 그 레포만 스코프(org는 ukyi-app 고정)
          permission-contents: read
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - name: 앱 레포 config + sealed 시크릿 read (main HEAD)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ukyi-app/${{ inputs.app }}   # org는 ukyi-app 고정 — 앱 이름으로 레포 경로 구성
          ref: main
          token: ${{ steps.reader.outputs.token }}
          path: .apprepo
          sparse-checkout: |
            .app-config.yml
            deploy
      - name: 앱 레포 main HEAD SHA (이미지 태그·digest 핀)
        id: appsha
        run: |
          # 명령치환은 실패를 삼킨다(빈 sha → tag="sha-" → 오해성 "이미지 미존재") — 명시 실패로.
          sha="$(git -C .apprepo rev-parse HEAD)" || { echo "::error::앱 레포 main HEAD 해석 실패"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/setup-bun
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: GHCR digest 해석 (이미지 실존 필수 — 없으면 생성 중단)
        id: img
        env:
          APP: ${{ inputs.app }}
          SHA: ${{ steps.appsha.outputs.sha }}
        run: |
          app="$APP"
          tag="sha-${SHA}"
          digest=$(docker buildx imagetools inspect "ghcr.io/ukyi-app/${app}:${tag}" \
            --format '{{json .Manifest}}' | jq -r .digest) \
            || { echo "::error::이미지 미존재 — 앱 레포에서 빌드(GHCR push) 먼저"; exit 1; }
          { echo "app=$app"; echo "tag=$tag"; echo "digest=$digest"; } >> "$GITHUB_OUTPUT"
      - name: install chart toolchain (render + ledger gate)
        uses: ./.github/actions/setup-toolchain
        with:
          kubeconform: 'true'
          helm: 'true'
          conftest: 'true'
      - name: 생성 + 렌더 게이트 + PR
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }}
          APP: ${{ steps.img.outputs.app }}
          TAG: ${{ steps.img.outputs.tag }}
          DIGEST: ${{ steps.img.outputs.digest }}
          DOMAIN: ${{ vars.HOMELAB_DOMAIN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          [ -n "$DOMAIN" ] || { echo "::error::repo variable HOMELAB_DOMAIN 미설정"; exit 1; }
          [ -f .apprepo/.app-config.yml ] || { echo "::error::.app-config.yml 없음(앱 레포 ukyi-app/${APP}@${TAG#sha-})"; exit 1; }
          sealed_arg=""
          if [ -f ".apprepo/deploy/${APP}-secrets.sealed.yaml" ]; then
            sealed_arg="--sealed .apprepo/deploy/${APP}-secrets.sealed.yaml"
          fi
          # shellcheck disable=SC2086
          bun tools/create-app.ts --config .apprepo/.app-config.yml --app "$APP" \
            --repo "ukyi-app/$APP" --domain "$DOMAIN" --tag "$TAG" --digest "$DIGEST" $sealed_arg \
            | tee /tmp/plan.json
          # 렌더 게이트: 새 values로 공유 차트가 kubeconform-clean하게 렌더되는가 (toolchain은 composite가 설치)
          helm template "$APP" platform/charts/app -f "apps/$APP/deploy/prod/values.yaml" \
            | kubeconform -strict -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                -summary
          # 원장 게이트(PR required check와 동일 검증 선행)
          bun run verify:ledger
          git config user.name "ukyi-homelab-writer[bot]"
          git config user.email "293311924+ukyi-homelab-writer[bot]@users.noreply.github.com"
          branch="create-app/${APP}-${RUN_ID}"
          git checkout -b "$branch"
          git add "apps/${APP}" docs/memory-ledger.md infra/cloudflare/apps.json
          git commit -m "feat: ${APP} 앱 생성 (create-app — digest 핀, 공개 활성화)"
          git push -u origin "$branch"
          {
            echo "create-app 자동 생성 PR입니다. **머지 = 첫 배포 승인 + 공개 승인** (DNS/tunnel은 머지 후 iac.yaml이 적용)."
            echo
            echo '```json'; cat /tmp/plan.json; echo '```'
            echo; echo "### ⚠️ 머지 전 체크리스트"
            jq -r '.checklist[] | "- [ ] " + .' /tmp/plan.json
          } > /tmp/pr-body.md
          gh pr create --base main --head "$branch" \
            --title "feat: ${APP} 앱 생성 (create-app)" --body-file /tmp/pr-body.md
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 앱생성
          title: "${{ job.status == 'success' && '앱 생성 PR' || '앱 생성' }}"
          ident: ${{ inputs.app }}
          body: "${{ job.status == 'success' && 'PR 생성됨(수동 머지 대기)' || '' }}"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
