# 중앙 mutation dispatcher — 모든 생성/파괴 변이의 단일 진입점 (homelab-initiated만).
# 트리거 경계(런북 app-platform): 앱 레포는 어떤 homelab-write 자격도 없다 — owner가 여기서
# workflow_dispatch로 실행하고, homelab이 reader App 토큰으로 앱 레포 config를 SHA 고정 read한다.
# update-image는 이 dispatcher가 아니라 GHCR 폴링(bump-poll.yaml)이 권위 처리한다.
name: dispatch-mutation
on:
  workflow_dispatch:
    inputs:
      action:
        description: create-app|activate-app|update-secrets|create-database|create-cache|teardown-app|teardown-resource|audit
        required: true
      app:
        description: "앱 이름 (activate-app/teardown-app용)"
        required: false
      app_repo:
        description: "ukyi-app/<app> (create-app/update-secrets용)"
        required: false
      sha:
        description: "SHA — create-app/update-secrets: 앱 레포 커밋 SHA(config read), activate-app: homelab 머지 SHA(노출할 revision)"
        required: false
      resource:
        description: "db:<name> | cache:<name> (teardown-resource용)"
        required: false
      spec:
        description: "JSON 스펙 (create-database/create-cache)"
        required: false

# 전역 직렬화: 모든 homelab-mutation 워크플로(dispatcher/bump-poll/iac/tf-reconcile)가 같은 그룹.
# queue: max — 기본(single)은 pending 1건만 유지해 동시 3번째가 대기 건을 취소(변이 누락).
# max는 100건 FIFO 큐잉(2026-05 GA). cancel-in-progress와 병용 불가 — 절대 true로 바꾸지 말 것.
# 잔여 안전망: 스케줄 멱등 reconcile(bump-poll/tf-reconcile)이 취소·실패를 다음 주기에 수렴시킨다.
concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

# 검증/라우팅은 읽기만 — main 쓰기는 각 reusable이 writer App 토큰의 PR-first 경로로 수행한다.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    outputs:
      action: ${{ steps.v.outputs.action }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - id: v
        env:
          ACTION: ${{ github.event.inputs.action }} # owner 입력도 비신뢰 — env 경유, 인라인 보간 금지
          PAYLOAD: ${{ toJSON(github.event.inputs) }}
        run: |
          printf '%s' "$PAYLOAD" > /tmp/payload.json
          node tools/validate-mutation.mjs --action "$ACTION" --payload-file /tmp/payload.json
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

  # ── 라우팅: validator 통과 입력만 reusable로 전달된다 ──────────────────────────────
  create-app:
    needs: validate
    if: needs.validate.outputs.action == 'create-app'
    uses: ./.github/workflows/_create-app.yaml
    with:
      app_repo: ${{ github.event.inputs.app_repo }}
      sha: ${{ github.event.inputs.sha }}
    secrets: inherit
    permissions:
      contents: read
      packages: read

  update-secrets:
    needs: validate
    if: needs.validate.outputs.action == 'update-secrets'
    uses: ./.github/workflows/_update-secrets.yaml
    with:
      app_repo: ${{ github.event.inputs.app_repo }}
      sha: ${{ github.event.inputs.sha }}
    secrets: inherit
    permissions:
      contents: read

  teardown-app:
    needs: validate
    if: needs.validate.outputs.action == 'teardown-app'
    uses: ./.github/workflows/_teardown.yaml
    with:
      app: ${{ github.event.inputs.app }}
    secrets: inherit
    permissions:
      contents: read

  teardown-resource:
    needs: validate
    if: needs.validate.outputs.action == 'teardown-resource'
    uses: ./.github/workflows/_teardown.yaml
    with:
      resource: ${{ github.event.inputs.resource }}
    secrets: inherit
    permissions:
      contents: read

  audit:
    needs: validate
    if: needs.validate.outputs.action == 'audit'
    uses: ./.github/workflows/_audit.yaml
    secrets: inherit
    permissions:
      contents: read

  create-database:
    needs: validate
    if: needs.validate.outputs.action == 'create-database'
    uses: ./.github/workflows/_create-database.yaml
    with:
      spec: ${{ github.event.inputs.spec }}
    secrets: inherit
    permissions:
      contents: read

  create-cache:
    needs: validate
    if: needs.validate.outputs.action == 'create-cache'
    uses: ./.github/workflows/_create-cache.yaml
    with:
      spec: ${{ github.event.inputs.spec }}
    secrets: inherit
    permissions:
      contents: read

  # activate-app만 라우팅 밖 — 클러스터 접근 제약으로 owner 로컬 경로(런북 app-platform).
  route:
    needs: validate
    if: needs.validate.outputs.action == 'activate-app'
    runs-on: ubuntu-24.04-arm
    steps:
      - run: echo "activate-app은 Healthy 게이트에 클러스터 접근이 필요 — 런북의 owner 로컬 절차로 실행"

  # 거부/실패가 조용히 묻히지 않게 — owner는 Actions UI 외에 Telegram으로도 본다
  notify-failure:
    needs: [validate, create-app, update-secrets, teardown-app, teardown-resource, audit, create-database, create-cache, route]
    if: failure()
    runs-on: ubuntu-24.04-arm
    steps:
      # 이 잡은 validate 잡과 분리돼 checkout이 없었다 — 로컬 composite action(telegram-notify)을
      # resolve하려면 레포 체크아웃이 선행돼야 한다(없으면 action.yml 경로 미존재로 실패).
      - uses: actions/checkout@v4
      - name: sanitize action input
        id: safe
        env:
          ACTION: ${{ github.event.inputs.action }}   # 비신뢰 입력 — env 경유(with:에 인라인 보간 금지)
        run: |
          case "$ACTION" in (*[!a-z-]*|"") ACTION="(invalid)";; esac
          echo "ident=action=${ACTION}" >> "$GITHUB_OUTPUT"
      - name: telegram notify
        uses: ./.github/actions/telegram-notify
        with:
          status: failure
          source: 변이
          title: 변이 실행
          ident: ${{ steps.safe.outputs.ident }}
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
