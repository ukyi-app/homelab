# audit reusable — dispatcher(action=audit)가 호출한다. 읽기 전용 드리프트 리포트.
name: _audit
on:
  workflow_call: {}

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: ./.github/actions/setup-node-pnpm
      - name: audit-orphans (읽기 전용)
        id: audit
        run: |
          node tools/audit-orphans.mjs --repo-root . | tee /tmp/audit.json
          echo "count=$(jq -r .count /tmp/audit.json)" >> "$GITHUB_OUTPUT"
      - name: build audit summary
        id: report
        if: always()
        run: |
          # [:20] 캡 제거 — 전 드리프트를 보낸다(notify.sh 4096자 캡이 안전 절단). jq 오류삼킴(|| true)도
          # 제거 — malformed JSON이면 스텝을 깨 조용한 빈 body 전송을 차단(obs-6).
          summary="$(jq -r '.findings[] | "- \(.type): \(.subject)"' /tmp/audit.json)"
          {
            echo "body<<EOF"
            printf '드리프트 건수: %s\n%s\n' "$COUNT" "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          COUNT: ${{ steps.audit.outputs.count }}
      - name: telegram report
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 감사
          title: 드리프트 감사
          ident: ${{ steps.audit.outputs.count }}건
          body: ${{ steps.report.outputs.body }}
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
