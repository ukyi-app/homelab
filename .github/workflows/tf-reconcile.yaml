# 주기적 terraform reconcile — 취소·실패한 apply의 자가 수렴 (권위 안전망).
# push-triggered apply(iac.yaml)가 어떤 이유로든 누락돼도(취소/일시 장애) apps.json↔실제
# DNS/tunnel 드리프트를 다음 주기에 수렴시킨다. queue:max에 의존하지 않는 최후 보루.
name: "🔁 tf-reconcile"
run-name: "🔁 tf-reconcile — ${{ github.event_name == 'schedule' && '스케줄' || format('수동({0})', github.actor) }}"
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

jobs:
  # Phase 0(TF/R2 secrets 등록) 전에 머지되면 스케줄이 매 30분 실패+Telegram 스팸 →
  # 시크릿 부재 시 reconcile을 skip해 run을 깨끗한 성공으로 만든다.
  preflight:
    runs-on: ubuntu-24.04-arm
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: actor 가드 (workflow_dispatch 한정 — 스케줄/기타 트리거 무영향)
        if: github.event_name == 'workflow_dispatch'
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ vars.HOMELAB_OWNER }}
        run: |
          # 디스패치 자격(actions:write)은 워크플로 단위 스코프가 불가 — 허용목록(bump-poll) 외 전 진입점 가드(P2-1).
          [ -n "$OWNER" ] || { echo "::error::repo variable HOMELAB_OWNER 미설정 — actor 가드 fail-closed"; exit 1; }
          [ "$ACTOR" = "$OWNER" ] || { echo "::error::workflow_dispatch는 owner($OWNER)만 실행 가능 — actor=$ACTOR 거부"; exit 1; }
      - id: check
        env:
          CF: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          R2: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          if [ -n "$CF" ] && [ -n "$R2" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Phase 0 미완(TF_CLOUDFLARE_TOKEN/R2_* 미설정) — tf-reconcile skip"
          fi

  reconcile:
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-24.04-arm
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_zone_name: ${{ secrets.TF_DOMAIN }}
      TF_VAR_internal_suffix: home.${{ secrets.TF_DOMAIN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with: { ref: main } # 항상 main 최신 — 머지된 선언 상태가 권위
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: terraform init (R2 backend)
        uses: ./.github/actions/tf-r2-init
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        with:
          root: cloudflare
          state-key: cloudflare/prod/terraform.tfstate
      - name: drift 감지 (plan -out=tf.plan)
        id: drift
        run: |
          set +e
          terraform -chdir=infra/cloudflare plan -input=false -lock-timeout=120s \
            -detailed-exitcode -out=tf.plan
          rc=$?
          set -e
          case "$rc" in
            0) echo "drift=false" >> "$GITHUB_OUTPUT"; echo "드리프트 없음 — no-op" ;;
            2) echo "drift=true" >> "$GITHUB_OUTPUT" ;;
            *) exit "$rc" ;;
          esac
      # drift-2: delete/replace는 무인 apply 금지하되 reconcile 잡은 죽이지 않는다(alert-and-skip) —
      # 합법 teardown(push-apply 취소)이 30분마다 잡을 영구 red로 만드는 것을 막는다. ⚠️ F3: 원자적이라 delete
      # 포함 시 비-delete도 함께 대기. ⚠️ codex pass5 F1: outcome이 아니라 가드의 **typed output**으로 분기 —
      # result=='ok'만 apply, 'blocked-delete'면 alert-and-skip, 'error'(가드 자체 깨짐)면 잡을 loud 실패.
      - name: destroy 가드 (block, alert-and-skip)
        id: guard
        if: steps.drift.outputs.drift == 'true'
        continue-on-error: true
        uses: ./.github/actions/tf-destroy-guard
        with:
          mode: block
          root: infra/cloudflare
          plan: tf.plan
          # allow: app 공개 DNS(app[*]) delete는 자동 apply(차단 제외) — teardown 머지/취소 후 다음 주기에
          # 자동 회수. apex/www(public[*])는 비대상. allow_max=1: 대량 삭제는 자동 허용 취소→차단.
          allow: '^cloudflare_dns_record\.app\['
          allow_max: '1'
      # codex pass5 F1: 가드 내부 오류(plan 손상·jq 부재 등)는 delete 차단과 다르다 — 조용히 skip하지 말고 잡 실패.
      - name: 가드 내부 오류면 잡 실패 (delete 차단과 구분)
        if: steps.drift.outputs.drift == 'true' && steps.guard.outputs.result == 'error'
        run: |
          echo "::error::tf-destroy-guard 내부 오류(result=error) — 가드 신뢰 불가, reconcile 잡 실패시켜 가시화"
          exit 1
      - name: apply (드리프트 + 가드 result=ok일 때만)
        if: steps.drift.outputs.drift == 'true' && steps.guard.outputs.result == 'ok'
        run: terraform -chdir=infra/cloudflare apply -input=false tf.plan
      - name: telegram notify (수렴/실패/delete-차단 시에만)
        if: failure() || steps.drift.outputs.drift == 'true'
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ steps.guard.outputs.result == 'blocked-delete' && 'drift' || (job.status == 'success' && steps.drift.outputs.drift == 'true' && 'drift' || job.status) }}
          source: IaC수렴
          title: IaC 수렴
          ident: "drift=${{ steps.drift.outputs.drift }} guard=${{ steps.guard.outputs.result }} (blocked-delete면 owner 로컬 apply)"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}

  # ── github/tailscale 루트: plan-only 드리프트 가시성 (무인 apply 절대 금지) ──────────────────
  # 이 두 루트는 "신뢰 앵커/고-blast-radius"다: github 루트는 CI가 소비하는 Actions 시크릿(secrets.tf)과
  # branch protection(repo.tf, contexts=["gate"])을 관리하고, tailscale 루트는 ACL/auth-key를 관리한다.
  # CI에서 무인 apply하면 광범위 PAT/OAuth를 CI에 저장해야 해 보안 모델(App 토큰 최소권한·branch protection
  # 우회 불가)을 위반한다. 그래서 cloudflare(좁은 DNS/tunnel 스코프)만 apply하고, 이 둘은 plan만 돌려
  # 드리프트를 알리며 수렴은 owner 로컬 apply로 한다. read 토큰이 시크릿에 없으면 preflight가 skip(Phase-0 토글).
  drift-github:
    runs-on: ubuntu-24.04-arm
    steps:
      - id: pf
        env:
          TOK: ${{ secrets.TF_GITHUB_TOKEN }}
          R2: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          if [ -n "$TOK" ] && [ -n "$R2" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TF_GITHUB_TOKEN/R2_* 미설정 — github 루트 드리프트 체크 skip"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.pf.outputs.configured == 'true'
        with: { ref: main }
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        if: steps.pf.outputs.configured == 'true'
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: terraform init (R2 backend, github)
        if: steps.pf.outputs.configured == 'true'
        uses: ./.github/actions/tf-r2-init
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        with:
          root: github
          state-key: github/prod/terraform.tfstate
      - name: plan (드리프트 감지 — apply 안 함)
        id: drift
        if: steps.pf.outputs.configured == 'true'
        env:
          TF_VAR_github_owner: ${{ secrets.TF_GITHUB_OWNER }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TF_VAR_telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          terraform -chdir=infra/github plan -input=false -lock-timeout=120s -detailed-exitcode -no-color
          rc=$?
          set -e
          case "$rc" in
            0) echo "drift=false" >> "$GITHUB_OUTPUT"; echo "github 드리프트 없음" ;;
            2) echo "drift=true" >> "$GITHUB_OUTPUT"; echo "::warning::github 루트 드리프트 감지 — owner 로컬 apply 필요(CI 무인 apply 금지)" ;;
            *) exit "$rc" ;;
          esac
      - name: telegram notify (드리프트/실패 시에만)
        if: steps.pf.outputs.configured == 'true' && (failure() || steps.drift.outputs.drift == 'true')
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status == 'success' && steps.drift.outputs.drift == 'true' && 'drift' || job.status }}
          source: IaC드리프트
          title: github 루트 드리프트
          ident: "root=github drift=${{ steps.drift.outputs.drift }} (수렴은 owner 로컬 apply)"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}

  drift-tailscale:
    runs-on: ubuntu-24.04-arm
    steps:
      - id: pf
        env:
          TOK: ${{ secrets.TF_TAILSCALE_OAUTH_ID }}
          R2: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          if [ -n "$TOK" ] && [ -n "$R2" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TF_TAILSCALE_OAUTH_ID/R2_* 미설정 — tailscale 루트 드리프트 체크 skip"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.pf.outputs.configured == 'true'
        with: { ref: main }
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        if: steps.pf.outputs.configured == 'true'
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: terraform init (R2 backend, tailscale)
        if: steps.pf.outputs.configured == 'true'
        uses: ./.github/actions/tf-r2-init
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        with:
          root: tailscale
          state-key: tailscale/prod/terraform.tfstate
      - name: plan (드리프트 감지 — apply 안 함)
        id: drift
        if: steps.pf.outputs.configured == 'true'
        env:
          TF_VAR_ts_bootstrap_oauth_id: ${{ secrets.TF_TAILSCALE_OAUTH_ID }}
          TF_VAR_ts_bootstrap_oauth_secret: ${{ secrets.TF_TAILSCALE_OAUTH_SECRET }}
          TF_VAR_internal_suffix: home.${{ secrets.TF_DOMAIN }}
          TF_VAR_dns_nameserver_tailscale_ip: ${{ secrets.TF_TAILSCALE_DNS_NAMESERVER_IP }}
        run: |
          set +e
          terraform -chdir=infra/tailscale plan -input=false -lock-timeout=120s -detailed-exitcode -no-color
          rc=$?
          set -e
          case "$rc" in
            0) echo "drift=false" >> "$GITHUB_OUTPUT"; echo "tailscale 드리프트 없음" ;;
            2) echo "drift=true" >> "$GITHUB_OUTPUT"; echo "::warning::tailscale 루트 드리프트 감지 — owner 로컬 apply 필요(CI 무인 apply 금지)" ;;
            *) exit "$rc" ;;
          esac
      - name: telegram notify (드리프트/실패 시에만)
        if: steps.pf.outputs.configured == 'true' && (failure() || steps.drift.outputs.drift == 'true')
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status == 'success' && steps.drift.outputs.drift == 'true' && 'drift' || job.status }}
          source: IaC드리프트
          title: tailscale 루트 드리프트
          ident: "root=tailscale drift=${{ steps.drift.outputs.drift }} (수렴은 owner 로컬 apply)"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
