# active&&public host의 라이브 DNS resolve 체크 (drift-2 잔여, opt-in 스케줄). apply 실패로 active:true인데
# DNS가 안 생긴 경우를 잡는다. 라이브 DNS 호출은 이 워크플로 안에서만 — required gate는 클러스터리스 유지.
name: "🔁 dns-drift"
run-name: "🔁 dns-drift — ${{ github.event_name == 'schedule' && '스케줄' || format('수동({0})', github.actor) }}"
on:
  schedule:
    - cron: "23 */6 * * *"   # 6시간마다(DNS는 자주 안 변함)
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: dns-drift
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: actor 가드 (workflow_dispatch 한정 — 스케줄/기타 트리거 무영향)
        if: github.event_name == 'workflow_dispatch'
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ vars.HOMELAB_OWNER }}
        run: |
          # 디스패치 자격(actions:write)은 워크플로 단위 스코프가 불가 — 허용목록(bump-poll) 외 전 진입점 가드(P2-1).
          [ -n "$OWNER" ] || { echo "::error::repo variable HOMELAB_OWNER 미설정 — actor 가드 fail-closed"; exit 1; }
          [ "$ACTOR" = "$OWNER" ] || { echo "::error::workflow_dispatch는 owner($OWNER)만 실행 가능 — actor=$ACTOR 거부"; exit 1; }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 — 로컬 telegram-notify 액션 resolve + 체커 실행(F8 가드 충족)
      - uses: ./.github/actions/setup-bun
        with: { install: 'false' }     # dns 체크는 deps 불요
      - id: pf   # active&&public + platform_hosts가 모두 0이면 skip(깨끗한 성공)
        run: |
          # 검사기(dns-drift-check.ts)는 apps.json active&&public + reserved-hosts.json platform_hosts를 둘 다 검사한다.
          # go 게이트도 양쪽을 합산 — apps.json이 비어도 platform_hosts가 있으면 검사(argocd-webhook/files 갭 재발 방지).
          n=$(bun -e 'const a=JSON.parse(require("fs").readFileSync("infra/cloudflare/apps.json","utf8"));process.stdout.write(String(a.filter(r=>r.public&&r.active).length))')
          p=$(bun -e 'let n=0;try{n=(JSON.parse(require("fs").readFileSync("infra/cloudflare/reserved-hosts.json","utf8")).platform_hosts||[]).length}catch{}process.stdout.write(String(n))')
          if [ "$n" -gt 0 ] || [ "$p" -gt 0 ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "go=false" >> "$GITHUB_OUTPUT"; echo "::notice::active&&public + platform_hosts 0 — dns-drift skip"; fi
      - id: check
        if: steps.pf.outputs.go == 'true'
        run: |
          bun tools/dns-drift-check.ts --apps infra/cloudflare/apps.json > /tmp/drift.json
          # ⚠️ codex pass4 F3: drift 알림은 .drift(NXDOMAIN)만 센다 — transient(SERVFAIL/timeout)는 거짓 알림 방지.
          n=$(bun -e 'const o=JSON.parse(require("fs").readFileSync("/tmp/drift.json","utf8"));process.stdout.write(String(o.drift.length))')
          t=$(bun -e 'const o=JSON.parse(require("fs").readFileSync("/tmp/drift.json","utf8"));process.stdout.write(String(o.transient.length))')
          echo "count=$n" >> "$GITHUB_OUTPUT"
          echo "transient=$t" >> "$GITHUB_OUTPUT"
          [ "$t" -gt 0 ] && echo "::warning::DNS resolve 일시 실패 ${t}건(transient — drift 아님, 재확인)"
          cat /tmp/drift.json
      - name: telegram notify (드리프트/실패 시에만)
        if: steps.pf.outputs.go == 'true' && (failure() || steps.check.outputs.count != '0')
        uses: ./.github/actions/telegram-notify
        with:
          # check 스텝 크래시 시 count가 미설정('')이라 count!='0'이 참→'drift'로 오라벨된다.
          # audit.yaml과 동일한 outcome 가드를 앞에 둬 실패는 'failure'로 정확히 표기.
          status: ${{ steps.check.outcome == 'failure' && 'failure' || (steps.check.outputs.count != '0' && 'drift' || job.status) }}
          source: IaC드리프트
          title: DNS 드리프트
          ident: "active&&public host 미해결 ${{ steps.check.outputs.count }}건"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
