# update-image 권위 경로 — GHCR 폴링 bump (앱 레포 자격/입력 0, 트리거 경계 런북 참고).
# 스케줄 멱등: 취소/실패해도 다음 주기가 자동 수렴한다(변이 누락 자가 치유).
# 즉시 반영이 필요하면 owner가 workflow_dispatch로 수동 트리거.
name: "🔁 bump-poll"
run-name: "🔁 bump-poll — ${{ github.event_name == 'schedule' && '스케줄' || format('수동({0})', github.actor) }}"
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

permissions:
  contents: read
  packages: read # docker imagetools inspect — GHCR digest 해석

jobs:
  # Phase 0(App secrets 등록) 전에 이 브랜치가 머지되면 스케줄이 매 10분 실패+Telegram 스팸 →
  # 시크릿 부재 시 poll을 skip해 run을 깨끗한 성공으로 만든다(설정되면 자동 활성).
  preflight:
    runs-on: ubuntu-24.04-arm
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          READER: ${{ secrets.HOMELAB_READER_APP_ID }}
          WRITER: ${{ secrets.HOMELAB_WRITER_APP_ID }}
        run: |
          if [ -n "$READER" ] && [ -n "$WRITER" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Phase 0 미완(HOMELAB_*_APP_ID 미설정) — bump-poll skip"
          fi

  # ── 인가 회수(reconcile) — **독립 job**이다(structure r8 R-27) ────────────────────────────────
  # 왜 job인가(스텝이 아니라): 회수는 **보안 속성**이라 "후보 계획(planning)"의 **가용성에도 완전성에도**
  # 의존해선 안 된다. 예전엔 poll job의 한 스텝이었고 대상 목록을 `/tmp/plan.json`(reader 토큰 + GHCR
  # 플래너의 출력)에서 뽑았다 → **reader 토큰 스텝이 실패하거나, 플래너가 죽거나, 어떤 앱이 플래너 출력에서
  # 빠지기만 해도** 그 앱의 회수는 **아예 시도조차 되지 않았다**(낡은 무장 생존). 의존을 한 칸 옮겼을 뿐
  # (`.action` 필터 → plan.json 존재)이지 끊은 게 아니었다.
  # → 이 job은 **writer 토큰만** 쓰고, reader·docker·플래너 스텝을 **하나도 갖지 않는다**. 대상은 실행기가
  #   `bump-poll/*` **원격 ref**에서 직접 열거한다(app은 브랜치명에서 유도 — 플래너는 입력이 아니다).
  # ⚠️ 양방향 비-기아: 이 job이 실패해도 poll은 돈다(poll의 `if: !cancelled()`), poll이 실패해도 이 job은
  #    이미 돌았다. 실패는 그대로 run을 빨갛게 만든다(telegram 발화).
  # ⚠️ poll이 이 job을 `needs`로 **뒤따르는** 이유는 순서(직렬화)뿐이다 — 두 job이 동시에 같은 PR을
  #    해제하면 한쪽이 "이미 해제됨"으로 실패해 거짓 red가 난다. 성공을 요구하지는 않는다.
  reconcile:
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      # writer App: PR 조회 + auto-merge 해제 (이 job이 쓰는 **유일한** 자격 — reader는 여기 없다)
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - uses: ./.github/actions/setup-bun
      - name: reconcile (낡은 auto-merge 인가 회수 — 대상은 bump-poll/* 네임스페이스, 플래너 무관)
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }} # writer: PR 조회 + auto-merge 해제
        run: |
          # 대상 목록은 **넘기지 않는다**(--app 없음). 넘기는 순간 회수의 완전성이 호출부의 목록에 의존하고,
          # 그 목록이 곧 플래너 출력이면 R-27이 그대로 재발한다. 실행기가 `git ls-remote`로 네임스페이스를
          # 직접 열거하고, 레인은 autoDeploy SSOT(.bindings.json / .image-pin.json)에서 직접 읽는다.
          # 항목별 격리·실패 수집·비-0 종료는 전부 실행기 안에 있다(한 앱의 실패가 나머지를 굶기지 않는다).
          bun tools/ensure-bump-pr.ts --reconcile-only
      - name: telegram notify (실패 시)
        if: failure()
        uses: ./.github/actions/telegram-notify
        with:
          status: failure
          source: 변이
          title: 이미지 폴링 인가 회수
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}

  poll:
    # ⚠️ `!cancelled()` — reconcile이 **실패해도** bump 루프는 돈다(회수 실패가 배포를 정지시키면
    #    억제가 곧 공격 표면이 된다). needs는 **순서**를 위한 것이지 성공 조건이 아니다.
    needs: [preflight, reconcile]
    if: ${{ !cancelled() && needs.preflight.outputs.configured == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      # reader App: 앱 레포 main 커밋/compare 조회 (Contents:read, 앱 레포에만 설치)
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: reader
        with:
          app-id: ${{ secrets.HOMELAB_READER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_READER_APP_PRIVATE_KEY }}
          owner: ukyi-app # cross-repo read — owner 미지정이면 현재 레포로만 제한된다
          permission-contents: read
      # writer App: homelab 브랜치 push + PR (PR-first 쓰기 모델)
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - uses: ./.github/actions/setup-bun
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "plan (신뢰 경계 — 바인딩 + GitHub/GHCR 사실만)"
        env:
          GH_TOKEN: ${{ steps.reader.outputs.token }}
        run: |
          bun tools/poll-ghcr.ts --root . > /tmp/plan.json
          jq -r '.[] | "\(.app): \(.action) \(.reason // "")"' /tmp/plan.json
      # 이 스텝은 **로컬 브랜치·커밋만 준비**한다. 원격 변이(브랜치 push·PR 생성·auto-merge 무장)는
      # 전부 tools/ensure-bump-pr.ts(멱등 실행기 — 조회 → 결정 → 변이)가 한다:
      # 워크플로가 스스로 push/create하면 "열린 PR 확인"이 무의미해져 매 주기 중복 PR이 열린다
      # (실측: 같은 커밋에 11분 사이 PR 3개 — 좀비 2개가 DIRTY + auto-merge 무장으로 잔류).
      # 호출부 계약은 tests/gates/test_bump-poll-callsite.bats가 강제한다.
      - name: bump → PR (멱등 실행기 경유 — 레인은 플래너의 .action 그대로)
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }} # writer: PR 조회·생성·무장 + 브랜치 push
        run: |
          git config user.name "ukyi-homelab-writer[bot]"
          git config user.email "293311924+ukyi-homelab-writer[bot]@users.noreply.github.com"
          # ⚠️ 인가 회수(reconcile)의 실패는 여기 합류하지 않는다 — 그건 **별도 job**이고 스스로 비-0으로
          #    끝나 run을 빨갛게 만든다(R-27). 두 경로는 서로를 굶기지 않는다: 회수가 죽어도 bump는 돌고,
          #    bump가 죽어도 회수는 이미 돌았다.
          failed=""
          jq -c '.[] | select(.action == "bump" or .action == "propose-pr")' /tmp/plan.json > /tmp/bump-items.jsonl
          # ⚠️⚠️ **항목마다 격리한다**(서브셸). 예전엔 `jq … | while read`를 `bash -e` 아래서 돌려, 한 앱이
          #   fail-closed로 죽으면(예: 증명되지 않은 head — 사람이 개입할 때까지 **영구히** 그 상태다)
          #   파이프라인이 통째로 죽어 **그 뒤의 모든 앱이 매 주기 실행기에 도달조차 못 했다**.
          #   pr-sweeper가 이 네임스페이스에서 빠진 지금, 이 루프의 생존성은 가용성이 아니라 **인가 회수의
          #   전제조건**이다(위 reconcile 스텝과 같은 이유 — 낡은 무장은 누군가 방문해야만 회수된다).
          #   실패는 모아 두고 **맨 끝에서** 비-0으로 끝낸다(run은 빨갛게 남고 telegram 알림이 발화한다).
          # ⚠️ `if ! ( … )`의 조건 문맥은 errexit를 끄고 **그 서브셸까지** 전파된다(bash 함정) →
          #   서브셸 안에서 `set -e`를 **명시적으로 다시 켠다**. 안 그러면 bump-tag 실패 뒤에도 커밋·push가 계속된다.
          while IFS= read -r item; do
            [ -n "$item" ] || continue
            app=$(echo "$item" | jq -r .app)
            # 플래너 출력도 한 번 더 정제(심층 방어) — bump-tag.ts가 재검증한다
            case "$app" in ''|*[!a-z0-9-]*) echo "skip suspicious app: '$app'"; continue ;; esac
            if ! (
              set -e
              tag=$(echo "$item" | jq -r .candidate.tag)
              digest=$(echo "$item" | jq -r .candidate.digest)
              # 레인(배포 승인 모델)의 출처는 플래너뿐이다 — .bindings.json의 autoDeploy가 SSOT다.
              # 이 값은 **읽은 그대로** 실행기에 넘어간다(재대입·재해석·하드코딩 전부 금지 — 승인 게이트 우회).
              action=$(echo "$item" | jq -r .action)
              pin=$(echo "$item" | jq -r '.pin // empty')          # 베스포크 레인만 세팅(apps는 empty)
              writePath=$(echo "$item" | jq -r .writePath)          # git add 대상(두 레인 통일)
              git checkout main
              # 결정적 브랜치 — 같은 bump(app+tag)는 언제나 같은 브랜치로 수렴한다(RUN_ID 제거).
              # run마다 브랜치가 달라지면 "이 bump의 열린 PR"을 조회할 대상 자체가 사라진다(중복 PR의 뿌리).
              branch="bump-poll/${app}-${tag}"
              git checkout -b "$branch"
              # races-4 TOCTOU 가드: 플래너가 증명한 from-tag는 plan JSON의 `.current.tag`(plan 시점 스냅샷)다.
              # ⚠️ codex pass1 F2: checkout main 후 values.yaml에서 다시 읽으면 main이 움직여도 그 값이 같이
              # 움직여 "자기 자신과 비교"가 돼 가드가 no-op이 된다 → 반드시 플래너 스냅샷($item.current.tag)을 쓴다.
              # checkout 직후의 실측 image.tag가 이 expect와 다르면(=plan 이후 main 이동) bump-tag가 fail-closed로
              # 중단(stale 증명 push 방지) — 다음 주기가 새 스냅샷으로 다시 plan한다.
              expect=$(echo "$item" | jq -r '.current.tag')
              if [ -n "$pin" ]; then
                bun tools/bump-tag.ts "$app" "$tag" --digest "$digest" --expect-current "$expect" --pin "$pin"
              else
                bun tools/bump-tag.ts "$app" "$tag" --digest "$digest" --expect-current "$expect"
              fi
              # digest-exporter APPS 신선도(codex pass2 P2-2): sha-* 태그는 불변이라 배포 핀만 갱신하면
              # ImageDigestDrift(B2)가 stale 참조로 거짓 드리프트를 낸다 — bump-tag.ts가 같은 실행에서
              # APPS의 동일 앱 항목 태그를 동기 갱신(항목 부재=no-op), 같은 커밋에 포함한다.
              git add "$writePath" platform/victoria-stack/prod/digest-exporter.yaml
              git commit -m "chore: ${app} 이미지를 ${tag}(digest 핀)로 갱신 (GHCR 폴링)"
              # 레인별로 갈리는 건 **제목/본문뿐**이다 — 레인 자체는 양쪽 모두 플래너 값 그대로 넘어간다.
              if [ "$action" = "bump" ]; then
                title="chore: ${app} 이미지 갱신 (자동)"
                body="GHCR 폴링 bump — main reachable + descendant + digest 핀 검증 통과. gate 통과 시 auto-merge."
              else
                title="chore: ${app} 이미지 갱신 (승인 대기)"
                body="autoDeploy:false — **머지 = 배포 승인**. GHCR 폴링이 검증한 후보(digest 핀)."
              fi
              # 실행기: 열린 PR·원격 브랜치를 관측한 뒤에만 변이한다(create/adopt/skip/rebuild + 무장 수렴).
              bun tools/ensure-bump-pr.ts --app "$app" --tag "$tag" --action "$action" \
                --title "$title" --body "$body"
            ); then
              # 이 앱은 이 주기에 아무것도 변이하지 못했다(실행기의 fail-closed는 "이 앱을 건드리지 않는다"는
              # 뜻이지 "run을 죽인다"는 뜻이 아니다) — 나머지 앱은 계속 처리한다.
              echo "::warning::${app}: bump 실행기가 실패했다(fail-closed) — 다른 앱 처리는 계속한다"
              failed="$failed $app"
            fi
          done < /tmp/bump-items.jsonl
          [ -z "$failed" ] || { echo "::error::이번 주기에 실패한 앱:$failed"; exit 1; }
          echo "bump 루프 완료"
      - name: telegram notify (실패 시)
        if: failure()
        uses: ./.github/actions/telegram-notify
        with:
          status: failure
          source: 이미지폴링
          title: 이미지 폴링
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
