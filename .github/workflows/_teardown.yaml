# teardown reusable — dispatcher(action=teardown-app|teardown-resource)가 호출한다.
# 앱 철거: teardown-app.mjs(앱 한정 — DB/캐시 비접촉) 결과를 PR로 — **사람 머지 = 철거 승인**.
# 리소스 철거: dispatcher 계약상 retain만(참조 0 강제 + tombstone 보존).
# purge(--delete-data)는 백업 검증 + 다단계 revision + 라이브 verify가 필요해 워크플로로
# 노출하지 않는다 — owner 로컬 절차(런북 app-platform)로만.
name: _teardown
on:
  workflow_call:
    inputs:
      app:
        required: false
        type: string
        default: ""
      resource:
        required: false
        type: string
        default: ""

jobs:
  teardown:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - uses: ./.github/actions/setup-node-pnpm
      - name: teardown 실행 + PR
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }}
          APP: ${{ inputs.app }} # validator가 형식 강제 — 그래도 env 경유
          RESOURCE: ${{ inputs.resource }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "homelab-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$APP" ]; then
            node tools/teardown-app.mjs --app "$APP" --repo-root . | tee /tmp/plan.json
            subject="teardown-app/${APP}"
            title="chore: ${APP} 앱 철거 (teardown-app)"
            note="앱 한정 철거 — DB/캐시 리소스는 비접촉. active였다면 머지 시 terraform apply가 DNS 회수."
          else
            kind="${RESOURCE%%:*}"; name="${RESOURCE#*:}"
            node tools/teardown-resource.mjs "--${kind}" "$name" --repo-root . | tee /tmp/plan.json
            subject="teardown-resource/${kind}-${name}"
            title="chore: ${RESOURCE} retain tombstone (teardown-resource)"
            note="retain — 산출물 전부 보존 + tombstone(신규 참조 차단). purge는 런북의 owner 절차로만."
          fi
          if [ -z "$(git status --porcelain)" ]; then echo "변경 없음 — 멱등 no-op"; exit 0; fi
          branch="${subject}-${RUN_ID}"
          git checkout -b "$branch"
          # 전체 트리를 통째로 add하면 비신뢰 .apprepo까지 들어간다 → tool이 쓰는 트리만 명시 add.
          # (없는 경로는 git이 조용히 무시 — teardown-app/resource 양쪽을 포괄)
          git add apps/ docs/memory-ledger.md infra/cloudflare/apps.json platform/ 2>/dev/null || true
          git commit -m "$title"
          git push -u origin "$branch"
          {
            echo "$note"
            echo; echo '```json'; cat /tmp/plan.json; echo '```'
          } > /tmp/pr-body.md
          # 철거는 auto-merge 하지 않는다 — 사람 머지 = 승인
          gh pr create --base main --head "$branch" --title "$title" --body-file /tmp/pr-body.md
      - name: telegram notify
        if: always()
        uses: ./.github/actions/telegram-notify
        env:
          APP: ${{ inputs.app }}
          RESOURCE: ${{ inputs.resource }}
          IDENT_FROM_APP_OR_RESOURCE: "1"
        with:
          status: ${{ job.status }}
          source: 해체
          title: 해체
          body: "PR을 확인하세요(머지=승인)"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
