# update-secrets 변이 디스패처 — 앱 SealedSecret 갱신(외부 레포 봉인 시크릿을 main HEAD에서 read → 검증 복사 PR).
# 변이 로직은 _update-secrets.yaml(reusable)에 있다 — 이 파일은 trigger+validate+notify 셸.
name: "✨ update-secrets"
run-name: "✨ update-secrets — ${{ inputs.app }}"
on:
  workflow_dispatch:
    inputs:
      app:
        description: "앱 이름 (= ukyi-app/<app> 레포명)"
        required: true

concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with: { ref: main }
      - uses: ./.github/actions/setup-bun
        with: { install: 'false' }     # validate-mutation 체크는 deps 불요
      - env:
          PAYLOAD: ${{ toJSON(github.event.inputs) }} # owner 입력도 비신뢰 — env 경유, 인라인 보간 금지
        run: |
          printf '%s' "$PAYLOAD" > /tmp/payload.json
          bun tools/validate-mutation.ts --action update-secrets --payload-file /tmp/payload.json

  update-secrets:
    needs: validate
    uses: ./.github/workflows/_update-secrets.yaml
    with:
      app: ${{ github.event.inputs.app }}
    secrets: inherit
    permissions:
      contents: read

  notify:
    needs: [validate, update-secrets]
    if: failure() || cancelled()
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/mutation-notify
        with:
          results: ${{ toJSON(needs) }}
          title: update-secrets 실행
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
