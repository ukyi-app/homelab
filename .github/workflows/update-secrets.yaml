# update-secrets 변이 디스패처 — 앱 SealedSecret 갱신(외부 레포 봉인 시크릿을 main HEAD에서 read → 검증 복사 PR).
# 변이 로직은 _update-secrets.yaml(reusable)에 있다 — 이 파일은 trigger+validate+notify 셸.
name: "✨ update-secrets"
run-name: "✨ update-secrets — ${{ inputs.app_repo }}"
on:
  workflow_dispatch:
    inputs:
      app_repo:
        description: "ukyi-app/<app> — 시크릿 갱신할 앱 레포 (봉인본은 그 레포 main HEAD 기준)"
        required: true

concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: ./.github/actions/setup-bun
        with: { install: 'false' }     # validate-mutation 체크는 deps 불요
      - env:
          PAYLOAD: ${{ toJSON(github.event.inputs) }} # owner 입력도 비신뢰 — env 경유, 인라인 보간 금지
        run: |
          printf '%s' "$PAYLOAD" > /tmp/payload.json
          bun tools/validate-mutation.ts --action update-secrets --payload-file /tmp/payload.json

  update-secrets:
    needs: validate
    uses: ./.github/workflows/_update-secrets.yaml
    with:
      app_repo: ${{ github.event.inputs.app_repo }}
    secrets: inherit
    permissions:
      contents: read

  notify:
    needs: [validate, update-secrets]
    if: failure() || cancelled()
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - id: norm
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          # notify 잡의 job.status는 자기 자신(success)이라 거짓 — 상류 needs로 정규화(취소>실패)
          if printf '%s' "$RESULTS" | grep -q '"result": *"cancelled"'; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/telegram-notify
        with:
          status: ${{ steps.norm.outputs.status }}
          source: 변이
          title: update-secrets 실행
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
