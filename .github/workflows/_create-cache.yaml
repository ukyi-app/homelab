# create-cache reusable — dispatcher(action=create-cache)가 호출한다.
# spec(JSON)은 validate-mutation.mjs를 통과한 입력이지만 비신뢰로 취급해 여기서도
# env 경유 + 화이트리스트 재검증한다(fail-closed, 인라인 보간 금지).
# 산출은 PR-first: provision-cache.mjs가 만든 매니페스트/원장 변경을 브랜치로 push하고
# auto-merge(required check 통과 시) 또는 즉시 squash 머지를 시도한다.
# Telegram 통지는 핸들 이름만 — conn URL/자격은 어떤 경로로도 출력하지 않는다.
name: _create-cache
on:
  workflow_call:
    inputs:
      spec:
        required: true
        type: string

jobs:
  create:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: writer
        with:
          app-id: ${{ secrets.HOMELAB_WRITER_APP_ID }}
          private-key: ${{ secrets.HOMELAB_WRITER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.writer.outputs.token }}
      - uses: ./.github/actions/setup-bun
      - name: spec 재검증 (비신뢰 입력 — env 경유, 화이트리스트 밖 필드 거부)
        id: spec
        env:
          SPEC: ${{ inputs.spec }}
        run: |
          printf '%s' "$SPEC" > /tmp/spec.json
          node - <<'EOF' >> "$GITHUB_OUTPUT"
          const s = JSON.parse(require("node:fs").readFileSync("/tmp/spec.json", "utf8"));
          const extra = Object.keys(s).filter((k) => !["name", "maxmemory_mi"].includes(k));
          if (extra.length) { console.error(`::error::spec 허용 밖 필드: ${extra.join(",")}`); process.exit(1); }
          if (!/^[a-z]([a-z0-9-]{0,27}[a-z0-9])?$/.test(s.name ?? "")) { console.error("::error::spec.name 형식 불량"); process.exit(1); }
          const mm = s.maxmemory_mi ?? 64;
          if (!Number.isInteger(mm) || mm < 16 || mm > 1024) { console.error("::error::spec.maxmemory_mi는 16..1024 정수"); process.exit(1); }
          console.log(`name=${s.name}`);
          console.log(`maxmemory=${mm}`);
          EOF
      - name: kubeseal + conftest 설치
        uses: ./.github/actions/setup-toolchain
        with:
          kubeseal: 'true'
          conftest: 'true'
      - name: provision + 원장 게이트
        env:
          NAME: ${{ steps.spec.outputs.name }}
          MAXMEMORY: ${{ steps.spec.outputs.maxmemory }}
        run: |
          # 봉인 cert는 레포 커밋본을 쓴다 — 없으면 즉시 실패(평문 fallback 금지)
          [ -f tools/sealed-secrets-cert.pem ] || { echo "::error::tools/sealed-secrets-cert.pem 없음 — kubeseal --fetch-cert로 갱신/커밋 필요"; exit 1; }
          node tools/provision-cache.mjs --name "$NAME" --maxmemory-mi "$MAXMEMORY" | tee /tmp/plan.json
          # 원장 게이트(PR required check와 동일 검증 선행 — 초과 시 PR 자체를 만들지 않는다)
          pnpm verify:ledger
      - name: PR 생성 + auto-merge
        env:
          GH_TOKEN: ${{ steps.writer.outputs.token }}
          NAME: ${{ steps.spec.outputs.name }}
          MAXMEMORY: ${{ steps.spec.outputs.maxmemory }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "homelab-bot"
          git config user.email "bot@users.noreply.github.com"
          branch="create-cache/${NAME}-${RUN_ID}"
          git checkout -b "$branch"
          git add platform/cache platform/data-conn docs/memory-ledger.md
          git commit -m "feat: ${NAME} 캐시 생성 (create-cache — Valkey maxmemory ${MAXMEMORY}Mi)"
          git push -u origin "$branch"
          {
            echo "create-cache 자동 생성 PR입니다. 머지 = ArgoCD 싱크(cache-prod) — conn 핸들은 data-conn 등록 후 prod에 나타납니다."
            echo
            echo '```json'; cat /tmp/plan.json; echo '```'
            echo; echo "### ⚠️ 머지 전 체크리스트"
            jq -r '.checklist[] | "- [ ] " + .' /tmp/plan.json
          } > /tmp/pr-body.md
          gh pr create --base main --head "$branch" \
            --title "feat: ${NAME} 캐시 생성 (create-cache)" --body-file /tmp/pr-body.md
          bash scripts/auto-merge-or-fail.sh "$branch"
      - name: telegram notify (핸들 이름만 — URL/자격 금지)
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          status: ${{ job.status }}
          source: 캐시생성
          title: 캐시 생성
          ident: ${{ steps.spec.outputs.name }}
          body: "PR 생성됨(머지 대기) · conn 핸들 cache-${{ steps.spec.outputs.name }}-conn (prod)"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
