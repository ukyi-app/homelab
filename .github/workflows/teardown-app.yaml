# teardown-app 변이 디스패처 — 앱 철거(apps/<app> + apps.json 행 + 원장 행 제거 → 수동 머지 PR).
# 트리거 경계: owner가 여기서 workflow_dispatch로 실행. 변이 로직은 _teardown-app.yaml(reusable).
# 파괴 가드: confirm===app(validate-mutation) + 수동 머지(auto-merge 안 함).
name: "🗑️ teardown-app"
run-name: "🗑️ teardown-app — ${{ inputs.app }}"
on:
  workflow_dispatch:
    inputs:
      app:
        description: "철거할 앱 이름 (apps/<app>)"
        required: true
      confirm:
        description: "확인 — 위 앱 이름을 정확히 다시 입력 (불일치 시 거부)"
        required: true

# 전역 직렬화: 모든 homelab-mutation 워크플로가 같은 그룹. queue: max — pending FIFO.
# cancel-in-progress와 병용 불가(AGENTS.md 함정) — 절대 true 금지.
concurrency:
  group: homelab-mutation
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: actor 가드 (owner 전용 변이 — bump-poll/audit는 비대상)
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ vars.HOMELAB_OWNER }}
        run: |
          # 변이 디스패처는 owner만 트리거 가능. 앱 레포 dispatch 자격(actions:write)이 변이까지
          # 트리거하는 표면을 차단(B11 선행 조건). vars.HOMELAB_OWNER 미설정 시 fail-closed(빈 값 거부 — vacuous 방지).
          [ -n "$OWNER" ] || { echo "::error::repo variable HOMELAB_OWNER 미설정 — actor 가드 fail-closed"; exit 1; }
          [ "$ACTOR" = "$OWNER" ] || { echo "::error::변이 디스패처는 owner($OWNER)만 실행 가능 — actor=$ACTOR 거부"; exit 1; }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with: { ref: main }
      - uses: ./.github/actions/setup-bun
        with: { install: 'false' }     # validate-mutation 체크는 deps 불요
      - env:
          PAYLOAD: ${{ toJSON(github.event.inputs) }} # owner 입력도 비신뢰 — env 경유, 인라인 보간 금지
        run: |
          printf '%s' "$PAYLOAD" > /tmp/payload.json
          bun tools/validate-mutation.ts --action teardown-app --payload-file /tmp/payload.json

  teardown-app:
    needs: validate
    uses: ./.github/workflows/_teardown-app.yaml
    with:
      app: ${{ github.event.inputs.app }}
      confirm: ${{ github.event.inputs.confirm }}   # 파괴 경계(reusable)에서 confirm===app 재검증용
    secrets: inherit
    permissions:
      contents: read

  notify:
    needs: [validate, teardown-app]
    if: failure() || cancelled()
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/mutation-notify
        with:
          results: ${{ toJSON(needs) }}
          title: teardown-app 실행
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
