#cloud-config
# 단일 k3s VM(Debian bookworm arm64)의 호스트 기반 계층, 코드로 커밋된다.
# orb-create.sh가 1회 프로비저닝; VM은 cattle이다(§4).

hostname: k3s
preserve_hostname: false
timezone: Asia/Seoul

packages:
  - systemd-zram-generator      # OS 수준 OOM 완충재 (zstd zram), kubelet은 swap을 모르는 상태 유지
  - openssh-server              # SSH 접근 (OrbStack도 ssh orb를 멀티플렉싱)
  - curl
  - ca-certificates
  - apparmor                    # k3s 기본 컨테이너 런타임이 존재를 전제한다
  - iptables                    # flannel/VXLAN 데이터플레인

package_update: true
package_upgrade: false          # 결정론: apt 드리프트가 아니라 versions.env / 이미지로 고정

users:
  - name: ops
    groups: [sudo]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: true           # 키 전용; OrbStack이 관리 키를 자동 주입한다

write_files:
  # zram: OOM 완충재로 쓰는 ~2 GiB zstd 압축 swap. kubelet의 스케줄링에는 쓰이지
  # 않는다(k3s는 swap을 모른 채 동작); 순수하게 커널 page-reclaim 안전망이다.
  - path: /etc/systemd/zram-generator.conf
    permissions: "0644"
    content: |
      [zram0]
      zram-size = min(ram / 4, 2048)
      compression-algorithm = zstd
      swap-priority = 100

  # journald에 상한을 둬 내장 SSD의 로그가 폭주하지 못하게 한다 (R4 disk-fill 방어).
  - path: /etc/systemd/journald.conf.d/cap.conf
    permissions: "0644"
    content: |
      [Journal]
      Storage=persistent
      SystemMaxUse=512M
      SystemKeepFree=1G
      RuntimeMaxUse=64M

  # sshd 가벼운 하드닝: root 로그인 금지, 키 인증만 허용.
  - path: /etc/ssh/sshd_config.d/10-hardening.conf
    permissions: "0644"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no

  # R7 LAN DNS — OrbStack 포워딩 트리거:
  # OrbStack은 VM에서 LISTEN 중인 포트만 Mac으로 자동 포워딩한다(바인드는 Mac의 *:53,
  # 즉 LAN 인터페이스 포함). adguard-dns의 svclb는 iptables DNAT뿐이라 LISTEN 소켓이
  # 없어 포워딩이 트리거되지 않는다 — 이 더미가 0.0.0.0:53을 점유해 포워딩만 트리거하고,
  # 실제 패킷은 PREROUTING DNAT가 AdGuard로 가로채므로 이 소켓엔 도달하지 않는다.
  # 체인: LAN 기기/라우터 → Mac LAN IP:53 → OrbStack → VM:53(DNAT) → AdGuard.
  - path: /usr/local/lib/dns-forward-trigger.py
    permissions: "0755"
    content: |
      #!/usr/bin/env python3
      import socket, threading
      def tcp_loop():
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          s.bind(("0.0.0.0", 53)); s.listen(5)
          while True:
              c, _ = s.accept(); c.close()
      u = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
      u.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
      u.bind(("0.0.0.0", 53))
      threading.Thread(target=tcp_loop, daemon=True).start()
      while True:
          u.recvfrom(512)

  - path: /etc/systemd/system/dns-forward-trigger.service
    permissions: "0644"
    content: |
      [Unit]
      Description=R7 LAN DNS - OrbStack port-forward trigger for adguard-dns (:53)
      After=network-online.target
      Wants=network-online.target

      [Service]
      ExecStart=/usr/bin/python3 /usr/local/lib/dns-forward-trigger.py
      Restart=always
      RestartSec=3
      # :53 바인드에만 필요한 최소 권한
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE
      NoNewPrivileges=true
      DynamicUser=true

      [Install]
      WantedBy=multi-user.target

runcmd:
  # 스토리지 마운트 포인트. 'internal'은 VM 자체 디스크(내장 SSD, /dev/vdb1 btrfs ~224GiB 실측)에 있다.
  # 진짜 bulk-ssd 티어는 OrbStack이 /mnt/mac/Volumes/homelab (virtiofs)으로 VM에 공유하는
  # 외장 SSD에 있다; 그 경로는 호스트 런북(docs/runbooks/external-ssd.md)으로 프로비저닝되고
  # apply-storage.sh의 외장 SSD 게이트가 강제한다 — 여기서 하지 않는 이유는 첫 부팅 시점에
  # 외장 볼륨이 존재할 필요가 없기 때문. 아래 디렉토리는 apply-storage.sh가
  # BULK_ALLOW_VM_DISK=1 로 실행될 때만 쓰는 VM 디스크 폴백이다(dev; 비영속).
  - [ install, -d, -m, "0700", -o, root, -g, root, /var/lib/rancher/k3s-storage/internal ]
  - [ install, -d, -m, "0700", -o, root, -g, root, /var/lib/rancher/k3s-storage/bulk ]
  # zram + journald 상한을 지금 활성화한다 (이번 부팅부터 바로 효과).
  - [ systemctl, daemon-reload ]
  - [ systemctl, restart, systemd-journald ]
  - [ systemctl, start, "systemd-zram-setup@zram0.service" ]
  - [ systemctl, restart, ssh ]
  # R7 LAN DNS 포워딩 트리거 (위 write_files 참고)
  - [ systemctl, enable, --now, dns-forward-trigger.service ]
