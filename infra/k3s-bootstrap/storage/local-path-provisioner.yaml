apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-path-provisioner-sa
  namespace: local-path-storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-path-provisioner-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumeclaims", "configmaps", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints", "persistentvolumes", "pods"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-path-provisioner-bind
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-path-provisioner-role
subjects:
  - kind: ServiceAccount
    name: local-path-provisioner-sa
    namespace: local-path-storage
---
# ---------- INTERNAL provisioner (StorageClass: standard) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-path-provisioner-internal
  namespace: local-path-storage
spec:
  replicas: 1
  selector:
    matchLabels: { app: local-path-provisioner-internal }
  template:
    metadata:
      labels: { app: local-path-provisioner-internal }
    spec:
      serviceAccountName: local-path-provisioner-sa
      containers:
        - name: local-path-provisioner
          image: rancher/local-path-provisioner:v0.0.30
          imagePullPolicy: IfNotPresent
          command: ["local-path-provisioner"]
          args:
            - start
            - --provisioner-name=homelab.io/local-path-internal
            - --config=/etc/config/config.json
            - --service-account-name=local-path-provisioner-sa
          env:
            - name: POD_NAMESPACE
              value: local-path-storage
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          volumeMounts:
            - { name: config-volume, mountPath: /etc/config/ }
      volumes:
        - name: config-volume
          configMap: { name: local-path-config-internal }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config-internal
  namespace: local-path-storage
data:
  config.json: |
    {
      "nodePathMap": [
        { "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths": ["/var/lib/rancher/k3s-storage/internal"] }
      ]
    }
  setup: |
    #!/bin/sh
    set -eu
    mkdir -m 0777 -p "$VOL_DIR"
  teardown: |
    #!/bin/sh
    set -eu
    rm -rf "$VOL_DIR"
  helperPod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      containers:
        - name: helper-pod
          image: ${LOCAL_PATH_HELPER_IMAGE}
          imagePullPolicy: IfNotPresent
---
# ---------- BULK provisioner (StorageClass: bulk-ssd) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-path-provisioner-bulk
  namespace: local-path-storage
spec:
  replicas: 1
  selector:
    matchLabels: { app: local-path-provisioner-bulk }
  template:
    metadata:
      labels: { app: local-path-provisioner-bulk }
    spec:
      serviceAccountName: local-path-provisioner-sa
      containers:
        - name: local-path-provisioner
          image: rancher/local-path-provisioner:v0.0.30
          imagePullPolicy: IfNotPresent
          command: ["local-path-provisioner"]
          args:
            - start
            - --provisioner-name=homelab.io/local-path-bulk
            - --config=/etc/config/config.json
            - --service-account-name=local-path-provisioner-sa
          env:
            - name: POD_NAMESPACE
              value: local-path-storage
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          volumeMounts:
            - { name: config-volume, mountPath: /etc/config/ }
      volumes:
        - name: config-volume
          configMap: { name: local-path-config-bulk }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config-bulk
  namespace: local-path-storage
data:
  config.json: |
    {
      "nodePathMap": [
        { "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths": ["/var/lib/rancher/k3s-storage/bulk"] }
      ]
    }
  setup: |
    #!/bin/sh
    set -eu
    mkdir -m 0777 -p "$VOL_DIR"
  teardown: |
    #!/bin/sh
    set -eu
    rm -rf "$VOL_DIR"
  helperPod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      containers:
        - name: helper-pod
          image: ${LOCAL_PATH_HELPER_IMAGE}
          imagePullPolicy: IfNotPresent
