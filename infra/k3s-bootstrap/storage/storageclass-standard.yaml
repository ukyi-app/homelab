apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  annotations:
    # Default class: PVCs with no storageClassName land here (Postgres, configs).
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: homelab.io/local-path-internal
# Retain so DB PVs survive a PVC delete/reclaim — never auto-wipe Postgres data.
reclaimPolicy: Retain
# WaitForFirstConsumer is REQUIRED by local-path-provisioner: it creates the hostPath PV on the node
# where the consumer is scheduled, so it CANNOT bind before a consumer exists (Immediate fails with
# "configuration error, no node was specified"). Single-node, so binding still happens as soon as the
# consuming pod (Postgres, VictoriaMetrics/Logs, AdGuard, …) is scheduled.
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
