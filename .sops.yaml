# recipients는 공개키다(커밋해도 안전). 개인키는 레포 밖에서 보관한다(Task 0.4).
# M0이 여기에 실제 공개키 둘 다 채우고, M2는 cluster 키를 소비만 한다.
_recipients:
  - &cluster age1n3j7p70f0unl5dgrjhtr9jxrdntz2a67dtntu446qus9c3jd3fnsp8z960
  - &recovery age154tu9q7922xu46x0rkfm5l9x3ulf9u5at5qvxeaqfx9sgtm7cumq75jdwc

creation_rules:
  # ----- platform prod -----
  - path_regex: platform/.*/prod/.*\.enc\.yaml$
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - *cluster
          - *recovery

  # ----- platform staging (D7에 따라 구조만 미리 마련; 아직 배포 없음) -----
  - path_regex: platform/.*/staging/.*\.enc\.yaml$
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - *cluster
          - *recovery

  # ----- apps prod -----
  - path_regex: apps/.*/prod/.*\.enc\.yaml$
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - *cluster
          - *recovery

  # ----- apps staging (D7에 따라 구조만 미리 마련; 아직 배포 없음) -----
  - path_regex: apps/.*/staging/.*\.enc\.yaml$
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - *cluster
          - *recovery

  # ----- catch-all: 그 외 모든 *.enc.yaml도 암호화 보장 (fail-safe) -----
  - path_regex: \.enc\.yaml$
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - *cluster
          - *recovery
