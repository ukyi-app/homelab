image:
  repo: ghcr.io/ukyi-app/api
  tag: sha-e351da87c47dcd4e1a7c98e165ddba091db9cf3c # bumped by CI write-back (Task 6.16)
kind: api
replicas: 1
resources:
  requests: { cpu: 50m, memory: 64Mi } # Go runtime gate: 32–64Mi
  limits: { cpu: 500m, memory: 64Mi }
env:
  - { name: LOG_LEVEL, value: info }
envFrom:
  - secretRef: { name: api-secrets } # SOPS-decrypted via KSOPS
route:
  host: api.ukyi.app
  paths: [ "/" ]
  public: true
db:
  enabled: true
  migrateCmd: [ "/app/api", "migrate" ]
probes:
  liveness: { path: /healthz }
  readiness: { path: /readyz }
