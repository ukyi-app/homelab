  # 않던 것을 정정 — envFrom secretRef 변경은 파드를 재시작시키지 않으므로(문서화된 함정)
  # 이 값이 유일한 롤링 트리거다. 값 = sha256(sealed 원본 바이트) 앞 16자(update-secrets.ts 규약).
