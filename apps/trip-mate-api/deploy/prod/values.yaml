      name: db-trip-mate-conn # DB conn(TRIP_MATE_DATABASE_URL/_MIGRATE) — create-database 산출
  - secretRef:
      name: cache-trip-mate-conn # 캐시 conn(TRIP_MATE_REDIS_URL) — create-cache 산출
route:
  host: trip-mate-api.ukyi.app
  paths:
    - /
  public: true
probes:
  liveness:
    path: /health
  readiness:
    path: /ready
metrics:
  enabled: false
