# LAN에서 접근 가능한 DNS: type LoadBalancer로 두면 k3s servicelb가 VM 노드 IP에 :53을 노출하고,
# OrbStack이 이를 Mac mini 호스트로 매핑 — LAN 클라이언트는 Mac의 예약된 LAN IP로 접근한다.
# (ClusterIP는 가정 LAN 클라이언트에서 라우팅 불가하므로 DHCP option 6의 대상이 될 수 없다.)
apiVersion: v1
kind: Service
metadata: { name: adguard-dns, namespace: edge }
spec:
  type: LoadBalancer
  selector: { app: adguard }
  ports:
    - { name: dns-udp, port: 53, targetPort: 53, protocol: UDP }
    - { name: dns-tcp, port: 53, targetPort: 53, protocol: TCP }
---
apiVersion: v1
kind: Service
metadata: { name: adguard-ui, namespace: edge }
spec:
  selector: { app: adguard }
  ports: [{ name: http, port: 80, targetPort: 3000 }]
