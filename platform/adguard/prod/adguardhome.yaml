apiVersion: v1
kind: ConfigMap
metadata: { name: adguard-config, namespace: edge, annotations: { argocd.argoproj.io/sync-wave: "-6" } }
data:
  AdGuardHome.yaml: |
    http:
      address: 0.0.0.0:3000
    dns:
      bind_hosts: ["0.0.0.0"]
      port: 53
      upstream_dns:
        - https://dns.cloudflare.com/dns-query   # DoH 업스트림
        - https://dns.quad9.net/dns-query
      bootstrap_dns: ["1.1.1.1", "9.9.9.9"]
      upstream_mode: load_balance
    filtering:
      rewrites:
        # split-horizon: 모든 *.int 이름 → Traefik의 고정 Tailscale IP
        - domain: "*.home.ukyi.app"
          answer: "<STABLE_TAILSCALE_IP>"     # = tailscale ip -4 homelab (Task 3.7)
      protection_enabled: true
    filters:
      - enabled: true
        url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
        name: AdGuard DNS filter
        id: 1
    schema_version: 27
