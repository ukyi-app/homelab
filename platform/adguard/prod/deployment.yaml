apiVersion: apps/v1
kind: Deployment
metadata: { name: adguard, namespace: edge }
spec:
  replicas: 1
  strategy: { type: Recreate } # RWO PVC, 단일 노드
  selector: { matchLabels: { app: adguard } }
  template:
    metadata: { labels: { app: adguard } }
    spec:
      automountServiceAccountToken: false # SA 토큰 불요(k8s API 미사용) — 토큰 탈취 표면 제거(보안 감사 SA-2)
      securityContext:
        fsGroup: 65532 # PVC(conf/work)를 65532 그룹 쓰기 가능으로 — non-root AdGuard의 설정 저장용
      initContainers:
        - name: seed-config
          image: busybox:1.38
          command: ["sh", "-c", "cp -n /seed/AdGuardHome.yaml /opt/adguardhome/conf/AdGuardHome.yaml || true"]
          volumeMounts:
            - { name: seed, mountPath: /seed }
            - { name: data, mountPath: /opt/adguardhome/conf, subPath: conf }
        # GitOps 강제 UI 인증: AdGuard는 users:만 인증 수단(secret/env 네이티브 미지원)이라 PVC의
        # AdGuardHome.yaml .users를 SealedSecret의 bcrypt 해시로 매 시작 set한다(yq 멱등 — UI에서 바꿔도
        # 재시작 시 sealed 값으로 수렴, DR/재배포 일관). seed-config가 먼저 PVC를 채운 뒤 실행돼야 한다(순서 의존).
        # cp -n은 라이브의 기존 users:[]를 덮지 않으므로 이 단계가 라이브에도 인증을 적용하는 유일 경로다.
        - name: inject-auth
          image: mikefarah/yq:4.53.3
          command: ["yq"]
          args:
            - "-i"
            - '.users = [{"name": strenv(AGH_USER), "password": strenv(AGH_PW_HASH)}]'
            - /opt/adguardhome/conf/AdGuardHome.yaml
          env:
            - { name: AGH_USER, value: ukkiee } # username은 비밀이 아니다 — 평문 보관
            - name: AGH_PW_HASH
              valueFrom:
                secretKeyRef: { name: adguard-auth, key: PASSWORD_HASH }
          volumeMounts:
            - { name: data, mountPath: /opt/adguardhome/conf, subPath: conf }
            - { name: tmp, mountPath: /tmp } # yq -i는 /tmp에 임시파일을 쓴다 — readOnlyRootFilesystem과 양립시킴
          securityContext: # setcap 불필요 → 메인 컨테이너와 달리 restricted 완전 충족
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      containers:
        - name: adguard
          image: adguard/adguardhome:v0.107.77@sha256:e6f2b8bcda06064ab055b44933a4f0e983c35558b9cdb8d2e7ab1efcee36d890
          ports:
            - { name: dns-udp, containerPort: 53, protocol: UDP }
            - { name: dns-tcp, containerPort: 53, protocol: TCP }
            - { name: http, containerPort: 3000 }
          volumeMounts:
            - { name: data, mountPath: /opt/adguardhome/conf, subPath: conf }
            - { name: data, mountPath: /opt/adguardhome/work, subPath: work }
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 200m, memory: 192Mi } # OOM-watch: peak 123/128(96%)·블록리스트 성장·LAN DNS → 선제 상향(128→192, edge 행 버퍼 흡수)
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            # AdGuard 공식 이미지는 바이너리에 file capability(setcap)가 있어 NoNewPrivs
            # (allowPrivilegeEscalation:false)와 양립 불가 — exec EPERM으로 CrashLoop(라이브 확인).
            # :53 바인딩용 NET_BIND_SERVICE만 허용하고 나머지는 전부 드랍 유지.
            allowPrivilegeEscalation: true
            capabilities: { drop: ["ALL"], add: ["NET_BIND_SERVICE"] }
      volumes:
        - name: seed
          configMap: { name: adguard-config }
        - name: data
          persistentVolumeClaim: { claimName: adguard-data }
        - name: tmp
          emptyDir: {} # inject-auth yq의 /tmp 임시파일 전용(readOnlyRootFilesystem 양립)
