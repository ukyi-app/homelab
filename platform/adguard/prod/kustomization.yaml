apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: edge # adguard-prod Application의 권위 있는(authoritative) 대상 namespace
resources:
  - pvc.yaml
  - adguardhome.yaml
  - adguard-auth.sealed.yaml # UI 인증 bcrypt 해시(SealedSecret adguard-auth) — inject-auth init이 .users에 주입
  - deployment.yaml
  - service.yaml
  - httproute.yaml # UI를 adguard.home.ukyi.app로 노출(web-internal-tls). 구 tailscale Ingress 대체.
  - networkpolicy.yaml # edge egress 격리(업스트림 DNS만) — 워크로드별 self-isolation
