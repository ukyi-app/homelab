# `cache`(Valkey) 계층의 격리 — database 계층과 같은 클래스의 경계.
# 양방향 default-deny 후 최소 allow만 다시 연다:
#   ingress = prod 앱(6379) + 같은 NS의 백업 잡(6379) + kubelet probe(의도 선언),
#   egress  = DNS(53) 전체 + 백업 잡 전용 allow-all(kube API·R2).
# 소스 측(prod 앱의 egress)은 platform/network-policies/prod의 allow-egress-to-cache가 연다.
# ⚠️ ipBlock에 pod CIDR(10.42.0.0/16)을 절대 넣지 않는다 — "전체 파드 허용"이 되어
# default-deny가 무력화된다(라이브 검증 함정). 피어는 namespaceSelector/podSelector로만.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-default-deny-all
  namespace: cache
spec:
  podSelector: {}            # `cache`의 모든 pod
  policyTypes: [Ingress, Egress]
  # ingress/egress 규칙 없음 => 양방향 전부 거부; 아래 allow들이 최소한만 다시 연다.
---
# Egress: CoreDNS(kube-system)로의 DNS 해석 — 백업 잡의 service DNS 해석에 필요.
# (valkey 자체는 outbound가 없지만 default-deny 아래 전 pod 공통 최소 허용으로 둔다.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-allow-dns-egress
  namespace: cache
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Ingress: prod 앱 → Valkey 6379 (conn SealedSecret cache-<name>-conn 소비자).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-allow-ingress-from-prod
  namespace: cache
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: valkey }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: prod }
      ports:
        - { protocol: TCP, port: 6379 }
---
# Ingress: 같은 NS의 백업 잡(cache-backup) → Valkey 6379 (BGSAVE 트리거 + --rdb 풀).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-allow-ingress-backup
  namespace: cache
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: valkey }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app.kubernetes.io/name: cache-backup }
      ports:
        - { protocol: TCP, port: 6379 }
---
# kubelet tcpSocket probe는 노드(cni0=10.42.0.1)에서 출발한다.
# ⚠️ cidr는 노드(10.42.0.1/32)로만 좁힌다 — /16은 default-deny 무력화(database 쪽과 동일 클래스).
# kube-router는 노드발 트래픽을 정책 평가 전에 이미 허용하므로 이 정책은 CNI 이식성용 의도 선언.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-allow-ingress-kubelet-probes
  namespace: cache
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: valkey }
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.1/32
      ports:
        - { protocol: TCP, port: 6379 }
---
# Egress: 백업 잡 전용 allow-all — kube API(노드:6443)·R2(외부 443)·Valkey(6379)가 필요하다.
# API 서버/외부 오브젝트 스토리지는 namespaceSelector로 표현할 수 없고, ipBlock으로 좁히려다
# pod CIDR 함정(위)을 밟기 쉬워 podSelector 스코프의 allow-all로 연다 — database 계층이
# egress를 잠그지 않는 것과 같은 트레이드오프(platform/cnpg/prod/networkpolicy.yaml 참고).
# valkey pod 자체는 이 정책의 대상이 아니므로 여전히 DNS 외 egress가 없다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cache-allow-backup-egress
  namespace: cache
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: cache-backup }
  policyTypes: [Egress]
  egress:
    - {}
