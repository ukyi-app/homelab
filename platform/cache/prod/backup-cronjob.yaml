# 공용 Valkey 백업 체인 (Task 5.2b) — cache NS의 모든 인스턴스를 순회하며
# BGSAVE 트리거 → 완료 대기 → RDB 네트워크 풀 → R2 업로드 → 신선도 메타 기록.
# teardown-resource --cache <name> --delete-data는 last_success.json(시각/체크섬)을
# 신선도 게이트로 읽는다 — 메타가 낡으면 파괴가 차단된다.
# 인스턴스 PVC는 마운트하지 않는다: RDB는 valkey-cli --rdb(SYNC)로 네트워크에서 받는다.
# ⚠️ CronJob은 k3s VM의 TZ(Asia/Seoul)로 발화한다 — 아래 schedule을 UTC로 읽지 말 것.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cache-backup
  namespace: cache
spec:
  schedule: "45 3 * * *" # 03:45 KST — cnpg 백업(02:30/03:00/04:00 KST)과 창이 겹치지 않게
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cache-backup # NP cache-allow-backup-egress / -ingress-backup 셀렉터
        spec:
          serviceAccountName: cache-backup
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532 # pg-tools 이미지의 USER와 일치
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile: { type: RuntimeDefault }
          initContainers:
            # 1) 디스커버리: component=valkey Service 목록 + 인스턴스별 <name>-acl secret에서
            #    인증 자격 추출. 자격 값은 로그에 출력하지 않는다(파일로만, umask 077).
            - name: discover
              # digest 핀: mutable 태그는 push 때마다 움직인다 (pgdump-hedge와 동일 규약).
              image: ghcr.io/ukyi-app/pg-tools:18-rclone@sha256:9c4cb3572d07c495647be713bf8bbc58a2bf15bbcdd3fc4fc4ae387239cadecf
              command: ["/bin/bash", "-c"]
              env:
                - { name: HOME, value: /work } # kubectl 캐시 경로 (read-only rootfs 대비)
              args:
                - |
                  set -euo pipefail
                  umask 077
                  : > /work/targets
                  for name in $(kubectl -n cache get svc -l app.kubernetes.io/component=valkey \
                      -o jsonpath='{.items[*].metadata.name}'); do
                    kubectl -n cache get secret "${name}-acl" -o jsonpath='{.data.VALKEY_PASSWORD}' \
                      | base64 -d > "/work/${name}.auth"
                    echo "${name}" >> /work/targets
                  done
                  echo "[discover] $(wc -l < /work/targets) instance(s)"
              volumeMounts:
                - { name: work, mountPath: /work }
            # 2) 스냅샷: BGSAVE 트리거 → LASTSAVE 변화 폴링으로 완료 대기 → --rdb로 네트워크 풀
            #    → sha256 체크섬. 인증은 REDISCLI_AUTH env로만(-a 인자는 ps에 노출된다).
            - name: snapshot
              image: valkey/valkey:9.1.0-alpine@sha256:c9b77919daeba2c02ad954d0c844cc4e7142069d177b89c5fd771f405daf9e02 # provision-cache.ts의 VALKEY_IMAGE와 같은 핀 — 함께 올린다
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  while read -r name; do
                    [ -n "$name" ] || continue
                    host="${name}.cache.svc"
                    REDISCLI_AUTH="$(cat "/work/${name}.auth")"; export REDISCLI_AUTH
                    last="$(valkey-cli -h "$host" LASTSAVE)"
                    valkey-cli -h "$host" BGSAVE
                    i=0
                    until [ "$(valkey-cli -h "$host" LASTSAVE)" != "$last" ]; do
                      i=$((i+1))
                      [ "$i" -le 150 ] || { echo "[snapshot] ${name}: BGSAVE timeout"; exit 1; }
                      sleep 2
                    done
                    valkey-cli -h "$host" --rdb "/work/${name}.rdb"
                    sha256sum "/work/${name}.rdb" | cut -d' ' -f1 > "/work/${name}.sha256"
                    echo "[snapshot] ${name} OK"
                  done < /work/targets
              volumeMounts:
                - { name: work, mountPath: /work }
          containers:
            # 3) 업로드: rclone → R2 + 신선도 메타(last_success.json) + 14일 초과분 프루닝.
            - name: upload
              image: ghcr.io/ukyi-app/pg-tools:18-rclone@sha256:9c4cb3572d07c495647be713bf8bbc58a2bf15bbcdd3fc4fc4ae387239cadecf
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  while read -r name; do
                    [ -n "$name" ] || continue
                    KEY="r2:homelab-cache-backups-prod/${name}/rdb/dump-${TS}.rdb"
                    echo "[backup] ${name} -> ${KEY}"
                    rclone copyto "/work/${name}.rdb" "$KEY" --s3-region auto
                    # pg-tools 이미지에는 python3가 없다 — sed로 파싱 (pgdump-hedge와 동일)
                    SIZE="$(rclone size "$KEY" --json | sed -n 's/.*"bytes":\([0-9][0-9]*\).*/\1/p')"
                    test "${SIZE}" -gt 0
                    SHA="$(cat "/work/${name}.sha256")"   # snapshot 단계서 로컬 RDB로 계산(업로드 전 원본)
                    # 라운드트립 무결성: 업로드 사본을 되읽어(rclone cat=GetObject) sha256 재계산 → 로컬 원본과
                    # 대조. size>0만으론 전송 중 절삭/비트플립을 못 잡는다. 불일치면 fail-loud(exit 1)→KubeJobFailed.
                    # sha256sum은 coreutils — 같은 이미지의 base64/wc와 동반 설치. R2 Object-R&W 토큰은 GetObject 허용.
                    REMOTE_SHA="$(rclone cat "$KEY" --s3-region auto | sha256sum | cut -d' ' -f1)"
                    if [ "$REMOTE_SHA" != "$SHA" ]; then
                      echo "[backup] ${name}: 업로드 사본 sha256 불일치 — local=${SHA} remote=${REMOTE_SHA}" >&2
                      exit 1
                    fi
                    # 신선도 메타 — teardown --delete-data 게이트 소스 (시각/체크섬/크기/객체 키)
                    printf '{"instance":"%s","ts":"%s","object":"rdb/dump-%s.rdb","sha256":"%s","bytes":%s}\n' \
                      "$name" "$TS" "$TS" "$SHA" "$SIZE" \
                      | rclone rcat "r2:homelab-cache-backups-prod/${name}/last_success.json" --s3-region auto
                    rclone delete "r2:homelab-cache-backups-prod/${name}/rdb/" --min-age 14d
                    echo "[backup] ${name} OK bytes=${SIZE} sha256=${SHA}"
                  done < /work/targets
              env:
                # R2 Object-R&W 토큰은 ListBuckets/HeadBucket을 거부한다 — rclone의 업로드 전 버킷
                # 체크가 "버킷 없음→CreateBucket(403)"으로 오판하므로 끈다 (라이브 검증 함정).
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
                - { name: HOME, value: /work } # rclone 캐시/설정 경로
              envFrom:
                # RCLONE_CONFIG_R2_*(type/endpoint/access keys) — cnpg-r2-creds와 동일 스키마.
                # optional: 캐시(valkey) 인스턴스 0개면 봉인이 없는 게 정상 — 시크릿 부재 시에도 컨테이너는
                # 기동하고, 빈 targets라 upload 루프가 no-op으로 성공한다(백업 대상 없을 때 매일 DeadlineExceeded
                # 실패 + KubeJobFailed 노이즈 제거). 캐시가 있으면(targets 비지 않음) creds 누락 시 rclone이
                # 실패해 KubeJobFailed로 잡힌다 — 즉 "백업할 게 있는데 creds 없음"만 알림(올바른 fail-loud).
                - secretRef: { name: cache-r2-creds, optional: true }
              volumeMounts:
                - { name: work, mountPath: /work }
          volumes:
            - name: work
              emptyDir: {}
