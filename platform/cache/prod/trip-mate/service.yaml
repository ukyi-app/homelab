# DNS: trip-mate.cache.svc(.cluster.local):6379 — conn 핸들의 host와 일치.
# component=valkey 라벨은 cache-backup CronJob의 인스턴스 디스커버리 셀렉터.
apiVersion: v1
kind: Service
metadata:
  name: trip-mate
  labels:
    app.kubernetes.io/name: trip-mate
    app.kubernetes.io/component: valkey
    app.kubernetes.io/part-of: cache
spec:
  selector:
    app.kubernetes.io/name: trip-mate
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
