apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: { name: files-internal, namespace: files }
spec:
  parentRefs:
    # group/kind 명시 — SSA atomic 리스트(parentRefs) 영구 OutOfSync 함정 회피.
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab
      namespace: gateway
      sectionName: web-internal-tls # *.home.ukyi.app 와일드카드 cert, tailscale 경유
  hostnames:
    - "files.home.ukyi.app"
  rules:
    - matches:
        - path: { type: PathPrefix, value: / } # 전체 /api + /healthz + /readyz
      backendRefs:
        - group: ""
          kind: Service
          name: files-internal
          port: 8080
          weight: 1
