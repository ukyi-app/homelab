# database 네임스페이스 — cnpg-data App이 소유한다(CreateNamespace 대신 명시 선언으로 PSA 라벨 부여).
# wave -3: 시드 Secret(-2)·Cluster(-1)보다 먼저 생성돼 라벨이 처음부터 적용된다.
# enforce=baseline: pg 파드 + 백업·덤프·복원드릴 CronJob 전부 baseline-clean(hostPath/privileged/host-ns 없음).
# restricted는 warn/audit으로만 — 크론잡 컨테이너 하드닝이 끝나면 enforce 승격 신호.
apiVersion: v1
kind: Namespace
metadata:
  name: database
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
