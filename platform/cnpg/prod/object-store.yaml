apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: pg-r2
  namespace: database
spec:
  retentionPolicy: "14d"
  configuration:
    destinationPath: "s3://homelab-pg-backups-prod/"
    endpointURL: "https://52f958915d71663164a60636dc2905ce.r2.cloudflarestorage.com"
    s3Credentials:
      accessKeyId:
        name: cnpg-r2-creds # M2가 시드한 Secret (ns database)
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-r2-creds
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
      maxParallel: 2
    data:
      compression: gzip
      jobs: 2
  # spec.env는 plugin v0.12 CRD 스키마에 없다(SSA 'field not declared in schema'로 라이브 거부)
  # — 사이드카 env는 instanceSidecarConfiguration 아래가 맞다.
  instanceSidecarConfiguration:
    env:
      - name: AWS_REGION
        value: "auto"
