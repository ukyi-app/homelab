apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler-rw # "pg-rw" 금지: 그 이름은 CNPG가 Cluster 자체 rw Service용으로 예약
  namespace: database
spec:
  cluster:
    name: pg
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      # pool_mode는 CNPG 예약 파라미터 — parameters에 두면 vpooler webhook이 생성 자체를 거부한다
      # (라이브 검증: "Invalid or reserved parameter"). poolMode 필드가 동일 동작을 표현한다.
      max_client_conn: "200"
      default_pool_size: "20"
      reserve_pool_size: "5"
  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 200m, memory: 64Mi }
