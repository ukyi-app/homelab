apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pg-pooler-rw # "pg-rw" 금지: 그 이름은 CNPG가 Cluster 자체 rw Service용으로 예약
  namespace: database
spec:
  cluster:
    name: pg
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      # pool_mode는 CNPG 예약 파라미터 — parameters에 두면 webhook이 거부하므로 둘 수 없다.
      # poolMode 필드가 동일 동작을 표현한다.
      max_client_conn: "200"
      default_pool_size: "20"
      reserve_pool_size: "5"
      # transaction 풀링은 클라이언트가 startup으로 보낸 서버 GUC를 거부한다("unsupported startup
      # parameter"). libpq/node-pg 등이 흔히 보내는 항목을 무시하게 해 모든 앱이 풀러와 호환되게 한다.
      # 무시는 "미적용"이므로 실제 강제가 필요한 값(statement_timeout 등)은 서버측 ALTER ROLE ... SET으로 둔다.
      ignore_startup_parameters: extra_float_digits,statement_timeout,idle_in_transaction_session_timeout
  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi } # OOM-watch: peak 63/64(98%·4.8× 스파이크)·DB 풀 → 선제 상향(64→128, database 행 버퍼 흡수)
