apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # Cluster CR; Ready 상태가 앱 migration Job(wave 1)을 게이트
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true # pg_basebackup이 쓰는 관리형 `pg-superuser` Secret(REPLICATION 가능)을 생성 — app 롤과는 별개의 자격증명
  postgresUID: 26
  postgresGID: 26

  postgresql:
    parameters:
      # 호스트 RAM이 아니라 1Gi POD LIMIT 기준 (호스트의 25% = 4GB OOM 함정 회피)
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      work_mem: "8MB"
      maintenance_work_mem: "128MB"
      max_connections: "50"
      archive_timeout: "5min"
      wal_compression: "on"
      max_wal_size: "1GB"
      min_wal_size: "256MB"
    pg_hba:
      # local-basebackup CronJob의 pg_basebackup은 postgres 유저로 REPLICATION 연결을 연다 —
      # CNPG 기본 pg_hba는 replication을 streaming_replica(cert)만 허용하므로 postgres 유저의
      # replication 연결이 거부된다. 아래 두 줄로 명시 허용해야 한다.
      - hostssl replication postgres 10.42.0.0/16 scram-sha-256
      - host replication postgres 10.42.0.0/16 scram-sha-256

  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 1Gi

  storage:
    size: 40Gi
    storageClass: standard # 내장 512GB SSD
  walStorage:
    size: 10Gi
    storageClass: standard # 분리된 WAL PVC, 역시 내장 SSD

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-app-credentials # M2가 시드 (platform/cnpg/prod/app-credentials.enc.yaml, ns database); bootstrap 전에 반드시 존재해야 함 — 이 kustomization의 KSOPS generator가 sync-wave -2에서 렌더 (Cluster의 -1보다 먼저)
      # restore_canary를 git으로 시드한다 — DR 재구축(initdb)에서 자동 복원돼 주간 restore-drill이
      # 수동 재시드 없이 동작한다. postInitApplicationSQL은 app DB에 initdb 시 1회만 실행되고,
      # 기존 클러스터엔 no-op이다(R2 recovery 경로는 base backup의 테이블을 그대로 가져온다).
      postInitApplicationSQL:
        - CREATE TABLE IF NOT EXISTS restore_canary (id serial primary key, ts timestamptz default now())
        - INSERT INTO restore_canary DEFAULT VALUES

  plugins:
    # enabled는 webhook 주입 기본값이지만 명시 — plugins는 listType 미지정(SSA atomic)이라
    # 미기재 시 영구 OutOfSync (HTTPRoute group/kind/weight와 동일 클래스)
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: pg-r2 # -> object-store.yaml의 ObjectStore
        serverName: pg

  # GUI/로컬 직결 전용 admin superuser 롤 — pg_basebackup용 관리형 pg-superuser(enableSuperuserAccess)와
  # 분리된 별도 자격(owner가 TablePlus 등으로 붙는다). 비번은 pg-admin-credentials(KSOPS, wave -2).
  # ★SSA-atomic 리스트: 서버 주입 기본값(ensure/inherit/connectionLimit)을 명시해야 ArgoCD가
  #   OutOfSync 플립을 안 한다(plugins 리스트와 동일 클래스). provision-db는 이 리스트에 owner/ro를
  #   append(보존)한다. 롤명 ukkiee은 seal-secret.mts F2 거부 SSOT(ADMIN_DB_USERS)와 동기 — 변경 시 동반 수정.
  managed:
    roles:
      - name: ukkiee
        ensure: present
        login: true
        superuser: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: pg-admin-credentials
      # page owner — create-database 산출물. ensure/inherit/connectionLimit는 서버 주입 기본값 명시(SSA atomic 리스트)
      - name: page
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: db-page-owner
      # page 읽기전용(모드2 디버깅) — GRANT는 managed role 범위 밖, PR checklist의 SQL 후처리 필요
      - name: page_ro
        ensure: present
        login: true
        inherit: true
        connectionLimit: -1
        passwordSecret:
          name: db-page-ro

  # vmagent의 pod-annotations job(role:pod)이 pg 인스턴스 파드를 발견·scrape하도록
  # prometheus.io/* 주석을 관리형 리소스에 상속시킨다(없으면 cnpg_*/barman_cloud_*/
  # cnpg_pg_stat_archiver_* 시리즈가 통째로 vmsingle에 부재 → R2BackupStale/WALArchiveStalled
  # 가 absent로 오발화/블라인드). Service/PVC에도 같은 주석이 붙지만 vmagent는 role:pod만
  # 쓰므로 무해. 메타데이터 전용 변경이라 파드 재생성/switchover 없음(단일 인스턴스 무중단).
  inheritedMetadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
      prometheus.io/path: "/metrics"

  monitoring:
    enablePodMonitor: false # prometheus.io annotation(inheritedMetadata 상속)으로 scrape (M5)
