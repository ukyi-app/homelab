apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: database
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # Cluster CR; Ready 상태가 앱 migration Job(wave 1)을 게이트
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true # pg_basebackup이 쓰는 관리형 `pg-superuser` Secret(REPLICATION 가능)을 생성 — app 롤과는 별개의 자격증명
  postgresUID: 26
  postgresGID: 26

  postgresql:
    parameters:
      # 호스트 RAM이 아니라 1Gi POD LIMIT 기준 (호스트의 25% = 4GB OOM 함정 회피)
      shared_buffers: "256MB"
      effective_cache_size: "512MB"
      work_mem: "8MB"
      maintenance_work_mem: "128MB"
      max_connections: "50"
      archive_timeout: "5min"
      wal_compression: "on"
      max_wal_size: "1GB"
      min_wal_size: "256MB"
    pg_hba:
      # local-basebackup CronJob의 pg_basebackup은 postgres 유저로 REPLICATION 연결을 연다 —
      # CNPG 기본 pg_hba는 replication을 streaming_replica(cert)만 허용해 거부된다
      # (라이브 검증: "no pg_hba.conf entry for replication connection ... user postgres").
      - hostssl replication postgres 10.42.0.0/16 scram-sha-256
      - host replication postgres 10.42.0.0/16 scram-sha-256

  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 1Gi

  storage:
    size: 40Gi
    storageClass: standard # 내장 512GB SSD
  walStorage:
    size: 10Gi
    storageClass: standard # 분리된 WAL PVC, 역시 내장 SSD

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-app-credentials # M2가 시드 (platform/cnpg/prod/app-credentials.enc.yaml, ns database); bootstrap 전에 반드시 존재해야 함 — 이 kustomization의 KSOPS generator가 sync-wave -2에서 렌더 (Cluster의 -1보다 먼저)

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: pg-r2 # -> Task 4.3의 ObjectStore
        serverName: pg

  monitoring:
    enablePodMonitor: false # prometheus.io annotation으로 scrape (M5)
