apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-daily-r2
  namespace: database
spec:
  schedule: "0 0 3 * * *" # CNPG 6-field cron: 매일 03:00
  immediate: true
  backupOwnerReference: self
  cluster:
    name: pg
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
