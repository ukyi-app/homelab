apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: database

resources:
  - namespace.yaml # database ns(PSA baseline 라벨) — cnpg-data App 소유, wave -3
  - object-store.yaml
  - cluster.yaml
  - pooler.yaml
  - scheduled-backup.yaml
  - basebackup-pvc.yaml
  - basebackup-cronjob.yaml
  - pgdump-hedge-cronjob.yaml
  - restore-drill-rbac.yaml
  - restore-drill-cronjob.yaml
  - networkpolicy.yaml # database 계층 ingress 격리
  - pg-rw-tailscale-service.yaml # pg-rw tailscale LoadBalancer(owner GUI/로컬 직결)

generators:
  - secret-generator.yaml # KSOPS — database ns의 세 가지 시드를 전부 렌더 (아래 참조)

# restore-drill ConfigMap은 소스 스크립트로부터 생성되므로 실행 중인 `drill.sh`가
# 곧 source-of-truth다 — CronJob이 복원 없이 exit 0 할 수 있는 빈/플레이스홀더 경로가
# 존재하지 않는다. 렌더 테스트가 스크립트 내용 존재를 검증한다.
configMapGenerator:
  - name: restore-drill-script
    files:
      - drill.sh=restore-drill-script.sh

generatorOptions:
  disableNameSuffixHash: true # 고정 이름: cnpg-r2-creds, pg-app-credentials, restore-drill-alerting, restore-drill-script
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # 세 시드 + drill 스크립트는 Cluster CR(wave -1)보다 먼저 apply
