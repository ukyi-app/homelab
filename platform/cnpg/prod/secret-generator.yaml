apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: cnpg-drill-secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - r2-creds.enc.yaml # -> Secret cnpg-r2-creds (barman ObjectStore + pg_dump hedge)
  - app-credentials.enc.yaml # -> Secret pg-app-credentials (CNPG initdb owner; Cluster보다 먼저)
  - pg-admin-credentials.enc.yaml # -> Secret pg-admin-credentials (app_admin superuser; managed role passwordSecret, GUI/로컬 직결)
  - restore-drill-alerting.enc.yaml # -> Secret restore-drill-alerting (drill용 Telegram/healthchecks)
