# ensure-role-password PostSync hook Job용 ServiceAccount + 최소권한 RBAC(database ns 한정).
# 비번 Secret '값'은 읽지 않는다(secrets 권한 없음) — 검증은 cluster passwordStatus.resourceVersion
# 채워짐 여부로만 한다. nudge는 Cluster annotate(clusters patch)로 reconcile을 트리거한다.
apiVersion: v1
kind: ServiceAccount
metadata: { name: ensure-role-password, namespace: database }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: ensure-role-password, namespace: database }
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "patch"] # get/list: passwordStatus 읽기 · patch: nudge(annotate, 비번 값 불변)
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["databases"]
    verbs: ["get", "list"] # DB 열거 + applied 상태
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"] # per-DB freshness 마커 upsert(apply = get+create/patch)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: ensure-role-password, namespace: database }
subjects: [{ kind: ServiceAccount, name: ensure-role-password, namespace: database }]
roleRef: { kind: Role, name: ensure-role-password, apiGroup: rbac.authorization.k8s.io }
