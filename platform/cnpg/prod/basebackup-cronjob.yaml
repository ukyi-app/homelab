apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnpg-local-basebackup # job_name=~"cnpg-local-basebackup.*"가 M5의 LocalBasebackupStale에 공급됨
  namespace: database
spec:
  schedule: "30 2 * * *" # 02:30, 03:00 R2 ScheduledBackup보다 먼저
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 4 # pg 재시작/페일오버 창과 겹쳐도 견디도록 (1은 부족 — 짧은 재시작에도 포기)
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            cnpg.io/backupRole: local-basebackup # M5의 알림 셀렉터
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 26
            runAsGroup: 26
            fsGroup: 26
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: basebackup
              image: ghcr.io/cloudnative-pg/postgresql:16.14
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: [ALL] }
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  DEST="/backup/basebackup-${TS}"
                  echo "[basebackup] -> ${DEST}"
                  # kube-router가 새 파드의 네트워크 룰(ClusterIP 라우팅)을 설치하기 전, 파드 첫
                  # 동작으로 pg-rw에 접속하면 RST(Connection refused)가 나고 libpq는 즉시 포기한다
                  # (라이브 검증). pg-rw:5432가 연결 가능해질 때까지 짧게 대기한 뒤 진행한다.
                  for i in $(seq 1 30); do
                    if (exec 3<>/dev/tcp/pg-rw.database.svc/5432) 2>/dev/null; then break; fi
                    echo "[basebackup] waiting for pg-rw:5432 (attempt ${i}/30)"; sleep 1
                  done
                  pg_basebackup \
                    --host=pg-rw.database.svc \
                    --port=5432 \
                    --username="$PGUSER" \
                    --pgdata="${DEST}" \
                    --format=tar --gzip --wal-method=stream \
                    --checkpoint=fast --progress --no-password
                  echo "[basebackup] pruning local copies older than 7 days"
                  find /backup -maxdepth 1 -type d -name 'basebackup-*' -mtime +7 -print -exec rm -rf {} +
                  # 로컬 breadcrumb 파일 (M5는 Job 완료 시각 시계열로 알림을 건다)
                  date -u +%s > /backup/.last_basebackup_ok
              env:
                # pg_basebackup은 REPLICATION 연결을 연다; `app` 롤에는 REPLICATION 권한이 없다.
                # CNPG가 관리하는 superuser secret(enableSuperuserAccess: true로 생성)을 사용한다.
                - name: PGUSER
                  valueFrom:
                    secretKeyRef: { name: pg-superuser, key: username }
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef: { name: pg-superuser, key: password }
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: pg-basebackup-local
