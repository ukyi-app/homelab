# ensure-role-password — ArgoCD PostSync hook Job. cnpg-data가 Synced된 뒤 매 sync마다 실행되어
# 모든 Database CR의 owner/ro 롤 비번이 실제로 적용됐음을 결정적으로 보장한다(#3 회귀 차단).
# 실패(타임아웃 내 미적용)는 비0 종료 = PostSync hook 실패 → cnpg-data Degraded → 알림(fail-closed).
# Job은 불변이므로 BeforeHookCreation으로 매 sync마다 직전 hook Job을 지우고 재생성한다.
apiVersion: batch/v1
kind: Job
metadata:
  name: ensure-role-password
  namespace: database
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0 # 실패는 조용한 재시도가 아니라 Degraded로 표면화돼야 한다(fail-closed)
  activeDeadlineSeconds: 600 # 스크립트 자체 타임아웃(MAX_POLLS×interval)보다 넉넉한 상한
  template:
    metadata:
      labels: { cnpg.io/job: ensure-role-password }
    spec:
      restartPolicy: Never
      serviceAccountName: ensure-role-password
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ensure
          # restore-drill/pgdump-hedge와 동일 digest-pinned 이미지(bash+kubectl). mutable 태그는 몰래
          # 교체될 수 있어 digest 고정 — Renovate가 갱신(다른 cnpg Job과 동반 bump).
          image: ghcr.io/ukyi-app/pg-tools:16-rclone@sha256:b7a4bf228bbba85401a52dfb5fc1302f7154306ee4f2109fe0eed7290a0825ef
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          command: ["/bin/bash", "/scripts/ensure-role-password.sh"]
          env:
            # telegram 알림(best-effort) — restore-drill-alerting 재사용. optional: 미설정이어도 Job은 동작.
            - name: TELEGRAM_BOT_TOKEN
              valueFrom: { secretKeyRef: { name: restore-drill-alerting, key: TELEGRAM_BOT_TOKEN, optional: true } }
            - name: TELEGRAM_CHAT_ID
              valueFrom: { secretKeyRef: { name: restore-drill-alerting, key: TELEGRAM_CHAT_ID, optional: true } }
          volumeMounts:
            - { name: script, mountPath: /scripts }
      volumes:
        - name: script
          configMap: { name: ensure-role-password-script, defaultMode: 0755 }
