apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-restore-drill
  namespace: database
spec:
  schedule: "0 5 * * 0" # 일요일 05:00 — 반복 실행, 모니터링 대상
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 4
  jobTemplate:
    spec:
      backoffLimit: 0 # 실패한 drill은 조용히 재시도가 아니라 페이징되어야 한다
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels: { cnpg.io/job: restore-drill }
        spec:
          restartPolicy: Never
          serviceAccountName: restore-drill
          containers:
            - name: drill
              # digest로 고정(불변): 이 Job은 database ns에서 delete 권한을 가진다; mutable 태그는
              # 몰래 교체될 수 있다. CI가 digest를 기록 — drill 활성화 전에 여기 고정할 것.
              image: ghcr.io/ukyi-app/pg-tools:16-rclone@sha256:a4d8a9cc454dd81691112a53ef20d09aae4d2d8d62f8b5d3d46ceee681487664
              command: ["/bin/bash", "/scripts/drill.sh"]
              env:
                - name: TELEGRAM_BOT_TOKEN
                  valueFrom: { secretKeyRef: { name: restore-drill-alerting, key: TELEGRAM_BOT_TOKEN } }
                - name: TELEGRAM_CHAT_ID
                  valueFrom: { secretKeyRef: { name: restore-drill-alerting, key: TELEGRAM_CHAT_ID } }
                - name: HEALTHCHECKS_URL
                  valueFrom: { secretKeyRef: { name: restore-drill-alerting, key: HEALTHCHECKS_URL } }
                - name: METRICS_PUSH_URL
                  value: "http://vmsingle.observability.svc:8428" # vmsingle import API (M5) — 성공 메트릭이 반드시 적재되어야 함
              volumeMounts:
                - { name: script, mountPath: /scripts }
          volumes:
            - name: script
              configMap: { name: restore-drill-script, defaultMode: 0755 }
