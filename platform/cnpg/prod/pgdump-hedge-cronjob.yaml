apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-dump-hedge-r2
  namespace: database
spec:
  schedule: "0 4 * * *" # 04:00, л‘җ л°ұм—…мқҙ лҒқлӮң л’Ө
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 5400
      template:
        metadata:
          labels:
            cnpg.io/backupRole: pgdump-hedge
        spec:
          restartPolicy: Never
          securityContext: { runAsUser: 26, runAsGroup: 26, fsGroup: 26 }
          containers:
            - name: pgdump-hedge
              # digest н•Җ: mutable нғңк·ёлҠ” build push л•Ңл§ҲлӢӨ мӣҖм§Ғм—¬ мқҳлҸ„м№ҳ м•ҠмқҖ мқҙлҜём§ҖлЎң мӢӨн–үлҗ  мҲҳ мһҲлӢӨ
              # (restore-drill-cronjobкіј лҸҷмқј к·ңм•Ҫ). к°ұмӢ мқҖ bump мІҙмқёмқҙ м•„лӢҲлқј мқҳлҸ„м Ғ м»Өл°ӢмңјлЎңл§Ң.
              image: ghcr.io/ukyi-app/pg-tools:16-rclone@sha256:b7a4bf228bbba85401a52dfb5fc1302f7154306ee4f2109fe0eed7290a0825ef # M6к°Җ л№Ңл“ң (apps/pg-tools/)
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  KEY="r2:homelab-pg-backups-prod/pgdump/app-${TS}.dump.gz"
                  echo "[hedge] pg_dump (custom format) -> ${KEY}"
                  pg_dump --host=pg-rw.database.svc --port=5432 \
                          --username="$PGUSER" --dbname=app \
                          --format=custom --no-password \
                    | gzip -c \
                    | rclone rcat "${KEY}" --s3-region auto
                  echo "[hedge] verify object exists and is non-empty"
                  SIZE="$(rclone size "${KEY}" --json | python3 -c 'import sys,json;print(json.load(sys.stdin)["bytes"])')"
                  test "${SIZE}" -gt 0
                  echo "[hedge] prune dumps older than 14 days"
                  rclone delete r2:homelab-pg-backups-prod/pgdump/ --min-age 14d
                  echo "[hedge] OK size=${SIZE}"
              envFrom:
                - secretRef: { name: cnpg-r2-creds } # M2 мӢңл“ң: RCLONE_CONFIG_R2_* + AWS_* (AWS_REGION=auto)
              env:
                # R2 Object-R&W нҶ нҒ°мқҖ HeadBucketмқ„ кұ°л¶Җн•ңлӢӨ вҖ” rcloneмқҳ м—…лЎңл“ң м „ лІ„нӮ· мІҙнҒ¬к°Җ
                # "лІ„нӮ· м—ҶмқҢвҶ’CreateBucket(403)"мңјлЎң мҳӨнҢҗн•ҳлҜҖлЎң мІҙнҒ¬лҘј лҒҲлӢӨ(лқјмқҙлёҢ кІҖмҰқм—җм„ң нҷ•мқёлҗң quirk).
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
                - name: PGUSER
                  valueFrom: { secretKeyRef: { name: pg-app-credentials, key: username } }
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: pg-app-credentials, key: password } }
