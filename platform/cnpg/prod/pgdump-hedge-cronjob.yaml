apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-dump-hedge-r2
  namespace: database
spec:
  schedule: "0 4 * * *" # 04:00, 두 백업이 끝난 뒤
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 5400
      template:
        metadata:
          labels:
            cnpg.io/backupRole: pgdump-hedge
        spec:
          restartPolicy: Never
          securityContext: { runAsUser: 26, runAsGroup: 26, fsGroup: 26, seccompProfile: { type: RuntimeDefault } }
          containers:
            - name: pgdump-hedge
              # digest 핀: mutable 태그는 build push 때마다 움직여 의도치 않은 이미지로 실행될 수 있다
              # (restore-drill-cronjob과 동일 규약). 갱신은 bump 체인이 아니라 의도적 커밋으로만.
              image: ghcr.io/ukyi-app/pg-tools:16-rclone@sha256:b7a4bf228bbba85401a52dfb5fc1302f7154306ee4f2109fe0eed7290a0825ef # M6가 빌드 (apps/pg-tools/)
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: [ALL] }
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  TS="$(date -u +%Y%m%dT%H%M%SZ)"
                  KEY="r2:homelab-pg-backups-prod/pgdump/app-${TS}.dump.gz"
                  echo "[hedge] pg_dump (custom format) -> ${KEY}"
                  # kube-router가 새 파드의 네트워크 룰(ClusterIP 라우팅)을 설치하기 전, 파드 첫
                  # 동작으로 pg-rw에 접속하면 RST(Connection refused)가 나고 libpq는 즉시 포기한다
                  # (라이브 검증). pg-rw:5432가 연결 가능해질 때까지 짧게 대기한 뒤 진행한다.
                  for i in $(seq 1 30); do
                    if (exec 3<>/dev/tcp/pg-rw.database.svc/5432) 2>/dev/null; then break; fi
                    echo "[hedge] waiting for pg-rw:5432 (attempt ${i}/30)"; sleep 1
                  done
                  pg_dump --host=pg-rw.database.svc --port=5432 \
                          --username="$PGUSER" --dbname=app \
                          --format=custom --no-password \
                    | gzip -c \
                    | rclone rcat "${KEY}" --s3-region auto
                  echo "[hedge] verify object exists and is non-empty"
                  # pg-tools 이미지에는 python3가 없다 — sed로 파싱
                  SIZE="$(rclone size "${KEY}" --json | sed -n 's/.*"bytes":\([0-9][0-9]*\).*/\1/p')"
                  test "${SIZE}" -gt 0
                  echo "[hedge] prune dumps older than 14 days"
                  rclone delete r2:homelab-pg-backups-prod/pgdump/ --min-age 14d
                  echo "[hedge] OK size=${SIZE}"
              envFrom:
                - secretRef: { name: cnpg-r2-creds } # M2 시드: RCLONE_CONFIG_R2_* + AWS_* (AWS_REGION=auto)
              env:
                # R2 Object-R&W 토큰은 HeadBucket을 거부한다 — rclone의 업로드 전 버킷 체크가
                # "버킷 없음→CreateBucket(403)"으로 오판하므로 체크를 끈다.
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
                # pg_dump는 app DB 전체를 떠야 한다 — restore_canary 등 postgres 소유 객체를 app
                # 롤로는 LOCK/덤프할 수 없어 permission denied로 실패한다(라이브 검증). 완전한 논리
                # 백업을 위해 관리형 superuser(pg-superuser)로 접속한다(basebackup과 동일 규약).
                - name: PGUSER
                  valueFrom: { secretKeyRef: { name: pg-superuser, key: username } }
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: pg-superuser, key: password } }
