# platform-components appset이 발견하는 컴포넌트들의 대상 네임스페이스.
# appset 템플릿엔 destination.namespace가 없어 CreateNamespace=true가 무효이고(라이브에서
# "namespaces gateway not found"로 확인), 각 컴포넌트 kustomization의 namespace: 트랜스포머는
# Namespace 리소스 자체를 만들지 않는다 — 그래서 여기서 일괄 소유한다.
# (database는 cnpg/prod/namespace.yaml이, observability는 victoria 자체 manifest가 담당.
#  cnpg-system·cert-manager는 원격-helm 앱이 CreateNamespace로 만들어 PSA 라벨이 부재였으므로 여기서 일괄 소유.)
#
# PSA(Pod Security Admission): admission 레벨 방어선. 라이브 워크로드는 전부 baseline-clean임을
# 렌더로 확인했다(traefik=LoadBalancer/hostNetwork:false, adguard=NET_BIND_SERVICE[baseline 허용],
# sealed-secrets/cloudflared/valkey 위반 없음). prod는 공유 차트가 restricted 완전 준수(빈 ns,
# 미래 앱도 차트로 준수)라 restricted enforce. 나머지는 baseline enforce + restricted warn/audit로
# 점진 하드닝 신호를 남긴다(adguard setcap·sealed-secrets 등 일부 미준수 항목이 있어 단계적).
apiVersion: v1
kind: Namespace
metadata:
  name: gateway
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지(plan Pass5 #1)
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: edge
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지(plan Pass5 #1)
  labels:
    # adguard는 setcap(NET_BIND_SERVICE)+allowPrivilegeEscalation:true라 restricted 불가 — baseline 강제.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지(plan Pass5 #1)
  labels:
    # 멀티레포 앱은 전부 공유 차트(restricted 완전 준수)로 배포된다 — restricted enforce로
    # 첫 앱부터 강제(현재 인-레포 앱 0 → 무중단 적용).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지(plan Pass5 #1)
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# cache: 앱별 경량 Valkey 인스턴스(platform/cache) — hostPath 없음.
apiVersion: v1
kind: Namespace
metadata:
  name: cache
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지(plan Pass5 #1)
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# homepage: 운영자 진입점 대시보드(platform/homepage). gethomepage는 restricted 완전 준수
# (runAsUser 1000·privesc off·drop ALL·seccomp RuntimeDefault) — restricted enforce.
apiVersion: v1
kind: Namespace
metadata:
  name: homepage
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지(plan Pass5 #1)
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# cnpg-system: CNPG operator(원격 helm, CreateNamespace로 생성되어 PSA 라벨 부재였음). enforce=baseline —
# operator/barman-cloud 파드가 restricted 완전 준수 보장이 없어 baseline floor(admission 0 → baseline로 상향).
# 라이브 검증: dry-run 라벨 위반 0 + 전 pod 템플릿 baseline-clean. namespaces(wave -9)가 operator(-2)보다
# 먼저 생성하므로 operator CreateNamespace는 no-op(소유권 미주장).
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# cert-manager: cert-manager(원격 helm, CreateNamespace로 생성). enforce=baseline(controller/cainjector/
# webhook가 restricted 미보장 — baseline floor). 라이브: dry-run 위반 0 + pod 템플릿 baseline-clean. wave -9 < -3.
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# tailscale: tailscale operator + 그가 생성하는 proxy 파드(ts-* StatefulSet) 전용 ns.
# proxy는 TUN 디바이스+sysctl(net.ipv4.ip_forward)을 위해 init/main 둘 다 privileged=true가 필수라
# baseline/restricted를 만족할 수 없다 → 이 ns만 enforce=privileged로 격리(edge는 baseline 유지,
# adguard/cloudflared의 가드 보존). privileged 권한을 한 워크로드 클래스에 좁게 가둔 의도적 분리
# (2026-06-22: edge baseline 하에서 proxy 재생성이 차단된 인시던트 후속 — 공유 ns privileged 회피).
# warn/audit=restricted로 비준수 신호는 유지.
apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
# files: 자기-호스팅 파일 스토어(platform/files) — bulk-ssd PVC + 2리스너, 비루트·RO루트·drop ALL·
# 포트>1024·setcap 불요 → restricted 완전 준수(homepage와 동급). Prune=false로 ns 삭제 방지.
apiVersion: v1
kind: Namespace
metadata:
  name: files
  annotations:
    argocd.argoproj.io/sync-options: Prune=false # 매니페스트서 빠져도 ns prune(삭제) 금지
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
