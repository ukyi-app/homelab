# 컨트롤러 이름을 kubeseal 기본값에 고정: 차트 기본 fullname은 `sealed-secrets`인데
# kubeseal은 `sealed-secrets-controller`를 찾는다 — 불일치 시 --fetch-cert가 실패한다.
fullnameOverride: sealed-secrets-controller
# 메모리 원장(docs/memory-ledger.md)에 등록된 한도 — 변경 시 원장 행도 함께 갱신.
resources:
  requests: { cpu: 10m, memory: 32Mi }
  limits: { cpu: 200m, memory: 128Mi }
# 보안 감사 후속(NETPOL-4): 컨트롤러에 default-deny + 최소 allow 격리(번들 차트 netpol).
# ingress=service(8080)+metrics(8081) 포트만(kubeseal --fetch-cert + vmagent scrape), egress=apiserver만.
# ⚠️ kubeapiCidr/Port를 명시한다 — 미설정 시 차트가 Helm lookup으로 찾는데 kustomize 렌더(클러스터
#   접근 없음)에선 빈값이 되어 egress가 깨진다. ★apiserver는 kube-router가 ClusterIP를 노드
#   InternalIP:6443으로 DNAT하고 netpol egress는 DNAT '후' dest를 평가하므로 노드 서브넷:6443을 허용한다
#   (homepage F5 동형). OrbStack VM /24라 VM IP 변경에 durable.
networkPolicy:
  enabled: true
  egress:
    enabled: true
    kubeapiCidr: 192.168.139.0/24 # 노드 InternalIP 192.168.139.92 — DNAT 후 apiserver
    kubeapiPort: 6443
