apiVersion: builtin
kind: HelmChartInflationGenerator
metadata:
  name: sealed-secrets
name: sealed-secrets
repo: https://bitnami-labs.github.io/sealed-secrets
version: 2.18.6 # 버전 고정 (app v0.37.0 — kubeseal CLI도 동일 버전 핀: _create-database.yml)
releaseName: sealed-secrets
namespace: sealed-secrets
includeCRDs: true # SealedSecret CRD는 차트 crds/에 있어 기본 렌더에서 빠진다 — 누락 시 CR apply 전멸
valuesFile: values-sealed-secrets.yaml
