apiVersion: apps/v1
kind: Deployment
metadata: { name: whoami, namespace: gateway, annotations: { argocd.argoproj.io/sync-wave: "-7" } }
spec:
  replicas: 1
  selector: { matchLabels: { app: whoami } }
  template:
    metadata: { labels: { app: whoami } }
    spec:
      automountServiceAccountToken: false # SA 토큰 불요 — smoke 앱, k8s API 미사용(보안 감사 SA-2)
      containers:
        - name: whoami
          image: traefik/whoami:v1.11.0@sha256:200689790a0a0ea48ca45992e0450bc26ccab5307375b41c84dfc4f2475937ab
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 16Mi } # right-size: peak ~4Mi, request=limit 16Mi(4× 마진)
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata: { name: whoami, namespace: gateway }
spec:
  selector: { app: whoami }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
  namespace: gateway
  annotations: { argocd.argoproj.io/sync-wave: "-7" }
spec:
  parentRefs:
    # group/kind/weight는 CRD 기본값이지만 명시 — SSA atomic 리스트의 서버 주입 기본값으로 인한
    # 영구 OutOfSync 방지.
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab
      namespace: gateway
      sectionName: web-internal-tls
  hostnames: ["whoami.home.ukyi.app"]
  rules:
    - matches: [{ path: { type: PathPrefix, value: / } }]
      backendRefs: [{ group: "", kind: Service, name: whoami, port: 80, weight: 1 }]
