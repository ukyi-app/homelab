deployment:
  replicas: 1
providers:
  kubernetesGateway:
    enabled: true
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    enabled: false
gateway:
  enabled: false # GatewayClass + Gateway는 직접 관리한다 (gatewayclass.yaml/gateway.yaml)
gatewayClass:
  enabled: false
service:
  type: LoadBalancer # k3s servicelb가 VM 노드 IP의 :80/:443에 노출
ports:
  web:
    port: 8000
    expose: { default: true }
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 8443
    expose: { default: true }
    exposedPort: 443
    protocol: TCP
logs:
  general:
    format: json
    level: INFO
  access:
    enabled: true
    format: json # JSON → stdout → Vector → VictoriaLogs (M5)
ingressRoute:
  dashboard:
    enabled: false # dashboard는 내부 전용; 여기서 노출하지 않음
resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 500m, memory: 128Mi }
rbac:
  enabled: true # 기본 RBAC; Gateway-API 확장은 rbac-gateway.yaml에서 (Task 3.3)
serviceAccount:
  name: traefik
