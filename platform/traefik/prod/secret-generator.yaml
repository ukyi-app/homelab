apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: traefik-secret-generator
  annotations:
    # --enable-exec 경로로 ksops를 찾게 하는 필수 주석 — 없으면 "unable to find plugin root"로 실패.
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - cloudflare-api-token.enc.yaml # seed-secrets.sh가 시드 → Secret 'cloudflare-api-token' (ns gateway)
