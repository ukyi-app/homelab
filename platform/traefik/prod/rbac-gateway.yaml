apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - tcproutes
      - tlsroutes
      - referencegrants
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses/status
      - gateways/status
      - httproutes/status
      - tcproutes/status
      - tlsroutes/status
    verbs: ["update", "patch"]
  # HTTP-only in-cluster (TLS terminates at the Cloudflare edge + Tailscale, §6/§14),
  # and kubernetesCRD is disabled — so the Gateway controller needs NO cluster-wide
  # Secret read. If a TLS listener is ever added, grant cert Secrets via a namespaced
  # Role (gateway ns + the cert namespace) + ReferenceGrant, never cluster-wide.
  - apiGroups: [""]
    resources: ["services", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-gateway-api
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: gateway
