# Traefik 차트는 serviceAccount.name을 '지정하면' SA를 생성하지 않는다(기존 SA 가정) —
# 라이브에서 'serviceaccount traefik not found'로 파드 생성 거부 확인. 여기서 명시 소유한다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - tcproutes
      - tlsroutes
      - referencegrants
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses/status
      - gateways/status
      - httproutes/status
      - tcproutes/status
      - tlsroutes/status
    verbs: ["update", "patch"]
  # 클러스터 내부는 HTTP 전용 (TLS는 Cloudflare edge + Tailscale에서 종단, §6/§14),
  # kubernetesCRD도 비활성 — 따라서 Gateway 컨트롤러에 클러스터 전역 Secret 읽기 권한이
  # 필요 없다. TLS listener를 추가하게 되면 cert Secret은 namespaced Role(gateway ns +
  # cert namespace) + ReferenceGrant로 부여할 것, 절대 클러스터 전역으로는 금지.
  - apiGroups: [""]
    resources: ["services", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-gateway-api
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-gateway-api
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: gateway
