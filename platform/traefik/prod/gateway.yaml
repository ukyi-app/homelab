# 2026-07-06 결정: traefik(gateway ns) egress default-deny NetworkPolicy 미적용 —
#   백엔드가 동적(전 내부 라우트 대상)이라 allowlist 유지비가 높고, crown-jewel(db/cache)은 대상측
#   ingress default-deny가 gateway ns를 배제해 이미 보호된다. 재검토 조건: 멀티테넌트화 또는 gateway ns의
#   신뢰경계 변화.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab
  namespace: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
spec:
  gatewayClassName: traefik
  listeners:
    - name: web-public
      protocol: HTTP
      port: 8000
      hostname: "*.ukyi.app"
      allowedRoutes:
        namespaces: { from: All }
    # ⚠️ 실사용 라우트 0 — 내부 인입은 tailscale traefik-ts(:443)→websecure(:8443)=web-internal-tls만
    #    거친다. 문서를 따라 HTTPRoute를 이 평문(HTTP:8000) 리스너에 붙이면 내부 host에 도달하지 못한다
    #    (web-internal-tls를 쓸 것). 리스너 자체는 명시성/이력 위해 유지(제거는 별도 결정).
    - name: web-internal
      protocol: HTTP
      port: 8000
      hostname: "*.home.ukyi.app"
      allowedRoutes:
        namespaces: { from: All }
    # internal HTTPS: tailscale 프록시가 TCP passthrough(:443)로 보내면 여기서 와일드카드
    # cert(home-wildcard-tls, cert-issuer.yaml)로 TLS 종단한다. 8443 = Traefik websecure 엔트리포인트.
    - name: web-internal-tls
      protocol: HTTPS
      port: 8443
      hostname: "*.home.ukyi.app"
      tls:
        mode: Terminate
        certificateRefs:
          # group ""는 서버 주입 기본값이지만 명시 — atomic 리스트라 미기재 시 영구 OutOfSync.
          - { group: "", kind: Secret, name: home-wildcard-tls }
      allowedRoutes:
        namespaces: { from: All }
