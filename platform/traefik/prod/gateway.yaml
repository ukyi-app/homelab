apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab
  namespace: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
spec:
  gatewayClassName: traefik
  listeners:
    - name: web-public
      protocol: HTTP
      port: 8000
      hostname: "*.ukyi.app"
      allowedRoutes:
        namespaces: { from: All }
    - name: web-internal
      protocol: HTTP
      port: 8000
      hostname: "*.home.ukyi.app"
      allowedRoutes:
        namespaces: { from: All }
    # internal HTTPS: tailscale 프록시가 TCP passthrough(:443)로 보내면 여기서 와일드카드
    # cert(home-wildcard-tls, cert-issuer.yaml)로 TLS 종단한다. 8443 = Traefik websecure 엔트리포인트.
    - name: web-internal-tls
      protocol: HTTPS
      port: 8443
      hostname: "*.home.ukyi.app"
      tls:
        mode: Terminate
        certificateRefs:
          # group ""는 서버 주입 기본값이지만 명시 — atomic 리스트라 미기재 시 영구 OutOfSync.
          - { group: "", kind: Secret, name: home-wildcard-tls }
      allowedRoutes:
        namespaces: { from: All }
