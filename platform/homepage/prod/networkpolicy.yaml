apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: homepage
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: homepage
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-vmsingle
  namespace: homepage
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { protocol: TCP, port: 8428 }
---
# ★ apiserver egress (F5) — scoped ipBlock만. to 없는 포트온리/광역 금지.
# kube-router가 ClusterIP(10.43.0.1:443)를 apiserver endpoint(노드 InternalIP:6443)로 DNAT하고,
# netpol egress는 DNAT '후' dest를 평가하므로 ClusterIP가 아니라 노드 서브넷:6443을 허용해야 한다.
# (10.43.0.1/32로는 자동발견이 Connection refused로 막혀 전체 실패 — 라이브 확인됨.)
# OrbStack VM 서브넷 /24라 VM IP 변경에 durable. DR로 OrbStack 대역 자체가 바뀌면 갱신.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-apiserver
  namespace: homepage
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 192.168.139.0/24  # OrbStack VM 서브넷(노드 InternalIP 192.168.139.92) — DNAT 후 apiserver
      ports:
        - { protocol: TCP, port: 6443 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-gateway
  namespace: homepage
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: gateway }
      ports:
        - { protocol: TCP, port: 3000 }
---
# kubelet probe 소스(노드 cni0=10.42.0.1). pod CIDR 전체가 아니라 /32만(default-deny 무력화 함정 회피).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-kubelet-probes
  namespace: homepage
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.1/32
      ports:
        - { protocol: TCP, port: 3000 }
