apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
spec:
  parentRefs:
    # group/kind 명시 — SSA atomic 리스트 OutOfSync 함정 회피
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab
      namespace: gateway
      sectionName: web-internal-tls  # *.home.ukyi.app 와일드카드 cert
  hostnames:
    - "dash.home.ukyi.app"
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - group: ""
          kind: Service
          name: homepage
          port: 3000
          weight: 1
