apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # ConfigMap(RO)을 writable emptyDir로 seed. gethomepage는 시작 시 누락 skeleton
        # config(docker.yaml 등)를 /app/config로 copyfile하므로 디렉토리가 writable이어야 한다
        # — RO면 EROFS "required config 초기화 실패" → CrashLoop("no available server").
        # adguard seed-config 동형.
        - name: seed-config
          image: busybox:1.38
          command: ["sh", "-c", "cp -L /tmp/cfg/* /app/config/ 2>/dev/null; true"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - { name: config-src, mountPath: /tmp/cfg, readOnly: true }
            - { name: config, mountPath: /app/config }
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.2  # digest 핀은 Renovate 후속 PR
          ports:
            - containerPort: 3000
              name: http
          env:
            # MY_POD_IP를 먼저 정의 → 아래 $(MY_POD_IP) 치환이 동작
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "dash.home.ukyi.app,$(MY_POD_IP):3000"
          resources:
            # gethomepage(Node.js)는 working_set이 7d 내내 ~125Mi(이전 limit 128의 ~98%)로 천장에 붙어
            # 있어 OOM 임박 — vector와 동일 클래스(만성 과소 limit). limit 128→192Mi, request 64→128Mi로
            # 상향(steady ~125Mi 위 헤드룸 + eviction 보호). 원장 homepage 행 동반 갱신.
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            # writable emptyDir(initContainer가 ConfigMap을 seed). gethomepage가 누락 skeleton을
            # 자유 복사 + /app/config/logs 기록. ConfigMap 변경은 configMapGenerator 해시 →
            # Deployment rollout → initContainer 재seed로 반영(F3).
            - { name: config, mountPath: /app/config }
            # 로고/배경 자산을 RO 디렉토리 마운트(subPath 금지 — EROFS 가드와 양립). gethomepage는
            # 여기 write하지 않고 정적 서빙만 하므로 RO 안전. /app/public/images는 이미지에 없어 섀도잉 0.
            - { name: assets, mountPath: /app/public/images, readOnly: true }
      volumes:
        - name: config
          emptyDir: {}
        - name: config-src
          configMap:
            name: homepage
        - name: assets
          configMap:
            name: homepage-assets   # kustomize가 해시 접미사 자동 치환
