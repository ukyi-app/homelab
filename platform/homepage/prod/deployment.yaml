apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.2  # digest 핀은 Renovate 후속 PR
          ports:
            - containerPort: 3000
              name: http
          env:
            # MY_POD_IP를 먼저 정의 → 아래 $(MY_POD_IP) 치환이 동작
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "dash.home.ukyi.app,$(MY_POD_IP):3000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            # F3: 개별 파일 마운트 대신 config 디렉토리 통째 마운트 — ConfigMap 변경이
            # pod에 전파되고 Homepage가 핫리로드한다. config는 RO, logs만 그 위 emptyDir 중첩.
            - { name: config, mountPath: /app/config, readOnly: true }
            - { name: logs,   mountPath: /app/config/logs }
      volumes:
        - name: config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
