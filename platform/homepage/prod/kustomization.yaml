apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homepage  # homepage-prod Application의 권위 있는 대상 namespace
resources:
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - networkpolicy.yaml
# config는 generator로 — 내용 해시가 이름에 붙어 ConfigMap 변경 시 Deployment가 자동 rollout(F3).
# initContainer(seed-config)가 이 ConfigMap을 writable emptyDir로 복사한다(bookmarks·custom.css/js는
# gethomepage가 skeleton으로 생성 — Ops 북마크는 Platform 타일 자동발견과 중복이라 제거).
configMapGenerator:
  - name: homepage
    files:
      - config/kubernetes.yaml
      - config/settings.yaml
      - config/services.yaml
      - config/widgets.yaml
