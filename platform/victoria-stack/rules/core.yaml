apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules-core
  labels: { vmalert-rule: "true" }
data:
  core.yaml: |
    groups:
      - name: infra
        rules:
          - alert: TargetDown
            expr: up == 0
            for: 5m
            labels: { severity: critical }
            annotations:
              summary: "스크레이프 타깃 {{ $labels.job }}/{{ $labels.instance }} 다운"
              description: "vmagent 타깃이 5분간 도달 불가 상태입니다."
          - alert: NodeMemoryHigh
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.92
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "VM 메모리 사용률 92% 초과"
              description: "노드 메모리 압박 — eviction 임계치에 근접했습니다."
          - alert: PodOOMKilled
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 0 and on(namespace,pod) kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m
            labels: { severity: warning }
            annotations:
              summary: "OOMKill 발생: {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "컨테이너가 메모리 limit에 도달했습니다 — 메모리 원장 예산을 확인하세요."
          # Notifier 자기관측 (R8 보강): Telegram 전송이 실패하면 발화.
          # ⚠️ Watchdog 커버리지 경계 — Watchdog는 "vmalert→Alertmanager 평가 파이프라인이
          #    살아있음"만 증명하고(healthchecks.io의 off-node dead-man's-switch가 그 부재를 페이징),
          #    Alertmanager가 Telegram으로 보내는 마지막 홉, 즉 자기 자신의 전송 실패는 감지하지 못한다.
          #    이 알림이 (부분) 전송실패는 메운다. ⚠️ 한계(의도적 수용): Telegram이 전면 장애면
          #    이 알림 자체도 미도달(자기참조) — off-node 스위치는 *파이프라인 생존*만 증명하지 Telegram
          #    전송은 증명하지 않는다. 전면 장애의 백스톱은 TSDB의 이 메트릭(Grafana)·GitHub 워크플로
          #    실패 알림이며, 완전 독립 비-Telegram 채널은 단일운영자 홈랩에 과설계라 v1 범위 밖.
          - alert: AlertmanagerTelegramFailing
            expr: increase(alertmanager_notifications_failed_total{integration="telegram"}[15m]) > 0
            for: 0m
            labels: { severity: warning }
            annotations:
              summary: "Alertmanager → Telegram 전송 실패 발생"
              description: "최근 15분간 telegram integration의 notifications_failed_total이 증가했다 — HTML parse 오류(escape 누락)·봇 토큰·chat_id·네트워크를 확인하라. 이 알림 자체도 같은 Telegram 경로를 타므로 전면 장애 시엔 미도달할 수 있다 — 그 경우 신호는 이 메트릭(Grafana 대시보드)·GitHub 워크플로 실패 알림이다(off-node 스위치는 pipeline 생존만 증명)."
          # 단일 인스턴스 pg 클러스터(HA 없음)의 생존 — CNPG instance manager의 up 게이지로 판정.
          # cnpg_collector_up은 pg-1에서 직접 scrape돼 라벨이 정확하다(namespace=database,pod=pg-1).
          # ⚠️ kube_pod_status_ready{namespace="database"}는 쓰지 말 것 — pod-annotations scrape가
          # honor_labels 없이 KSM의 namespace/pod를 KSM 파드(observability)로 덮어써 0매치가 되고,
          # absent() 가드가 정상 DB에도 오발화한다(라이브 검증된 함정). != 1은 exporter가 떠 있으나
          # unhealthy인 경우, absent()는 파드 소멸/미스케줄(scrape 단절) 시 fail-closed로 페이징.
          - alert: PostgresClusterDown
            expr: |
              max(cnpg_collector_up{namespace="database"}) != 1
              or absent(cnpg_collector_up{namespace="database"})
            for: 3m
            labels: { severity: critical }
            annotations:
              summary: "PostgreSQL 클러스터 다운(Ready 인스턴스 0)"
              description: "database/pg가 3분 이상 Ready가 아닙니다 — 단일 인스턴스라 전 앱이 의존하는 DB가 중단된 상태입니다. CrashLoop/OOM/Pending/PVC를 확인하세요. 백업 staleness 알림(R2BackupStale 등)은 27시간 뒤에야 발화하므로 이 알림이 1차 페이징입니다."
          # 비-OOM CrashLoop 백스톱(OOM은 PodOOMKilled가 커버) — config/이미지풀/panic 반복 재시작.
          # 블랙리스트(시스템 ns만 제외) — 화이트리스트는 신규 PSA ns(cache·sealed-secrets)를 흘렸다(회귀).
          # honor_labels(#20)로 kube_* namespace가 실제값이라 블랙리스트가 모든 워크로드 ns를 자동 포함.
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace!~"kube-system|kube-public|kube-node-lease"}[15m]) > 3
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "파드 재시작 반복: {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "컨테이너가 15분간 3회 초과 재시작했습니다(CrashLoop) — OOM이 아니면(OOM은 PodOOMKilled가 커버) config/이미지/probe를 확인하세요."
      - name: deadmanswitch
        rules:
          - alert: Watchdog
            expr: vector(1)
            labels: { severity: none }
            annotations:
              summary: "Watchdog: 알림 파이프라인 정상 동작 중."
              description: "항상 발화하는 이 알림은 vmalert→Alertmanager→deadmanswitch(webhook)→healthchecks.io 경로의 생존만 증명합니다(healthchecks.io에서 이 알림의 부재가 곧 page). ⚠️ Telegram 전송은 증명하지 않는다 — Watchdog는 deadmanswitch로만 라우팅됨."
