apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules-r4
  labels: { vmalert-rule: "true" }
data:
  r4.yaml: |
    groups:
      - name: storage-backup
        rules:
          # 외장 1TB SSD(bulk-ssd) 디스크 포화 — 바이트 기준, retention 축출이 가리기 전에 발화
          - alert: BulkSSDFilling
            expr: |
              (node_filesystem_avail_bytes{mountpoint=~".*bulk-ssd.*|/mnt/bulk.*"}
               / node_filesystem_size_bytes{mountpoint=~".*bulk-ssd.*|/mnt/bulk.*"}) < 0.15
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "외장 SSD 여유 공간 15% 미만"
              description: "bulk-ssd(미디어 + 백업 스테이징)가 차오릅니다 — metrics retention 바이트 상한으로는 이 디스크를 구제할 수 없습니다."
          - alert: BulkSSDAlmostFull
            expr: |
              (node_filesystem_avail_bytes{mountpoint=~".*bulk-ssd.*|/mnt/bulk.*"}
               / node_filesystem_size_bytes{mountpoint=~".*bulk-ssd.*|/mnt/bulk.*"}) < 0.05
            for: 5m
            labels: { severity: critical }
            annotations:
              summary: "외장 SSD 여유 공간 5% 미만"
              description: "bulk-ssd가 거의 가득 찼습니다 — 로컬 백업 스테이징과 미디어가 임박한 위험에 처했습니다."
          # 내장 SSD(standard) 디스크 포화 — Postgres + vmsingle 보호
          - alert: StandardSSDFilling
            expr: |
              (node_filesystem_avail_bytes{mountpoint=~"/var/lib/rancher.*|/$"}
               / node_filesystem_size_bytes{mountpoint=~"/var/lib/rancher.*|/$"}) < 0.10
            for: 10m
            labels: { severity: critical }
            annotations:
              summary: "내장 SSD 여유 공간 10% 미만"
              description: "standard SC 디스크 여유 부족 — Postgres PGDATA/WAL이 위험합니다."
          # 백업 생존성: 로컬 CNPG base-backup CronJob(M4)은 매일 완료되어야 한다.
          - alert: LocalBasebackupStale
            expr: |
              (time() - max(kube_job_status_completion_time{job_name=~"cnpg-local-basebackup.*"})) > 100000
              or absent(kube_job_status_completion_time{job_name=~"cnpg-local-basebackup.*"})
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "로컬 base-backup이 stale(27시간 초과)이거나 누락됨"
              description: "복원 사본 2(로컬 1TB SSD)가 위험합니다 — 드라이브 미마운트 또는 CronJob 실패."
          # 백업 생존성: 가장 최근 R2 백업이 계속 갱신되어야 한다 (오프사이트 사본 3).
          - alert: R2BackupStale
            expr: |
              (time() - cnpg_collector_last_available_backup_timestamp) > 100000
              or absent(cnpg_collector_last_available_backup_timestamp)
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "R2 오프사이트 백업이 stale(27시간 초과)이거나 누락됨"
              description: "오프사이트 사본 3(Cloudflare R2)가 최신 백업을 만들지 못했습니다 — DR 사본이 노후화되고 있습니다."
          # 백업 생존성: R2로의 WAL 아카이빙이 오류를 내면 안 된다 (RPO ≈ 5분 목표).
          - alert: WALArchiveStalled
            expr: |
              cnpg_collector_last_failed_archive_time > cnpg_collector_last_archived_time
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "R2로의 WAL 아카이빙 정지(RPO 위험)"
              description: "마지막 실패 아카이브가 마지막 성공 아카이브보다 최신입니다 — 오프사이트 WAL 스트림이 끊겼고 5분 RPO 목표를 충족하지 못합니다."
          # 복원 drill 생존성: M4의 반복 복원 drill이 restore_drill_last_success_timestamp를 push한다.
          - alert: CNPGRestoreDrillStale
            expr: |
              (time() - restore_drill_last_success_timestamp) > 700000
              or absent(restore_drill_last_success_timestamp)
            for: 30m
            labels: { severity: warning }
            annotations:
              summary: "CNPG 복원 drill이 최근에 성공하지 못함"
              description: "반복 R2 복원 drill(M4)이 최신 성공 timestamp를 푸시하지 못했습니다 — 유일하게 검증된 복원 경로가 깨졌을 수 있습니다(R1)."
