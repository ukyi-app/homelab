apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  labels: { app.kubernetes.io/name: vmalert }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: vmalert }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vmalert }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8880" } # 자기관측 룰/notifier 에러 메트릭
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 65534 }
      containers:
        - name: vmalert
          image: victoriametrics/vmalert:v1.103.0
          args:
            - --rule=/rules/core/*.yaml
            - --rule=/rules/r4/*.yaml
            - --rule=/rules/r5/*.yaml
            - --rule=/rules/r6/*.yaml
            - --datasource.url=http://vmsingle:8428
            - --remoteWrite.url=http://vmsingle:8428
            - --remoteRead.url=http://vmsingle:8428
            - --notifier.url=http://alertmanager:9093
            - --evaluationInterval=30s
            # 룰 파일(ConfigMap mount) 변경을 30s마다 감시·자동 reload — 없으면 ArgoCD가 룰을
            # 동기화해도 vmalert가 옛 룰을 계속 평가한다(수동 rollout restart 전까지 silent staleness).
            - --configCheckInterval=30s
            - --httpListenAddr=:8880
          env:
            - { name: GOMEMLIMIT, value: "115MiB" }
          ports: [{ name: http, containerPort: 8880 }]
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits: { memory: 64Mi } # right-size: peak ~26Mi, request=limit 64Mi(2.46× 마진, 버스트 메커니즘 없음)
          readinessProbe: { httpGet: { path: /health, port: 8880 } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: rules-core, mountPath: /rules/core }
            - { name: rules-r4, mountPath: /rules/r4 }
            - { name: rules-r5, mountPath: /rules/r5 }
            - { name: rules-r6, mountPath: /rules/r6 }
      volumes:
        - { name: rules-core, configMap: { name: vmalert-rules-core } }
        - { name: rules-r4, configMap: { name: vmalert-rules-r4 } }
        - { name: rules-r5, configMap: { name: vmalert-rules-r5 } }
        - { name: rules-r6, configMap: { name: vmalert-rules-r6 } }
---
apiVersion: v1
kind: Service
metadata:
  name: vmalert
  labels: { app.kubernetes.io/name: vmalert }
spec:
  selector: { app.kubernetes.io/name: vmalert }
  ports: [{ name: http, port: 8880, targetPort: 8880 }]
