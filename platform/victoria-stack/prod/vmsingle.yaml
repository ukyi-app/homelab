apiVersion: v1
kind: Service
metadata:
  name: vmsingle
  labels: { app.kubernetes.io/name: vmsingle }
spec:
  selector: { app.kubernetes.io/name: vmsingle }
  ports:
    - { name: http, port: 8428, targetPort: 8428 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vmsingle
  labels: { app.kubernetes.io/name: vmsingle }
spec:
  serviceName: vmsingle
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: vmsingle }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vmsingle }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8428" } # 자기관측 vm_* 메트릭
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 65534, fsGroup: 65534, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: vmsingle
          image: victoriametrics/victoria-metrics:v1.145.0
          args:
            - --storageDataPath=/storage
            # retention.maxDiskSpaceUsageBytes는 VictoriaMetrics ENTERPRISE 전용 — 커뮤니티 에디션이
            # "flag not defined"로 거부해 CrashLoop(라이브 확인). 디스크 폭주 가드는 시간 보존(30d)
            # + R4 disk-fill 알림(vmalert)으로 담당한다. (VictoriaLogs 쪽 동일 플래그는 커뮤니티 지원)
            - --retentionPeriod=30d
            - --memory.allowedPercent=60
            - --httpListenAddr=:8428
            - --dedup.minScrapeInterval=30s
          env:
            - { name: GOMEMLIMIT, value: "800MiB" } # 896Mi limit의 약 89%(B2 게이트 ≤limit×0.95=851 준수, right-size 2026-07 B10)
          ports:
            - { name: http, containerPort: 8428 }
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits: { memory: 896Mi } # right-size 2026-07(B10): 라이브 peak ~445Mi(7d) 대비 ~2x, allowedPercent=60이 캐시를 새 예산에 자동 튜닝
          readinessProbe: { httpGet: { path: /health, port: 8428 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 8428 }, initialDelaySeconds: 30 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: storage, mountPath: /storage }
  volumeClaimTemplates:
    - metadata: { name: storage }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources: { requests: { storage: 20Gi } }
