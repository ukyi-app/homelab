apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  labels: { app.kubernetes.io/name: node-exporter }
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: node-exporter }
  template:
    metadata:
      labels: { app.kubernetes.io/name: node-exporter }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      hostPID: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile: { type: RuntimeDefault }
      tolerations:
        - operator: Exists
      containers:
        - name: node-exporter
          image: quay.io/prometheus/node-exporter:v1.11.1
          args:
            - --path.rootfs=/host/root
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --web.listen-address=:9100
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/kubelet/.+)($|/)
          ports:
            - { name: metrics, containerPort: 9100 }
          resources:
            requests: { cpu: 10m, memory: 24Mi }
            limits: { memory: 48Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: proc, mountPath: /host/proc, readOnly: true }
            - { name: sys, mountPath: /host/sys, readOnly: true }
            - { name: root, mountPath: /host/root, readOnly: true, mountPropagation: HostToContainer }
      volumes:
        - { name: proc, hostPath: { path: /proc } }
        - { name: sys, hostPath: { path: /sys } }
        - { name: root, hostPath: { path: / } }
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  labels: { app.kubernetes.io/name: node-exporter }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: node-exporter }
  ports:
    - { name: metrics, port: 9100, targetPort: 9100 }
