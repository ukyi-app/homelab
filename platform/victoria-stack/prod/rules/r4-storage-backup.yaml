apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules-r4
  labels: { vmalert-rule: "true" }
data:
  r4.yaml: |
    groups:
      - name: storage-backup
        rules:
          # 디스크 포화 = PVC 포화: 모든 PV가 hostPath(local-path provisioner)라 per-PVC 쿼터·kubelet_volume_stats가
          # 원천 부재다(hostPath는 MetricsProvider 미구현 → kubelet volume stats 영구 0건 — 라이브 검증). standard SC
          # PVC(pg-1 PGDATA/WAL·adguard·vmsingle·vlogs)는 전부 루트 fs '/'(btrfs /dev/vdb1, ~224GiB 실측)를 쿼터 없이 공유하므로
          # '/' 포화 = 모든 standard PVC 동시 위험. node_filesystem 절대값으로 3티어(조기 warning/추세/critical) 감시한다.
          # mountpoint="/"는 정확일치 — '/run/k3s/.../shm'·tmpfs·virtiofs(/mnt/mac) 노이즈를 배제하는 단일 btrfs series.
          # (외장 bulk-ssd는 virtiofs /mnt/mac 하위라 VM node-exporter가 별도 series로 못 봐 직접 측정 불가 — 죽은
          #  BulkSSD 알림은 제거했다. 미마운트/포화의 권위 backstop은 같은 group의 LocalBasebackupStale(CronJob 실패).)
          - alert: StandardSSDWarning
            expr: |
              (node_filesystem_avail_bytes{mountpoint="/"}
               / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
            for: 15m
            labels: { severity: warning, disk: standard }
            annotations:
              summary: "내장 SSD 여유 공간 15% 미만(조기 경보)"
              description: "standard SC 백킹 fs(루트 /, btrfs ~224GiB)가 차오릅니다 — pg-1/WAL·vmsingle·vlogs·adguard PVC가 쿼터 없이 공유하므로 한 워크로드 폭증이 전체를 위협합니다. 최대 소비자(보통 CNPG WAL 적체 또는 vmsingle/vlogs retention)를 확인하세요."
          - alert: StandardSSDFilling
            expr: |
              (node_filesystem_avail_bytes{mountpoint="/"}
               / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
            for: 10m
            labels: { severity: critical, disk: standard }
            annotations:
              summary: "내장 SSD 여유 공간 10% 미만"
              description: "standard SC 디스크 여유 부족 — Postgres PGDATA/WAL과 관측 스택이 임박한 위험입니다. 즉시 최대 소비자를 정리하거나 retention을 낮추세요."
          - alert: StandardSSDFillingTrend
            expr: |
              predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[6h], 48*3600) < 0
               and (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.50
            for: 30m
            labels: { severity: warning, disk: standard }
            annotations:
              summary: "내장 SSD 48시간 내 포화 추세"
              description: "최근 6시간 기울기로 외삽하면 루트 fs 여유가 48시간 내 소진될 추세입니다(현재 여유 50% 미만) — 절대 임계(15%/10%) 도달 전 대응 창입니다. WALArchiveStalled가 동반 발화하면 WAL 적체가 원인일 가능성이 큽니다."
          # WAL 볼륨 충전 — per-PVC 포화의 유일한 직접 신호다. hostPath라 kubelet은 못 주지만 CNPG가 WAL 볼륨의
          # 논리 용량(value="volume_size"=10Gi PVC)과 현재 사용량(value="size")을 직접 export한다(라이브 검증).
          # disk:pgwal로 분리 라벨링 — 루트 fs critical(disk:standard)이 이 신호를 inhibit하면 안 된다(루트 fs 포화의
          # 원인이 WAL 적체일 때 가려지면 트리아지가 어려워진다). cnpg_collector_pg_wal은 deprecated된 backup/archive
          # 메트릭 계열이 아니라 살아있는 WAL-size collector다(인시던트 #13/#14와 무관).
          - alert: WALVolumeFilling
            expr: |
              (cnpg_collector_pg_wal{value="size"}
               / on(namespace, pod) cnpg_collector_pg_wal{value="volume_size"}) > 0.70
            for: 15m
            labels: { severity: warning, disk: pgwal }
            annotations:
              summary: "CNPG WAL 볼륨 70% 초과"
              description: "pg-1의 WAL 디렉토리가 WAL 볼륨(10Gi)의 70%를 넘었습니다 — 아카이빙 지연이나 checkpoint 문제로 WAL이 적체되는 신호입니다. hostPath라 쿼터 강제는 없으나, 계속 차면 루트 fs(StandardSSDFilling)와 RPO(WALArchiveStalled)를 위협합니다."
          # 백업 생존성: 로컬 CNPG base-backup CronJob(M4)은 매일 완료되어야 한다.
          - alert: LocalBasebackupStale
            expr: |
              (time() - max(kube_job_status_completion_time{job_name=~"cnpg-local-basebackup.*"})) > 100000
              or absent(kube_job_status_completion_time{job_name=~"cnpg-local-basebackup.*"})
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "로컬 base-backup이 stale(27시간 초과)이거나 누락됨"
              description: "복원 사본 2(로컬 외장 SSD, ~1.9T 실측)가 위험합니다 — 드라이브 미마운트 또는 CronJob 실패."
          # 백업 생존성: 가장 최근 R2 백업이 계속 갱신되어야 한다 (오프사이트 사본 3).
          # barman-cloud plugin이 채우는 메트릭을 읽는다 — in-tree cnpg_collector backup 게이지는
          # CNPG 1.27+plugin에서 deprecated라 항상 0이다(백업 정상이어도 영구 stale로 오발화).
          # 값 0(아직 백업 없음)은 time()-0이 거대해 fail-loud로 발화 — 의도된 fail-closed.
          - alert: R2BackupStale
            expr: |
              (time() - max(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp)) > 100000
              or absent(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp)
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "R2 오프사이트 백업이 stale(27시간 초과)이거나 누락됨"
              description: "오프사이트 사본 3(Cloudflare R2)가 최신 백업을 만들지 못했습니다 — DR 사본이 노후화되고 있습니다."
          # 백업 생존성: R2로의 WAL 아카이빙이 오류를 내면 안 된다 (RPO ≈ 5분 목표).
          # pg_stat_archiver 타임스탬프를 비교한다 — in-tree cnpg_collector archive 게이지는
          # plugin 환경에서 export되지 않아(부재) 원식은 영원히 no-data였다.
          # absent() 가드: 스크레이프 전손 시(이번 인시던트의 실패모드) stall이 빈 벡터로 조용히
          # 묻히지 않고 페이징되도록. (완전히 wedge된 아카이버의 backstop은 R2BackupStale.)
          - alert: WALArchiveStalled
            expr: |
              cnpg_pg_stat_archiver_last_failed_time > cnpg_pg_stat_archiver_last_archived_time
              or absent(cnpg_pg_stat_archiver_last_archived_time)
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "R2로의 WAL 아카이빙 정지(RPO 위험)"
              description: "마지막 실패 아카이브가 마지막 성공 아카이브보다 최신입니다 — 오프사이트 WAL 스트림이 끊겼고 5분 RPO 목표를 충족하지 못합니다."
          # 복원 drill 생존성: M4의 반복(주간) 복원 drill이 restore_drill_last_success_timestamp를
          # 단발 샘플로 vmsingle에 직접 import한다. instant query는 staleness 윈도(~분) 밖의 단발 샘플을
          # 못 봐서, bare absent()는 주간 push 직후 수 분을 빼면 항상 참이 된다(영구 오발화 — 라이브 확인).
          # 임계값(700000s=8.1일)보다 넓은 [10d] 윈도의 last_over_time으로 마지막 성공 push를 찾아 판정한다.
          - alert: CNPGRestoreDrillStale
            expr: |
              (time() - last_over_time(restore_drill_last_success_timestamp[10d])) > 700000
              or absent(last_over_time(restore_drill_last_success_timestamp[10d]))
            for: 30m
            labels: { severity: warning }
            annotations:
              summary: "CNPG 복원 drill이 최근에 성공하지 못함"
              description: "반복 R2 복원 drill(M4)이 최신 성공 timestamp를 푸시하지 못했습니다 — 유일하게 검증된 복원 경로가 깨졌을 수 있습니다(R1)."
          # 백업 생존성: 논리 백업(헤지) — pg_dump→R2 CronJob(매일 04:00)이 완료되어야 한다(복원 사본 4).
          # 나머지 3개 백업(로컬 base·R2 barman·복원 drill)은 감시되나 이 4번째만 무감시였다.
          - alert: PgDumpHedgeStale
            expr: |
              (time() - max(kube_job_status_completion_time{job_name=~"pg-dump-hedge-r2.*"})) > 100000
              or absent(kube_job_status_completion_time{job_name=~"pg-dump-hedge-r2.*"})
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "논리 백업(헤지)이 stale(27시간 초과)이거나 누락됨"
              description: "pg_dump 헤지 사본(복원 사본 4, R2 pgdump/)이 갱신되지 않았습니다 — barman 실패 시 최후 보루입니다. CronJob/연결을 확인하세요."
