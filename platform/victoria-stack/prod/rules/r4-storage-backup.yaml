apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules-r4
  labels: { vmalert-rule: "true" }
data:
  r4.yaml: |
    groups:
      - name: storage-backup
        rules:
          # 디스크 포화 = PVC 포화: 모든 PV가 hostPath(local-path provisioner)라 per-PVC 쿼터·kubelet_volume_stats가
          # 원천 부재다(hostPath는 MetricsProvider 미구현 → kubelet volume stats 영구 0건 — 라이브 검증). standard SC
          # PVC(pg-1 PGDATA/WAL·adguard·vmsingle·vlogs)는 전부 루트 fs '/'(btrfs /dev/vdb1, ~224GiB 실측)를 쿼터 없이 공유하므로
          # '/' 포화 = 모든 standard PVC 동시 위험. node_filesystem 절대값으로 3티어(조기 warning/추세/critical) 감시한다.
          # mountpoint="/"는 정확일치 — '/run/k3s/.../shm'·tmpfs·virtiofs(/mnt/mac) 노이즈를 배제하는 단일 btrfs series.
          # (외장 bulk-ssd는 virtiofs /mnt/mac 하위라 VM node-exporter가 별도 series로 못 봐 직접 측정 불가 — 죽은
          #  BulkSSD 알림은 제거했다. 미마운트/포화의 권위 backstop은 같은 group의 LocalBasebackupStale(CronJob 실패).)
          - alert: StandardSSDWarning
            expr: |
              (node_filesystem_avail_bytes{mountpoint="/"}
               / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
            for: 15m
            labels: { severity: warning, disk: standard }
            annotations:
              summary: "내장 SSD 여유 공간 15% 미만(조기 경보)"
              description: "standard SC 백킹 fs(루트 /, btrfs ~224GiB)가 차오릅니다 — pg-1/WAL·vmsingle·vlogs·adguard PVC가 쿼터 없이 공유하므로 한 워크로드 폭증이 전체를 위협합니다. 최대 소비자(보통 CNPG WAL 적체 또는 vmsingle/vlogs retention)를 확인하세요."
          - alert: StandardSSDFilling
            expr: |
              (node_filesystem_avail_bytes{mountpoint="/"}
               / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
            for: 10m
            labels: { severity: critical, disk: standard }
            annotations:
              summary: "내장 SSD 여유 공간 10% 미만"
              description: "standard SC 디스크 여유 부족 — Postgres PGDATA/WAL과 관측 스택이 임박한 위험입니다. 즉시 최대 소비자를 정리하거나 retention을 낮추세요."
          - alert: StandardSSDFillingTrend
            expr: |
              predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[6h], 48*3600) < 0
               and (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.50
            for: 30m
            labels: { severity: warning, disk: standard }
            annotations:
              summary: "내장 SSD 48시간 내 포화 추세"
              description: "최근 6시간 기울기로 외삽하면 루트 fs 여유가 48시간 내 소진될 추세입니다(현재 여유 50% 미만) — 절대 임계(15%/10%) 도달 전 대응 창입니다. WALArchiveStalled가 동반 발화하면 WAL 적체가 원인일 가능성이 큽니다."
          # WAL 볼륨 충전 — per-PVC 포화의 유일한 직접 신호다. hostPath라 kubelet은 못 주지만 CNPG가 WAL 볼륨의
          # 논리 용량(value="volume_size"=10Gi PVC)과 현재 사용량(value="size")을 직접 export한다(라이브 검증).
          # disk:pgwal로 분리 라벨링 — 루트 fs critical(disk:standard)이 이 신호를 inhibit하면 안 된다(루트 fs 포화의
          # 원인이 WAL 적체일 때 가려지면 트리아지가 어려워진다). cnpg_collector_pg_wal은 deprecated된 backup/archive
          # 메트릭 계열이 아니라 살아있는 WAL-size collector다(인시던트 #13/#14와 무관).
          # ⚠️ 양변의 max by(namespace,pod)는 필수 — on()이 instance를 매칭키에서 빼는데 양변 raw 셀렉터엔
          # instance가 남아 있어, 재부팅으로 CNPG exporter 파드 IP가 바뀌면 구/신 시계열이 staleness(~5분)
          # 동안 공존해 (namespace,pod)당 2 시계열이 된다 → many-to-many → "duplicate time series on the
          # left side of /" HTTP 422 → 룰 평가 실패 → VmalertUnhealthy 오발화(라이브 검증). 사전 집계로
          # 그룹당 1 시계열을 보장해 1:1 매칭을 강제한다. pg는 단일 파드라 max는 항등이며, 다중이어도
          # filling(>0.70) 방향에선 보수적(더 큰 값 채택 → 참양성 유지). cf. ContainerMemoryNearLimit 선례.
          - alert: WALVolumeFilling
            expr: |
              (max by (namespace, pod) (cnpg_collector_pg_wal{value="size"})
               / on(namespace, pod) max by (namespace, pod) (cnpg_collector_pg_wal{value="volume_size"})) > 0.70
            for: 15m
            labels: { severity: warning, disk: pgwal }
            annotations:
              summary: "CNPG WAL 볼륨 70% 초과"
              description: "pg-1의 WAL 디렉토리가 WAL 볼륨(10Gi)의 70%를 넘었습니다 — 아카이빙 지연이나 checkpoint 문제로 WAL이 적체되는 신호입니다. hostPath라 쿼터 강제는 없으나, 계속 차면 루트 fs(StandardSSDFilling)와 RPO(WALArchiveStalled)를 위협합니다."
          # 백업 생존성: 로컬 CNPG base-backup CronJob(M4)은 매일 완료되어야 한다.
          - alert: LocalBasebackupStale
            expr: |
              (time() - max(kube_job_status_completion_time{job_name=~"cnpg-local-basebackup.*"})) > 100000
              or absent(kube_job_status_completion_time{job_name=~"cnpg-local-basebackup.*"})
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "로컬 base-backup이 stale(27시간 초과)이거나 누락됨"
              description: "복원 사본 2(로컬 외장 SSD, ~1.9T 실측)가 위험합니다 — 드라이브 미마운트 또는 CronJob 실패."
          # 백업 생존성: 가장 최근 R2 백업이 계속 갱신되어야 한다 (오프사이트 사본 3).
          # barman-cloud plugin이 채우는 메트릭을 읽는다 — in-tree cnpg_collector backup 게이지는
          # CNPG 1.27+plugin에서 deprecated라 항상 0이다(백업 정상이어도 영구 stale로 오발화).
          # 값 0(아직 백업 없음)은 time()-0이 거대해 fail-loud로 발화 — 의도된 fail-closed.
          - alert: R2BackupStale
            expr: |
              (time() - max(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp)) > 100000
              or absent(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp)
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "R2 오프사이트 백업이 stale(27시간 초과)이거나 누락됨"
              description: "오프사이트 사본 3(Cloudflare R2)가 최신 백업을 만들지 못했습니다 — DR 사본이 노후화되고 있습니다."
          # 백업 생존성: R2로의 WAL 아카이빙이 오류를 내면 안 된다 (RPO ≈ 5분 목표).
          # pg_stat_archiver 타임스탬프를 비교한다 — in-tree cnpg_collector archive 게이지는
          # plugin 환경에서 export되지 않아(부재) 원식은 영원히 no-data였다.
          # absent() 가드: 스크레이프 전손 시(이번 인시던트의 실패모드) stall이 빈 벡터로 조용히
          # 묻히지 않고 페이징되도록. (완전히 wedge된 아카이버의 backstop은 R2BackupStale.)
          - alert: WALArchiveStalled
            expr: |
              cnpg_pg_stat_archiver_last_failed_time > cnpg_pg_stat_archiver_last_archived_time
              or absent(cnpg_pg_stat_archiver_last_archived_time)
            for: 15m
            labels: { severity: critical }
            annotations:
              summary: "R2로의 WAL 아카이빙 정지(RPO 위험)"
              description: "마지막 실패 아카이브가 마지막 성공 아카이브보다 최신입니다 — 오프사이트 WAL 스트림이 끊겼고 5분 RPO 목표를 충족하지 못합니다."
          # 복원 drill 생존성: M4의 반복(주간) 복원 drill이 restore_drill_last_success_timestamp를
          # 단발 샘플로 vmsingle에 직접 import한다. instant query는 staleness 윈도(~분) 밖의 단발 샘플을
          # 못 봐서, bare absent()는 주간 push 직후 수 분을 빼면 항상 참이 된다(영구 오발화 — 라이브 확인).
          # 임계값(700000s=8.1일)보다 넓은 [10d] 윈도의 last_over_time으로 마지막 성공 push를 찾아 판정한다.
          - alert: CNPGRestoreDrillStale
            expr: |
              (time() - last_over_time(restore_drill_last_success_timestamp[10d])) > 700000
              or absent(last_over_time(restore_drill_last_success_timestamp[10d]))
            for: 30m
            labels: { severity: warning }
            annotations:
              summary: "CNPG 복원 drill이 최근에 성공하지 못함"
              description: "반복 R2 복원 drill(M4)이 최신 성공 timestamp를 푸시하지 못했습니다 — 유일하게 검증된 복원 경로가 깨졌을 수 있습니다(R1)."
          # 백업 생존성: 논리 백업(헤지) — pg_dump→R2 CronJob(매일 04:00)이 완료되어야 한다(복원 사본 4).
          # 나머지 3개 백업(로컬 base·R2 barman·복원 drill)은 감시되나 이 4번째만 무감시였다.
          - alert: PgDumpHedgeStale
            expr: |
              (time() - max(kube_job_status_completion_time{job_name=~"pg-dump-hedge-r2.*"})) > 100000
              or absent(kube_job_status_completion_time{job_name=~"pg-dump-hedge-r2.*"})
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "논리 백업(헤지)이 stale(27시간 초과)이거나 누락됨"
              description: "pg_dump 헤지 사본(복원 사본 4, R2 pgdump/)이 갱신되지 않았습니다 — barman 실패 시 최후 보루입니다. CronJob/연결을 확인하세요."
          # 백업 생존성: 공용 캐시(Valkey) 백업 CronJob(cache-backup, 매일 03:45 KST)이 완료돼야 한다.
          # pg 4사본과 달리 KubeJobFailed(존재-시-발화)만 있어 Job 오브젝트 소실/미스케줄 시 침묵(fail-open)이던
          # 비대칭 해소 — pg staleness 패턴 복제(absent 가드 fail-closed). 캐시는 LRU 휘발 티어라 warning.
          # ⚠️ absent 설계: cache-backup CronJob은 platform/cache/prod 상주 컴포넌트라 항상 존재하고, valkey
          #    인스턴스 0개여도 discover 루프가 0회 돌고 성공 완료해 completion_time을 갱신한다(backup-cronjob.yaml)
          #    → absent()는 CronJob 자체 소멸(=cache 컴포넌트 철거) 시에만 발화. 그 경우 이 룰도 제거한다
          #    (죽은 알림 금지 규약). 신규/DR 배포 첫 실행 전(03:45 KST 이전) 일시 absent는 pg 4룰과 동일 수용.
          - alert: CacheBackupStale
            expr: |
              (time() - max(kube_job_status_completion_time{job_name=~"cache-backup.*"})) > 100000
              or absent(kube_job_status_completion_time{job_name=~"cache-backup.*"})
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "캐시 백업이 stale(27시간 초과)이거나 누락됨"
              description: "공용 Valkey 백업(cache-backup CronJob → R2)이 갱신되지 않았습니다 — Job 오브젝트 소실/CronJob suspend/미스케줄 가능. last_success.json 신선도는 teardown 시점에만 검사되므로 이 룰이 상시 backstop입니다. 캐시는 LRU 휘발 티어라 warning."
          # files 오프-SSD 백업 생존성(H2/M14): 호스트 launchd(scripts/backup-files-data.sh, 일1회)가
          # rsync 성공 시 files_backup_last_success_timestamp를 vmsingle에 단발 import한다. instant query는
          # staleness 윈도(~분) 밖의 단발 샘플을 못 봐 bare absent()가 영구 오발화하므로(CNPGRestoreDrillStale과
          # 동형), [10d] last_over_time으로 마지막 성공을 찾아 임계(180000s≈2.08일 — 일1회 RPO의 2배 여유)로 판정.
          # 값 없음(첫 push 전)은 absent가로 fail-loud — launchd 미설치/미실행을 페이징(백업 필수화 강제).
          - alert: FilesBackupStale
            expr: |
              (time() - last_over_time(files_backup_last_success_timestamp[10d])) > 180000
              or absent(last_over_time(files_backup_last_success_timestamp[10d]))
            for: 30m
            labels: { severity: critical }
            annotations:
              summary: "files 오프-SSD 백업이 stale(≈2일 초과)이거나 없음"
              description: "files-data(비재생성 사용자 데이터)의 유일한 2차 매체(Mac 내장 디스크 rsync 사본)가 갱신되지 않았습니다 — launchd 미실행 또는 외장 SSD 미마운트. 매체 유실 시 전손 위험(R2 미사용). scripts/backup-files-data.sh를 확인하세요."
          # bulk-ssd(외장 SSD) 용량: 호스트 df를 백업 잡이 함께 push(files_data_bulk_avail/size_bytes). VM node-exporter는
          # 외장 virtiofs(/mnt/mac 하위)를 별도 series로 못 봐(r4 상단 주석) 직접 측정 불가 — 호스트 push가 유일 관측.
          #
          # ★ 양변 rollup은 필수다(맨 참조 금지 — 이게 이 알림이 죽어 있던 이유다). files_data_bulk_*의 pusher는
          #   호스트 launchd(app.homelab.files-backup, scripts/backup-files-data.sh)라 **하루 1회(04:30)** 단발
          #   push다. vmalert instant 질의 룩백은 5m(-datasource.queryStep 기본)뿐이라, 맨 참조하면 시리즈가 하루
          #   1440분 중 **5분만** 보인다 → 30초 평가로 최대 11회 연속 참 → for: 30m이 요구하는 61회 연속에
          #   **구조적으로 도달 불가** → 외장 SSD가 꽉 차도 영원히 무발화(라이브 실측: 마지막 push 후 10.8h에
          #   맨 참조 = 빈 결과, last_over_time [3d] 비율 = 0.9991 — 데이터는 TSDB에 멀쩡히 있고 차이는 rollup뿐).
          #   전문·근거는 `docs/traps-detail.md`(SSOT)의 「push 주기 > instant 룩백 → 룰 시리즈 구멍 → 무발화」.
          #
          # ★ 윈도 [3d] 근거 — 하한: W ≥ 2×push(=2d) — push 1회 누락(백업 1일 스킵)에도 판독이 살아 있어야 한다.
          #   상한: W ≤ 7×push(=7d) — 매체 교체·언마운트 후 stale한 낮은 값이 무한 페이징하지 않도록 유계
          #   (유계 staleness 계약). 이 경계는 관측으로 닫히지 않으므로(둘 다 발화 레그를 통과시킨다) 회귀 게이트
          #   `tests/gates/vmalert-bulkssd-firing-e2e.sh`의 preflight가 `2×push ≤ W ≤ 7×push`를 산술로 강제한다.
          #   ⚠️ 이 알림은 **ratio/threshold**(값=수준)라 라벨-값 상태 게이지(r6 ImageDigestDrift)의 `W < for`
          #      상한 제약은 **적용되지 않는다**(그 룰의 W는 구 상태를 되살리는 래치라 for:보다 작아야 한다 —
          #      혼동 주의). 여기서 rollup이 되살리는 건 "마지막으로 측정된 여유율"이고, 그건 값 자체다.
          #
          # ★ absent() 가드를 **의도적으로 달지 않는다**: launchd/push의 **전면** 실패(미실행·크래시·push 불가)는
          #   같은 스크립트가 함께 발행하는 files_backup_last_success_timestamp를 통해 위 FilesBackupStale
          #   (severity critical, absent 착용)이 fail-loud로 페이징한다. 여기 또 달면 동일 고장에 중복 페이지가 난다.
          #   ⚠️ **다만 그 백스톱은 부분 고장(값 오염)까지는 못 잡는다** — 정직한 한계다. backup-files-data.sh의
          #   push_metrics()는 df가 실패해도 `${avail:-0}`/`${size:-0}`로 **0을 대입한 채** 성공 하트비트를 함께
          #   발행하고, 호출부도 `|| WARN`이라 abort하지 않는다 → FilesBackupStale는 **초록**인데 여기 avail=0이
          #   흘러들면 이 알림이 "여유 0%"로 **오귀속 페이지**를 낼 수 있다(진실은 "df가 실패했다"). size까지 0이면
          #   0/0=NaN이라 반대로 **침묵**한다. 픽스 전엔 이 알림이 애초에 못 울려 이 경로가 가려져 있었고, 발화를
          #   살리는 순간 처음으로 도달 가능해진다.
          #   → 해법은 **읽는 쪽(expr)이 아니라 쓰는 쪽**이다(F-3 후속: 스크립트가 df 값을 검증한 뒤에만 하트비트를
          #     발행하도록 fail-loud화). expr에 absent()나 `size > 0` 가드를 다는 우회는 금지 — 전자는 중복 페이지,
          #     후자는 **진짜 결핍(avail=0)** 까지 억제해 이 알림을 다시 죽인다.
          - alert: FilesBulkSSDLow
            expr: |
              (last_over_time(files_data_bulk_avail_bytes[3d])
                / last_over_time(files_data_bulk_size_bytes[3d])) < 0.10
            for: 30m
            labels: { severity: warning, disk: bulk }
            annotations:
              summary: "외장 bulk SSD 여유 공간 10% 미만"
              description: "files-data·pg-basebackup-local이 공유하는 2TB 외장 SSD 여유가 부족합니다 — files 쓰기 실패(/readyz NotReady) 및 로컬 base-backup 적체 위험. 최대 소비자를 정리하세요."
          # per-PVC du exporter(pvc-du-exporter.yaml, 일 1회 05:00 KST) 생존 — pvc_du_last_success_timestamp를
          # 단발 push한다. instant query는 staleness 윈도(~분) 밖 단발 샘플을 못 보므로(CNPGRestoreDrillStale과
          # 동형) [3d] last_over_time으로 마지막 성공을 찾아 판정. 값 없음(첫 push 전)은 absent가로 fail-loud.
          - alert: PvcDuExporterStale
            expr: |
              (time() - last_over_time(pvc_du_last_success_timestamp[3d])) > 172800
              or absent(last_over_time(pvc_du_last_success_timestamp[3d]))
            for: 30m
            labels: { severity: warning }
            annotations:
              summary: "per-PVC 용량 수집이 48시간 이상 정체"
              description: "pvc-du-exporter CronJob이 pvc_dir_size_bytes/storage_tier_* 갱신에 실패했습니다 — bulk(virtiofs) 용량의 유일 in-cluster 신호가 소실됩니다(W3 선행). CronJob/마운트/경로를 확인하세요."
          # 외장 bulk-ssd의 in-cluster 용량 신호(W3 관측 데이터 이전의 선행 조건, F18) — du exporter가 파드
          # 내부 df로 티어 용량을 push한다. FilesBulkSSDLow(host launchd df push, <10%)와 물리 매체는 같으나
          # ⚠️ 의도적 이원화(중복 아님): (a) 독립 liveness — host launchd 백업이 멈춰도(FilesBulkSSDLow capacity
          # 판독이 freeze) 이 in-cluster 신호는 생존, (b) 티어 스캔 무결성 증거(F20 — pvc_dir_size_bytes{tier="bulk"}
          # 동반)로 df 경로가 진짜 bulk 트리를 본다는 것을 증명. 15%로 FilesBulkSSDLow(10%)보다 먼저 발화(early).
          # 일 1회 push라 last_over_time [3d] 윈도 필수(instant staleness 함정).
          - alert: BulkStorageLow
            expr: |
              (last_over_time(storage_tier_avail_bytes{tier="bulk"}[3d])
                / last_over_time(storage_tier_size_bytes{tier="bulk"}[3d])) < 0.15
              or absent(last_over_time(storage_tier_avail_bytes{tier="bulk"}[3d]))
            for: 30m
            labels: { severity: warning, disk: bulk }
            annotations:
              summary: "외장(bulk-ssd) 여유 15% 미만 또는 in-cluster 신호 소실"
              description: "du exporter가 본 bulk 티어 여유가 15% 미만이거나 storage_tier_avail_bytes{tier=bulk} 신호가 소실됐습니다 — W3에서 관측 TSDB가 bulk에 얹히므로 이전 착수 전 반드시 여유를 확인하세요(FilesBulkSSDLow의 in-cluster 짝)."
          # ★ digest-exporter 자기관측(감시견의 감시견) — ImageDigestDrift(r6)의 **먹이 공급선**이 죽으면
          #   그 알림이 조용히 실명한다(ghcr_latest_digest 시리즈가 끊긴 뒤 [15m] 윈도가 만료되면 좌변이 빈
          #   벡터 → 드리프트가 있어도 무발화). exporter의 조용한 실패 3모드(크론 미실행·push 실패·파드 기동
          #   실패)는 전부 **초록 Job(exit 0)** 이라 KubeJobFailed가 원리적으로 못 잡는다.
          #   → exporter가 같은 curl 페이로드에 하트비트(digest_exporter_last_success_timestamp)를 함께 싣고,
          #     그 침묵을 여기서 페이징한다. 하트비트 의미론은 **"push 경로 생존"이지 "수집 성공"이 아니다**
          #     (skopeo 전건 실패에도 하트비트는 나간다 — 수집 실패는 별개 알림의 소관, 역할 분리).
          #
          # ★ 왜 별도 alertname인가: 감시 대상 룰(ImageDigestDrift)에 per-rule absent()를 덧붙이면 exporter
          #   사망을 "이미지 불일치"로 **오귀속**한다(잘못된 원인 페이지 + TargetDown 중복) — 레포 규약이자
          #   tests/gates/test_vmalert-config.bats가 강제하는 사항.
          #
          # ★ rollup [2h] 필수 — 10분 크론 push(600s) > vmalert instant 룩백(5m)이라 맨 참조는 매 주기 시야에서
          #   사라져 for: pending이 영구 리셋된다(모드 C — ImageDigestDrift가 라이브 60일 무발화였던 바로 그
          #   함정). absent도 반드시 absent(last_over_time(...)) 형태여야 한다(맨 absent()는 같은 이유로 무력).
          #   ⚠️ 윈도 **상한은 없다** — 타임스탬프-값 하트비트에서 윈도는 "마지막 하트비트를 어디까지 뒤질까"라는
          #   탐색 지평일 뿐이다. r6 ImageDigestDrift의 `W < for:` 상한은 **라벨-값 상태 게이지 전용**이며 여기
          #   복사하면 누락 내성만 잃는다(docs/traps-detail.md 「rollup 윈도 상한 — 상태 게이지 vs 하트비트 비대칭」).
          #
          # ★ T=900s · for:15m 분할이 load-bearing하다(총 30분 = 발화 시각 T0+30분은 고정):
          #   for(900s) > **강제된** 최악 첫 하트비트 지연 840s = cron(600s) + activeDeadlineSeconds(180s)
          #   + 컨트롤러 여유(60s) → 최초 배포 시 이력이 없어 absent가 즉시 pending에 들어가도 첫 하트비트가
          #   반드시 for: 안에 도착해 리셋된다 → **롤아웃이 원인인 거짓 페이지가 구조적으로 불가능**하다.
          #   그 840s 상한은 추정이 아니라 digest-exporter.yaml이 매니페스트로 강제한다(concurrencyPolicy:
          #   Replace + activeDeadlineSeconds + skopeo/curl 타임아웃). 누가 크론을 늘리거나 데드라인을 키우면
          #   tests/gates/vmalert-digest-stale-firing-e2e.sh의 preflight가 exit 2로 먼저 죽는다.
          #   누락 내성은 분할과 무관 — 어느 분할이든 30분 연속 staleness(=3주기 누락)에서만 발화한다(플랩 없음).
          - alert: DigestExporterStale
            expr: |
              (time() - last_over_time(digest_exporter_last_success_timestamp[2h])) > 900
              or absent(last_over_time(digest_exporter_last_success_timestamp[2h]))
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "digest-exporter 하트비트가 30분+ 침묵 — ImageDigestDrift 실명 위험"
              description: "digest-exporter CronJob(*/10)이 vmsingle에 하트비트를 못 보냅니다 — 크론 미실행/파드 기동 실패/push 경로 장애. ghcr_latest_digest 공급이 끊기면 ImageDigestDrift가 조용히 실명해(기록 룰 [15m] 윈도 만료) 이미지 드리프트를 놓칩니다. Job 로그와 vmsingle 도달성을 확인하세요."
          # adguard *.home rewrite 셀프힐 리컨실러(메타갭 ① W2-A) 생존 — 리컨실러가 10분마다
          # adguard_rewrite_reconcile_timestamp를 push한다. 침묵(30분+ = 3주기 누락)이면 *.home 드리프트가
          # 무방비가 되므로 페이징. 10분 주기 push라 last_over_time[2h] 윈도 + absent가 fail-closed(push-metric 함정).
          # (도메인은 스토리지 아님이나 push-metric staleness 패턴상 r4에 함께 둔다 — CNPGRestoreDrillStale과 동형.)
          - alert: AdguardRewriteReconcilerStale
            expr: |
              (time() - last_over_time(adguard_rewrite_reconcile_timestamp[2h])) > 1800
              or absent(last_over_time(adguard_rewrite_reconcile_timestamp[2h]))
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "adguard rewrite 리컨실러가 30분+ 침묵 — *.home 드리프트 무방비"
              description: "adguard-rewrite-reconciler CronJob이 하트비트를 못 보냅니다 — traefik-ts IP 변경/DR 재구축 시 *.home.ukyi.app이 죽은 IP로 해석될 위험. CronJob/RBAC/AdGuard 자격을 확인하세요."
          # 통지 분리(F13): DNS 변이 파드엔 발송 자격 0. 실제 수렴(FIXED=1)이 있었을 때만 리컨실러가 fix
          # 타임스탬프를 push하고, 이 info 룰이 alertmanager→telegram으로 중계한다(발송 자격은 alertmanager에만).
          # F19: no-op 런은 fix 샘플을 안 써서 last_over_time이 직전 fix로 유지 — 20분 창 후 자동 해소.
          # ⚠️ drift-fix 이벤트당 telegram 2건(ℹ️ 정보 발화 + 20분 후 🔵 해소, send_resolved). 드리프트는 DR/proxy
          # 재등록 등 IP 변경 시에만이라 저빈도 → 전용 send_resolved:false receiver(telegram 템플릿 40줄 중복) 대신 수용.
          - alert: AdguardRewriteDriftFixed
            expr: |
              (time() - last_over_time(adguard_rewrite_last_fix_timestamp[2h])) < 1200
              and last_over_time(adguard_rewrite_last_fix_timestamp[2h]) > 0
            labels: { severity: info }
            annotations:
              summary: "adguard *.home rewrite 드리프트가 자동 수렴됨"
              description: "리컨실러가 traefik-ts 실 IP로 rewrite를 복구했습니다 — DR 재구축/IP 변경이 있었는지 확인하세요."
