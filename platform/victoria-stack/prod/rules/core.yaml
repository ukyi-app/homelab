apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules-core
  labels: { vmalert-rule: "true" }
data:
  core.yaml: |
    groups:
      - name: infra
        rules:
          - alert: TargetDown
            expr: up == 0
            for: 5m
            labels: { severity: critical }
            annotations:
              summary: "스크레이프 타깃 {{ $labels.job }}/{{ $labels.instance }} 다운"
              description: "vmagent 타깃이 5분간 도달 불가 상태입니다."
          - alert: NodeMemoryHigh
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.92
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "VM 메모리 사용률 92% 초과"
              description: "노드 메모리 압박 — eviction 임계치에 근접했습니다."
          # 노드-레벨 압박(kubelet condition) — OOM/디스크/PID 고갈의 노드 신호, eviction 선행 지표.
          # 단일 노드라 한 워크로드의 unbounded 자원 증가가 이웃 eviction으로 번진다. hostPath PV 4종이
          # 쿼터 없는 공유 fs(내장 SSD 실용량 224G)를 써 DiskPressure가 현실적 위험. status="true"==1로 발화
          # (메트릭은 condition×status 라벨에 0/1 값 — 라이브 확인). NodeMemoryHigh(92% 추세)의 사후/보강.
          - alert: NodePressure
            expr: kube_node_status_condition{condition=~"MemoryPressure|DiskPressure|PIDPressure", status="true"} == 1
            for: 5m
            labels: { severity: warning }
            annotations:
              summary: "노드 압박: {{ $labels.node }} {{ $labels.condition }}"
              description: "kubelet이 {{ $labels.condition }}를 보고합니다 — eviction 임박. 자원(메모리/디스크/PID) 소비자를 확인하세요. PVC 포화는 node_filesystem_avail_bytes(/)·StandardSSDFilling도 함께 보세요."
          # 파드 eviction 발생(사후) — 노드 압박으로 kubelet이 축출. NodePressure가 선행 경보.
          # kube_pod_status_reason는 honor_labels로 실제 ns/pod 라벨 보유(라이브 확인 — KSM clobber 아님).
          - alert: PodEvicted
            expr: kube_pod_status_reason{reason="Evicted"} == 1
            for: 0m
            labels: { severity: warning }
            annotations:
              summary: "파드 eviction: {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "노드 압박으로 파드가 축출됐습니다 — 원인 자원(디스크/메모리)을 확인하세요. hostPath PV 포화 가능."
          # ⚠️ 좌변의 max by(...) 서브쿼리는 필수다(instance 라벨 불안정 — PodCrashLooping :111과 동일 계열).
          # kube_pod_container_status_restarts_total은 KSM이 k8s API restartCount에서 재파생하는 상태-파생
          # 카운터라 KSM 프로세스 재시작에도 값이 0으로 리셋되지 않는다. KSM 파드 IP가 바뀌면(instance 라벨)
          # 시계열 정체성이 갈려 VM increase()가 새 시계열 첫 샘플(=누적 재시작수)을 "0에서 증가"로 오독한다.
          # 그러면 과거 OOMKilled 이력이 남은 **건강한** 파드에서 좌변>0 & 우변 가드=1로 조인 매치 → 오발화.
          # uid를 보존해야 파드 재생성(새 incarnation, restartCount 0 리셋)의 카운터 리셋 처리가 유지된다.
          - alert: PodOOMKilled
            expr: increase(max by (namespace,pod,container,uid) (kube_pod_container_status_restarts_total)[15m:1m]) > 0 and on(namespace,pod) kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m
            labels: { severity: warning }
            annotations:
              summary: "OOMKill 발생: {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "컨테이너가 메모리 limit에 도달했습니다 — 메모리 원장 예산을 확인하세요."
          # 선제(leading) 메모리 경보 — PodOOMKilled(사후)의 짝. working_set이 limit의 85%를 10분 넘으면
          # OOM 전에 발화(vector·homepage류 만성 과소 limit 조기 포착). working_set 기준 — page cache를
          # 포함하는 max_usage는 hostPath 로그수집 파드에서 limit까지 차므로 금지(라이브 검증된 함정).
          # limit 미설정 컨테이너는 kube_pod_container_resource_limits가 없어 매칭 0 → 자동 제외.
          # system ns는 PodCrashLooping과 동일하게 제외. 발화 시 원장에서 해당 행 limit 상향을 검토.
          - alert: ContainerMemoryNearLimit
            expr: |
              max by (namespace, pod, container) (container_memory_working_set_bytes{container!="", namespace!~"kube-system|kube-public|kube-node-lease"})
                / max by (namespace, pod, container) (kube_pod_container_resource_limits{resource="memory"})
                > 0.85
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "컨테이너 메모리 limit 근접: {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }}"
              description: "working_set이 메모리 limit의 85%를 10분 초과 — OOM 임박. 메모리 원장에서 해당 행 limit 상향을 검토하세요."
          # Notifier 자기관측 (R8 보강): Telegram 전송이 실패하면 발화.
          # ⚠️ Watchdog 커버리지 경계 — Watchdog는 "vmalert→Alertmanager 평가 파이프라인이
          #    살아있음"만 증명하고(healthchecks.io의 off-node dead-man's-switch가 그 부재를 페이징),
          #    Alertmanager가 Telegram으로 보내는 마지막 홉, 즉 자기 자신의 전송 실패는 감지하지 못한다.
          #    이 알림이 (부분) 전송실패는 메운다. ⚠️ 한계(의도적 수용): Telegram이 전면 장애면
          #    이 알림 자체도 미도달(자기참조) — off-node 스위치는 *파이프라인 생존*만 증명하지 Telegram
          #    전송은 증명하지 않는다. 전면 장애의 백스톱은 TSDB의 이 메트릭(Grafana)·GitHub 워크플로
          #    실패 알림이며, 완전 독립 비-Telegram 채널은 단일운영자 홈랩에 과설계라 v1 범위 밖.
          - alert: AlertmanagerTelegramFailing
            expr: increase(alertmanager_notifications_failed_total{integration="telegram"}[15m]) > 0
            for: 0m
            labels: { severity: warning }
            annotations:
              summary: "Alertmanager → Telegram 전송 실패 발생"
              description: "최근 15분간 telegram integration의 notifications_failed_total이 증가했다 — HTML parse 오류(escape 누락)·봇 토큰·chat_id·네트워크를 확인하라. 이 알림 자체도 같은 Telegram 경로를 타므로 전면 장애 시엔 미도달할 수 있다 — 그 경우 신호는 이 메트릭(Grafana 대시보드)·GitHub 워크플로 실패 알림이다(off-node 스위치는 pipeline 생존만 증명)."
          # deadmanswitch-relay 단독다운 in-band — relay는 busybox nc라 /metrics 없음·미scrape이나,
          # AM이 Watchdog를 relay:9095/ping webhook으로 보내므로 relay 다운 시 AM webhook 전송이 실패한다.
          # AM은 up이라 이 알림을 Telegram으로 전달 가능 — off-node deadman(healthchecks.io) 윈도보다 빠르다.
          - alert: DeadmanswitchRelayUnreachable
            expr: increase(alertmanager_notifications_failed_total{integration="webhook"}[15m]) > 0
            for: 5m
            labels: { severity: warning }
            annotations:
              summary: "deadmanswitch-relay 도달 불가(AM webhook 전송 실패)"
              description: "Alertmanager가 deadmanswitch-relay(:9095/ping) webhook 전송에 실패합니다 — relay 다운/네트워크 가능. off-node deadman이 페이징하기 전 in-band 조기 신호입니다(relay가 healthchecks.io ping을 못 보내면 곧 off-node도 발화)."
          # 단일 인스턴스 pg 클러스터(HA 없음)의 생존 — CNPG instance manager의 up 게이지로 판정.
          # cnpg_collector_up은 pg-1에서 직접 scrape돼 라벨이 정확하다(namespace=database,pod=pg-1).
          # ⚠️ kube_pod_status_ready{namespace="database"}는 쓰지 말 것 — pod-annotations scrape가
          # honor_labels 없이 KSM의 namespace/pod를 KSM 파드(observability)로 덮어써 0매치가 되고,
          # absent() 가드가 정상 DB에도 오발화한다(라이브 검증된 함정). != 1은 exporter가 떠 있으나
          # unhealthy인 경우, absent()는 파드 소멸/미스케줄(scrape 단절) 시 fail-closed로 페이징.
          - alert: PostgresClusterDown
            expr: |
              max(cnpg_collector_up{namespace="database"}) != 1
              or absent(cnpg_collector_up{namespace="database"})
            for: 3m
            labels: { severity: critical }
            annotations:
              summary: "PostgreSQL 클러스터 다운(Ready 인스턴스 0)"
              description: "database/pg가 3분 이상 Ready가 아닙니다 — 단일 인스턴스라 전 앱이 의존하는 DB가 중단된 상태입니다. CrashLoop/OOM/Pending/PVC를 확인하세요. 백업 staleness 알림(R2BackupStale 등)은 27시간 뒤에야 발화하므로 이 알림이 1차 페이징입니다."
          # 비-OOM CrashLoop 백스톱(OOM은 PodOOMKilled가 커버) — config/이미지풀/panic 반복 재시작.
          # 블랙리스트(시스템 ns만 제외) — 화이트리스트는 신규 PSA ns(cache·sealed-secrets)를 흘렸다(회귀).
          # honor_labels(#20)로 kube_* namespace가 실제값이라 블랙리스트가 모든 워크로드 ns를 자동 포함.
          # ⚠️ max by(...) 서브쿼리는 필수 — rollup **이전에** instance를 벗긴다(라이브 검증된 함정).
          # 호스트 재부팅이면 KSM 파드 IP가 바뀌어 instance 라벨이 갈리고, 상태-파생(비-리셋) 카운터라
          # 새 시계열 첫 샘플이 누적 재시작수(예 9)로 등장한다 → raw increase()는 이를 "15분간 9회"로 오독해
          # 재시작 3회 초과 이력이 있는 모든 파드에 오발화했다(07-02·07-07·07-08·07-09 4회 재발).
          # by 목록에 uid 보존 필수 — 빼면 서로 다른 파드 incarnation이 병합돼 카운터 리셋 처리가 깨진다.
          # (프로세스-로컬 카운터인 alertmanager_*/vmagent_*/vmalert_*는 재시작 시 0 리셋이라 이 처리 불요.)
          - alert: PodCrashLooping
            expr: increase(max by (namespace,pod,container,uid) (kube_pod_container_status_restarts_total{namespace!~"kube-system|kube-public|kube-node-lease"})[15m:1m]) > 3
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "파드 재시작 반복: {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "컨테이너가 15분간 3회 초과 재시작했습니다(CrashLoop) — OOM이 아니면(OOM은 PodOOMKilled가 커버) config/이미지/probe를 확인하세요."
          # 로그 수집(Vector→VictoriaLogs) 정체 — root 미실행 등으로 조용히 0이 되던 사일런트 실패모드(검증됨).
          # VL self-scrape 주석 필요(이 변경에 포함). for:30m로 scrape 셋업 윈도의 absent() 전이를 흡수.
          - alert: LogIngestionStalled
            expr: |
              sum(rate(vl_rows_ingested_total{type="elasticsearch_bulk"}[15m])) == 0
              or absent(vl_rows_ingested_total{type="elasticsearch_bulk"})
            for: 30m
            labels: { severity: warning }
            annotations:
              summary: "로그 수집 정체(Vector→VictoriaLogs 0행)"
              description: "elasticsearch_bulk 수집률이 0이거나 메트릭이 없습니다 — vector 경로 단절(예: root 미실행) 가능. VL self-scrape·vector 파드를 확인하세요."
          # vmagent remoteWrite 실패/드롭 — 메트릭이 TSDB에 안 들어가 다른 알림이 조용히 무력화될 수 있다.
          - alert: VmagentRemoteWriteDropping
            expr: |
              increase(vmagent_remotewrite_packets_dropped_total[15m]) > 0
              or increase(vmagent_remotewrite_errors_total[15m]) > 0
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "vmagent remoteWrite 드롭/실패"
              description: "vmagent가 샘플을 드롭하거나 remoteWrite에 실패합니다 — 메트릭 유실로 알림 평가가 부정확해질 수 있습니다."
          # vmagent 버퍼 채워짐(leading) — vmsingle이 느림/backpressure(write가 천천히 통과)일 때 큐가
          # maxDiskUsagePerURL 캡에 근접. 드롭 전 조기 경고(드롭은 VmagentRemoteWriteDropping = 2티어).
          # ⚠️ 커버리지 경계(F5): 이 메트릭(vmagent self-metric)도 remoteWrite로 vmsingle에 들어가 vmalert가
          #    질의한다 — vmsingle write가 전면 실패하면 pending 메트릭도 vmagent 큐에 갇혀 vmsingle에 못 도달,
          #    이 알림은 그 케이스엔 침묵한다(vmsingle 전면다운 = TargetDown{job~vmsingle}+deadman이 커버).
          #    즉 "vmsingle 느림/부분열화"에 leading하고 "write 전면다운"엔 무력(의도적 경계). emptyDir라 재시작 시 큐 휘발.
          - alert: VmagentBufferFilling
            expr: sum(vmagent_remotewrite_pending_data_bytes) > 330000000   # ≈315Mi(450Mi 캡의 70%)
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "vmagent remoteWrite 버퍼 채워짐(vmsingle 느림/backpressure — 드롭 임박)"
              description: "vmagent 디스크 큐가 maxDiskUsagePerURL 캡에 근접 — vmsingle write가 느려져(backpressure) 적체 중. 곧 oldest drop(VmagentRemoteWriteDropping)으로 메트릭 유실. vmsingle 부하/디스크를 확인하세요. ⚠️ vmsingle write 전면다운 시엔 이 메트릭도 버퍼에 갇혀 미발화(그 케이스는 TargetDown(vmsingle)+deadman) — 이 알림은 부분열화(느림)용입니다. emptyDir 버퍼라 vmagent 재시작 시 큐 휘발."
          # vector backpressure — sink(vlogs)이 입력을 못 따라가면 utilization이 1에 근접(부분 드롭/적체 전조).
          # vector internal_metrics→prometheus_exporter로 노출된 vector_utilization 사용(sink 2종: vlogs·prometheus).
          - alert: VectorBackpressure
            expr: max(vector_utilization{component_kind="sink"}) > 0.9
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "vector sink backpressure(utilization>0.9 10분 — 로그 적체/드롭 위험)"
              description: "vector sink가 10분간 utilization>0.9 — 입력을 못 따라가 버퍼 적체/부분 드롭 위험(LogIngestionStalled는 전면 0만 잡음, 이건 부분열화). VictoriaLogs(vlogs sink) 부하/디스크를 확인하세요. vector_utilization 기반."
          # vmalert 자기관측 — 룰 평가/notifier/remoteWrite 에러(알림 엔진 자체 고장). Watchdog는 평가 생존만 증명.
          - alert: VmalertUnhealthy
            expr: |
              increase(vmalert_alerting_rules_errors_total[15m]) > 0
              or increase(vmalert_alerts_send_errors_total[15m]) > 0
              or increase(vmalert_remotewrite_errors_total[15m]) > 0
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "vmalert 룰/알림 전송 에러"
              description: "vmalert가 룰 평가 또는 Alertmanager 전송에 실패합니다 — 알림 파이프라인 자체가 손상됐을 수 있습니다."
          # 일반 Job 실패 백스톱 — 전용 staleness 알림이 없는 Job(예: files ns Job)의 실패를 잡는다.
          # 블랙리스트(시스템 ns만 제외) — 화이트리스트는 신규 ns(files 등)를 흘렸다(PodCrashLooping :108과 동일 회귀).
          # honor_labels(#20)로 kube_job_* namespace가 실제값이라 블랙리스트가 모든 워크로드 ns를 자동 포함한다.
          # 백업 CronJob류(전용 staleness 보유)는 job_name으로 제외(화이트리스트 회귀 금지).
          - alert: KubeJobFailed
            expr: |
              kube_job_failed{condition="true", namespace!~"kube-system|kube-public|kube-node-lease", job_name!~"cnpg-local-basebackup.*|pg-dump-hedge-r2.*|pg-restore-drill.*"} > 0
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "Job 실패: {{ $labels.namespace }}/{{ $labels.job_name }}"
              description: "Job이 실패 상태로 15분 이상 머뭅니다 — 전용 staleness 알림이 없는 정기 작업의 실패입니다."
          # 워크로드-불가용(NotReady) — Deployment Available=False. 구독 라벨 없는 플랫폼 컴포넌트
          # (files·adguard·homepage)의 1차 실패모드(재시작 없는 NotReady)는 PodCrashLooping·TargetDown·
          # ArgoCD on-health-degraded 어디에도 안 잡히던 공백(M13). Available 조건은 KSM이 Deployment에만
          # 노출하고 honor_labels로 namespace가 실제값 → 시스템 ns 블랙리스트로 전 워크로드 커버.
          # status="false"==1이 not-available(condition×status 매트릭스). files /readyz 저하(스토리지)도 여기서 페이징.
          - alert: WorkloadUnavailable
            expr: kube_deployment_status_condition{condition="Available", status="false", namespace!~"kube-system|kube-public|kube-node-lease"} == 1
            for: 10m
            labels: { severity: warning }
            annotations:
              summary: "워크로드 불가용: {{ $labels.namespace }}/{{ $labels.deployment }}"
              description: "Deployment가 10분 이상 Available=False입니다(NotReady 파드가 minAvailable 미달) — 재시작이 없어 CrashLoop/OOM 알림에 안 잡히는 실패모드입니다. files는 /readyz 스토리지 저하, 그 외는 probe/스케줄/이미지를 확인하세요."
      - name: deadmanswitch
        rules:
          - alert: Watchdog
            expr: vector(1)
            labels: { severity: none }
            annotations:
