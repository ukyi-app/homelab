apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules-r6
  labels: { vmalert-rule: "true" }
data:
  r6.yaml: |
    groups:
      - name: ci-staleness
        rules:
          # ArgoCD 앱이 15분 넘게 OutOfSync → write-back/sync 고장 가능성 (R6).
          - alert: ArgoCDOutOfSync
            expr: argocd_app_info{sync_status="OutOfSync"} == 1
            for: 15m
            labels: { severity: warning }
            annotations:
              summary: "ArgoCD 앱 {{ $labels.name }} OutOfSync 15분 초과"
              description: "태그 write-back webhook 또는 sync가 조용히 실패했을 수 있습니다 — 클러스터가 어제 이미지로 돌고 있을 수 있습니다."
          # Recording rule: 실행 중인 이미지 digest가 최신 GHCR digest와 다르면 1.
          - record: app:image_digest_drift
            expr: |
              max by (app) (ghcr_latest_digest)
              unless on (app, digest) (
                label_replace(
                  kube_pod_container_info{namespace="prod"},
                  "digest", "$1", "image_id", ".*@(sha256:[a-f0-9]+)$"
                ) * 0 + 1
              )
          - alert: ImageDigestDrift
            expr: app:image_digest_drift == 1
            for: 20m
            labels: { severity: warning }
            annotations:
              summary: "실행 중인 이미지가 최신 GHCR digest와 불일치: {{ $labels.app }}"
              description: "빌드가 새 이미지를 푸시했지만 실행 중인 파드가 반영하지 못했습니다(R6 write-back/sync staleness)."
