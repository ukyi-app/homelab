apiVersion: v1
kind: Service
metadata:
  name: victorialogs
  labels: { app.kubernetes.io/name: victorialogs }
spec:
  selector: { app.kubernetes.io/name: victorialogs }
  ports: [{ name: http, port: 9428, targetPort: 9428 }]
---
# W3 관측 로그 저장소 bulk-ssd 이전(메타갭 캠페인 Task 14) — vmsingle(Task 13)과 동일한
# standalone PVC + STS delete-orphan 시퀀스(F2). 로그는 보존 요구가 낮아 데이터 이전 없이
# 빈 볼륨 재축적(retention 14d, owner 결정). 절차는 runbooks/observability-bootstrap.md §5.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vlogs-bulk
  labels: { app.kubernetes.io/name: victorialogs }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: bulk-ssd
  resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victorialogs
  labels: { app.kubernetes.io/name: victorialogs }
spec:
  serviceName: victorialogs
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: victorialogs }
  template:
    metadata:
      labels: { app.kubernetes.io/name: victorialogs }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "9428" } # 자기관측 vl_rows_ingested 등
    spec:
      automountServiceAccountToken: false # k8s API 미사용(로그 저장) — SA 토큰 마운트 금지(메타갭 ⑤ W2-C)
      securityContext: { runAsNonRoot: true, runAsUser: 65534, fsGroup: 65534, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: victorialogs
          # v1.51+는 plain 태그 스킴(구 -victorialogs suffix 폐기). LogsQL filter-pipe breaking(foo|bar)
          # 은 우리 committed 쿼리 무영향(대시보드=PromQL, Explore 임시질의만 LogsQL). forward-compat.
          image: victoriametrics/victoria-logs:v1.51.0@sha256:e16dd33a95623cc21730cf5285344ed9f97419eeaff7d24b039c135beb85ee7e
          args:
            - --storageDataPath=/vlogs
            - --retentionPeriod=14d
            - --retention.maxDiskSpaceUsageBytes=15GB
            - --memory.allowedPercent=60
            - --httpListenAddr=:9428
          env:
            - { name: GOMEMLIMIT, value: "115MiB" } # 128Mi의 약 90% (right-size 2026-06-22, peak 59Mi)
          ports: [{ name: http, containerPort: 9428 }]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 128Mi }
          readinessProbe: { httpGet: { path: /health, port: 9428 } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts: [{ name: vlogs, mountPath: /vlogs }]
  volumeClaimTemplates:
    - metadata: { name: vlogs }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources: { requests: { storage: 10Gi } }
