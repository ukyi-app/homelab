apiVersion: v1
kind: ServiceAccount
metadata: { name: vector }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: vector }
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: vector }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: vector }
subjects: [{ kind: ServiceAccount, name: vector, namespace: observability }]
---
apiVersion: v1
kind: ConfigMap
metadata: { name: vector-config }
data:
  vector.yaml: |
    data_dir: /vector-data
    sources:
      k8s:
        type: kubernetes_logs
      internal:                       # vector мһҗкё° л©”нҠёлҰӯ(backpressure/л“ңлЎӯ л…ём¶ң)
        type: internal_metrics
    transforms:
      parse:
        type: remap
        inputs: [k8s]
        source: |
          .stream = .stream
          .namespace = .kubernetes.pod_namespace
          .pod = .kubernetes.pod_name
          .container = .kubernetes.container_name
    sinks:
      vlogs:
        type: elasticsearch
        inputs: [parse]
        endpoints: ["http://victorialogs:9428/insert/elasticsearch"]
        mode: bulk
        api_version: v8
        compression: gzip
        healthcheck: { enabled: false }
        query:
          _msg_field: message
          _time_field: timestamp
          _stream_fields: namespace,pod,container,stream
        request:
          headers:
            AccountID: "0"
            ProjectID: "0"
      prometheus:                     # vector мһҗкё° л©”нҠёлҰӯ /metrics:9598 л…ём¶ң(vmagent pod-annotations scrape)
        type: prometheus_exporter
        inputs: [internal]
        address: "0.0.0.0:9598"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  labels: { app.kubernetes.io/name: vector }
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: vector }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vector }
      annotations:                    # POD л ҲлІЁ(.spec.template.metadata) вҖ” vmagentк°Җ pod annotationмқ„ discovery
        prometheus.io/scrape: "true"
        prometheus.io/port: "9598"
    spec:
      serviceAccountName: vector
      # k3sк°Җ м“°лҠ” /var/log/pods/**/*.logлҠ” root:root 0640мқҙлқј л№„rootлҠ” мқҪм§Җ лӘ»н•ңлӢӨ вҖ”
      # nobody(65534)лЎңлҠ” лЎңк·ё мҲҳм§‘мқҙ м „нҳҖ лҗҳм§Җ м•ҠлҠ”лӢӨ. л…ёл“ң лЎңк·ё мҲҳм§‘ DaemonSetмқҳ
      # н‘ңмӨҖлҢҖлЎң rootлЎң мӢӨн–үн•ңлӢӨ(observability nsлҠ” PSA privileged). нҢҢмқјмқҖ readOnly л§ҲмҡҙнҠё.
      securityContext: { runAsUser: 0, runAsGroup: 0, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: vector
          image: timberio/vector:0.56.0-distroless-libc@sha256:58c37f908648388a8a771426451476d60ebbd393fe52cc08a94573bcbb1c629a
          args: ["--config", "/etc/vector/vector.yaml"]
          ports: [{ name: metrics, containerPort: 9598 }]   # vector л©”нҠёлҰӯ л…ём¶ң
          env:
            - { name: VECTOR_SELF_NODE_NAME, valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
          resources:
            # OOM к·јліёмӣҗмқё(2026-06-23, PR#107 seccomp лЎӨм•„мӣғмқҙ л°©м•„мҮ ): нҢҢл“ң 'мһ¬мғқм„ұ' мӢң data_dirмқҙ emptyDirлқј
            # vector мІҙнҒ¬нҸ¬мқёнҠё(нҢҢмқјлі„ мқҪкё° мң„м№ҳ)к°Җ мң мӢӨ вҶ’ kubernetes_logsк°Җ read_from=beginningмңјлЎң /var/log л°ұлЎңк·ёлҘј
            # мІҳмқҢл¶Җн„° мҪңл“ң мһ¬лҰ¬л“ң(лқјмқҙлёҢ мӢӨмёЎ 50.9Mi лӢЁл°ң лІ„мҠӨнҠё) вҶ’ reclaimable page-cacheк°Җ м–№нҳҖ cgroup max_usageк°Җ
            # 256Mi мІңмһҘмқ„ н„°м№ҳ вҶ’ мҠӨнғҖнҠём—… м°Ҫм—җм„ң лӢЁл°ң OOMKilled. к·јліёмҲҳм •=data_dir hostPath мҳҒмҶҚнҷ”(м•„лһҳ volumes)лЎң
            # мһ¬мғқм„ұ мҪңл“ң мһ¬лҰ¬л“ң мһҗмІҙлҘј м ңкұ°. limit/requestлҠ” лқјмқҙлёҢ мӢӨмёЎ мһ¬мӮ°м • вҖ” steady working_set ~145Mi(10m max)/
            # 172Mi(1h)В·мҠӨнғҖнҠём—… н”јнҒ¬ 197Mi кё°мӨҖ: request 160Mi(steady мң„лЎң eviction ліҙнҳё)В·limit 320Mi(cgroup н”јнҒ¬
            # 256Mi мң„ н—Өл“ңлЈё + hostPath м Ғмҡ© мІ« л¶ҖнҢ…мқҳ л§Ҳм§Җл§ү мҪңл“ңлҰ¬л“ң нқЎмҲҳ). (мӣҗмһҘ н–ү лҸҷл°ҳ: req 1120вҶ’1152, limit 2144вҶ’2208.)
            requests: { cpu: 50m, memory: 160Mi }
            limits: { memory: 320Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/vector }
            - { name: data, mountPath: /vector-data }
            - { name: varlog, mountPath: /var/log, readOnly: true }
            - { name: varlibdockercontainers, mountPath: /var/lib/docker/containers, readOnly: true }
      volumes:
        - { name: config, configMap: { name: vector-config } }
        # data_dir(/vector-data) мІҙнҒ¬нҸ¬мқёнҠёлҘј л…ёл“ң л””мҠӨнҒ¬м—җ мҳҒмҶҚнҷ” вҖ” нҢҢл“ң мһ¬мғқм„ұВ·мһ¬л¶ҖнҢ…м—җлҸ„ ліҙмЎҙлҸј kubernetes_logs
        # мҪңл“ң мһ¬лҰ¬л“ңлҘј м ңкұ°(к·јліёмҲҳм •). DirectoryOrCreate=мІ« л¶ҖнҢ… мһҗлҸҷ мғқм„ұ(root:root 0755, vector runAsUser:0мқҙлқј м“°кё° OK).
        # VM мһ¬кө¬м¶•(DR) мӢң /var/logмҷҖ н•Ёк»ҳ мҶҢмӢӨлҗҳлӮҳ к·ёл•Ңл§Ң 1нҡҢ мҪңл“ңлҰ¬л“ң(л°ұлЎңк·ёлҸ„ н•Ёк»ҳ л№„м–ҙ мҶҢк·ңлӘЁ).
        - { name: data, hostPath: { path: /var/lib/vector, type: DirectoryOrCreate } }
        - { name: varlog, hostPath: { path: /var/log } }
        - { name: varlibdockercontainers, hostPath: { path: /var/lib/docker/containers } }
