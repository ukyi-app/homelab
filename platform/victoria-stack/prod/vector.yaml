apiVersion: v1
kind: ServiceAccount
metadata: { name: vector }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: vector }
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: vector }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: vector }
subjects: [{ kind: ServiceAccount, name: vector, namespace: observability }]
---
apiVersion: v1
kind: ConfigMap
metadata: { name: vector-config }
data:
  vector.yaml: |
    data_dir: /vector-data
    sources:
      k8s:
        type: kubernetes_logs
      internal:                       # vector 자기 메트릭(backpressure/드롭 노출)
        type: internal_metrics
    transforms:
      parse:
        type: remap
        inputs: [k8s]
        source: |
          .stream = .stream
          .namespace = .kubernetes.pod_namespace
          .pod = .kubernetes.pod_name
          .container = .kubernetes.container_name
    sinks:
      vlogs:
        type: elasticsearch
        inputs: [parse]
        endpoints: ["http://victorialogs:9428/insert/elasticsearch"]
        mode: bulk
        api_version: v8
        compression: gzip
        healthcheck: { enabled: false }
        query:
          _msg_field: message
          _time_field: timestamp
          _stream_fields: namespace,pod,container,stream
        request:
          headers:
            AccountID: "0"
            ProjectID: "0"
      prometheus:                     # vector 자기 메트릭 /metrics:9598 노출(vmagent pod-annotations scrape)
        type: prometheus_exporter
        inputs: [internal]
        address: "0.0.0.0:9598"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  labels: { app.kubernetes.io/name: vector }
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: vector }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vector }
      annotations:                    # POD 레벨(.spec.template.metadata) — vmagent가 pod annotation을 discovery
        prometheus.io/scrape: "true"
        prometheus.io/port: "9598"
    spec:
      serviceAccountName: vector
      # k3s가 쓰는 /var/log/pods/**/*.log는 root:root 0640이라 비root는 읽지 못한다 —
      # nobody(65534)로는 로그 수집이 전혀 되지 않는다. 노드 로그 수집 DaemonSet의
      # 표준대로 root로 실행한다(observability ns는 PSA privileged). 파일은 readOnly 마운트.
      securityContext: { runAsUser: 0, runAsGroup: 0, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: vector
          image: timberio/vector:0.56.0-distroless-libc
          args: ["--config", "/etc/vector/vector.yaml"]
          ports: [{ name: metrics, containerPort: 9598 }]   # vector 메트릭 노출
          env:
            - { name: VECTOR_SELF_NODE_NAME, valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
          resources:
            # OOM 근본원인(2026-06-23, PR#107 seccomp 롤아웃이 방아쇠): 파드 '재생성' 시 data_dir이 emptyDir라
            # vector 체크포인트(파일별 읽기 위치)가 유실 → kubernetes_logs가 read_from=beginning으로 /var/log 백로그를
            # 처음부터 콜드 재리드(라이브 실측 50.9Mi 단발 버스트) → reclaimable page-cache가 얹혀 cgroup max_usage가
            # 256Mi 천장을 터치 → 스타트업 창에서 단발 OOMKilled. 근본수정=data_dir hostPath 영속화(아래 volumes)로
            # 재생성 콜드 재리드 자체를 제거. limit/request는 라이브 실측 재산정 — steady working_set ~145Mi(10m max)/
            # 172Mi(1h)·스타트업 피크 197Mi 기준: request 160Mi(steady 위로 eviction 보호)·limit 320Mi(cgroup 피크
            # 256Mi 위 헤드룸 + hostPath 적용 첫 부팅의 마지막 콜드리드 흡수). (원장 행 동반: req 1120→1152, limit 2144→2208.)
            requests: { cpu: 50m, memory: 160Mi }
            limits: { memory: 320Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/vector }
            - { name: data, mountPath: /vector-data }
            - { name: varlog, mountPath: /var/log, readOnly: true }
            - { name: varlibdockercontainers, mountPath: /var/lib/docker/containers, readOnly: true }
      volumes:
        - { name: config, configMap: { name: vector-config } }
        # data_dir(/vector-data) 체크포인트를 노드 디스크에 영속화 — 파드 재생성·재부팅에도 보존돼 kubernetes_logs
        # 콜드 재리드를 제거(근본수정). DirectoryOrCreate=첫 부팅 자동 생성(root:root 0755, vector runAsUser:0이라 쓰기 OK).
        # VM 재구축(DR) 시 /var/log와 함께 소실되나 그때만 1회 콜드리드(백로그도 함께 비어 소규모).
        - { name: data, hostPath: { path: /var/lib/vector, type: DirectoryOrCreate } }
        - { name: varlog, hostPath: { path: /var/log } }
        - { name: varlibdockercontainers, hostPath: { path: /var/lib/docker/containers } }
