apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: { app.kubernetes.io/name: grafana }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: grafana }
  template:
    metadata:
      labels: { app.kubernetes.io/name: grafana }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 472, fsGroup: 472, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          # ь╗иэЕМьЭ┤ыДИ эХШыУЬыЛЭ: ъ╢МэХЬьГБьК╣ ь░иыЛи + ьаД capability drop. readOnlyRootFilesystemьЭА
          # эФМыЯмъ╖╕ьЭ╕ ьДдь╣Ш(/var/lib/grafana)┬╖/tmp ьУ░ъ╕░ ыХМым╕ьЧР ы│┤ыеШ(ы│ДыПД ъ▓АьжЭ эЫД ьаБьЪй).
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          env:
            - { name: GF_INSTALL_PLUGINS, value: "victoriametrics-logs-datasource" }
            - { name: GF_SECURITY_ADMIN_USER, value: "admin" }
            # admin/admin ьаИыМА ъ╕ИьзА: ы╣Ды░Аы▓ИэШ╕ыКФ M2ъ░А ьЛЬыУЬэХЬ SOPS secret
            # `alerting-secrets`(key GRAFANA_ADMIN_PASSWORD)ьЧРьДЬ ьШиыЛд.
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: alerting-secrets, key: GRAFANA_ADMIN_PASSWORD } }
            - { name: GF_USERS_ALLOW_SIGN_UP, value: "false" }
            - { name: GF_ANALYTICS_REPORTING_ENABLED, value: "false" }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
          ports: [{ name: http, containerPort: 3000 }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
          readinessProbe: { httpGet: { path: /api/health, port: 3000 } }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: providers, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
            - { name: data, mountPath: /var/lib/grafana }
      volumes:
        - { name: datasources, configMap: { name: grafana-datasources } }
        - { name: providers, configMap: { name: grafana-dashboard-providers } }
        - { name: dashboards, configMap: { name: grafana-dashboard-resources } }
        - { name: data, emptyDir: { sizeLimit: 256Mi } } # ьДдъ│ДьГБ эЬШы░ЬьД▒ SQLite (┬з8)
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: { app.kubernetes.io/name: grafana }
spec:
  selector: { app.kubernetes.io/name: grafana }
  ports: [{ name: http, port: 3000, targetPort: 3000 }]
