apiVersion: v1
kind: ConfigMap
metadata: { name: alertmanager-config }
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: telegram
      group_by: ['alertname','namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers: [ 'alertname = Watchdog' ]
          receiver: deadmanswitch
          group_wait: 0s
          group_interval: 1m
          repeat_interval: 1m
          continue: false
        - matchers: [ 'severity = critical' ]
          receiver: telegram
          repeat_interval: 1h
    receivers:
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/TELEGRAM_BOT_TOKEN
            chat_id: __CHAT_ID__
            api_url: https://api.telegram.org
            parse_mode: HTML
            send_resolved: true
            message: |
              {{- /* ⚠️ AM telegram은 동적 값({{ . }})을 parse_mode=HTML 컨텍스트로 *자동* HTML-escape한다
                     (render-e2e로 실측: {{ .Annotations.x }}의 <main>이 &lt;main&gt;으로 한 번 escape됨).
                     따라서 reReplaceAll/safeHtml 수동 escape는 금지 — 수동 escape는 &amp;lt;처럼 이중 escape를
                     유발해 메시지를 깨뜨린다(검증됨). 리터럴 태그(<b>)는 template 텍스트라 raw로 남아 정상 동작. */ -}}
              {{- $name := .CommonLabels.alertname -}}
              {{- $title := $name -}}
              {{- if eq $name "Watchdog" }}{{ $title = "알림 파이프라인" }}
              {{- else if eq $name "TargetDown" }}{{ $title = "스크레이프 타겟 다운" }}
              {{- else if eq $name "R2BackupStale" }}{{ $title = "R2 오프사이트 백업 정체" }}
              {{- else if eq $name "WALArchiveStalled" }}{{ $title = "WAL 아카이빙 정체" }}
              {{- else if eq $name "LocalBasebackupStale" }}{{ $title = "로컬 베이스백업 정체" }}
              {{- else if eq $name "CNPGRestoreDrillStale" }}{{ $title = "복원 드릴 정체" }}
              {{- else if eq $name "ArgoCDOutOfSync" }}{{ $title = "ArgoCD 동기화 이탈" }}
              {{- else if eq $name "ImageDigestDrift" }}{{ $title = "이미지 digest 드리프트" }}
              {{- else if eq $name "PodOOMKilled" }}{{ $title = "파드 OOM 종료" }}
              {{- else if eq $name "NodeMemoryHigh" }}{{ $title = "노드 메모리 경고" }}
              {{- else if eq $name "StandardSSDWarning" }}{{ $title = "내장 SSD 여유 경고" }}
              {{- else if eq $name "StandardSSDFilling" }}{{ $title = "내장 SSD 포화" }}
              {{- else if eq $name "StandardSSDFillingTrend" }}{{ $title = "내장 SSD 포화 추세" }}
              {{- else if eq $name "WALVolumeFilling" }}{{ $title = "WAL 볼륨 충전" }}
              {{- else if eq $name "PostgresClusterDown" }}{{ $title = "PostgreSQL 클러스터 다운" }}
              {{- else if eq $name "PodCrashLooping" }}{{ $title = "파드 재시작 반복" }}
              {{- else if eq $name "PgDumpHedgeStale" }}{{ $title = "논리 헤지 백업 정체" }}
              {{- else if eq $name "CertWildcardExpiringSoon" }}{{ $title = "와일드카드 인증서 만료 임박" }}
              {{- else if eq $name "CertExpiringSoon" }}{{ $title = "TLS 인증서 만료 임박" }}
              {{- else if eq $name "CertManagerCertNotReady" }}{{ $title = "TLS 인증서 NotReady" }}
              {{- else if eq $name "CertMetricsAbsent" }}{{ $title = "인증서 메트릭 부재" }}
              {{- else if eq $name "DigestExporterStale" }}{{ $title = "digest-exporter 하트비트 정체" }}
              {{- else if eq $name "AdguardRewriteReconcilerStale" }}{{ $title = "adguard rewrite 리컨실러 정체" }}
              {{- else if eq $name "AdguardRewriteDriftFixed" }}{{ $title = "adguard rewrite 자동 수렴" }}
              {{- end -}}
              {{- /* 미매핑 alertname → summary를 제목으로(신규 알림도 한국어). 자동 escape됨. summary 없으면 alertname 원문 */ -}}
              {{- if and (eq $title $name) .CommonAnnotations.summary }}{{ $title = .CommonAnnotations.summary }}{{- end -}}
              {{- /* .Status → 한글 + glyph (firing: critical=🔴 발생·warning=⚠️ 경고·info=ℹ️ 정보; resolved=해소 🔵) */ -}}
              {{- if eq .Status "resolved" -}}
              🔵 <b>{{ $title }}</b> — 해소
              {{- else if eq .CommonLabels.severity "warning" -}}
              ⚠️ <b>{{ $title }}</b> — 경고
              {{- else if eq .CommonLabels.severity "info" -}}
              ℹ️ <b>{{ $title }}</b> — 정보
              {{- else -}}
              🔴 <b>{{ $title }}</b> — 발생
              {{- end }}
              알림 · {{ $name }}
              {{ range .Alerts -}}
              {{ if .Annotations.summary }}{{ .Annotations.summary }}
              {{ end }}{{ if .Annotations.description }}{{ .Annotations.description }}
              {{ end }}{{ if .Annotations.runbook_url }}→ {{ .Annotations.runbook_url }}
              {{ end }}{{ end }}
      - name: deadmanswitch
        webhook_configs:
          - url: http://deadmanswitch-relay:9095/ping
            send_resolved: false
    inhibit_rules:
      - source_matchers: [ 'severity = critical' ]
        target_matchers: [ 'severity = warning' ]
        equal: ['alertname','namespace']
      # 같은 디스크의 critical(예: StandardSSDFilling)이 warning(StandardSSDWarning/Trend)을 억제한다.
      # 둘은 alertname이 달라 위 규칙(equal:alertname)으로는 매치 안 돼 둘 다 발화하던 것을 교정.
      # disk 라벨이 있는 알림으로만 한정(=~".+")해 비-디스크 알림을 과억제하지 않는다.
      # (WAL은 disk:pgwal로 분리 — 루트 fs critical이 WAL 충전 경고를 가리지 않게: 원인이 WAL일 수 있다.)
      - source_matchers: [ 'severity = critical', 'disk =~ ".+"' ]
        target_matchers: [ 'severity = warning', 'disk =~ ".+"' ]
        equal: ['disk']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  labels: { app.kubernetes.io/name: alertmanager }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: alertmanager }
  template:
    metadata:
      labels: { app.kubernetes.io/name: alertmanager }
      # vmagent의 pod-annotations job이 /metrics:9093을 스크레이프해
      # alertmanager_notifications_total / _failed_total{integration="telegram"}를 수집한다.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
    spec:
      automountServiceAccountToken: false # k8s API 미사용 — SA 토큰 마운트 금지(메타갭 ⑤ W2-C)
      securityContext: { runAsNonRoot: true, runAsUser: 65534, fsGroup: 65534, seccompProfile: { type: RuntimeDefault } }
      initContainers:
        - name: render-config
          image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command: ["sh", "-c"]
          args:
            - |
              sed "s/__CHAT_ID__/$TELEGRAM_CHAT_ID/" /config-in/alertmanager.yml > /config-out/alertmanager.yml
          env:
            - { name: TELEGRAM_CHAT_ID, valueFrom: { secretKeyRef: { name: alerting-secrets, key: TELEGRAM_CHAT_ID } } }
          volumeMounts:
            - { name: config-in, mountPath: /config-in }
            - { name: config-out, mountPath: /config-out }
          securityContext: { runAsNonRoot: true, runAsUser: 65534, allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.33.0@sha256:af26fbe4dd1886ac0efd7bd55cd9027da262e105b137a376522b7c14c3626e4a
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --cluster.listen-address=
            - --web.listen-address=:9093
          ports: [{ name: http, containerPort: 9093 }]
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 64Mi }
          readinessProbe: { httpGet: { path: /-/ready, port: 9093 } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config-out, mountPath: /etc/alertmanager }
            - { name: secrets, mountPath: /etc/alertmanager/secrets, readOnly: true }
            - { name: data, mountPath: /alertmanager }
      volumes:
        - { name: config-in, configMap: { name: alertmanager-config } }
        - { name: config-out, emptyDir: {} }
        - { name: secrets, secret: { secretName: alerting-secrets } }
        - { name: data, emptyDir: { sizeLimit: 128Mi } }
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  labels: { app.kubernetes.io/name: alertmanager }
spec:
  selector: { app.kubernetes.io/name: alertmanager }
  ports: [{ name: http, port: 9093, targetPort: 9093 }]
