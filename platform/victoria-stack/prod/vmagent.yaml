apiVersion: v1
kind: ServiceAccount
metadata: { name: vmagent }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: vmagent }
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: vmagent }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: vmagent }
subjects: [{ kind: ServiceAccount, name: vmagent, namespace: observability }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  labels: { app.kubernetes.io/name: vmagent }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: vmagent }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vmagent }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8429" } # 자기관측 remoteWrite 메트릭
    spec:
      serviceAccountName: vmagent
      securityContext: { runAsNonRoot: true, runAsUser: 65534, fsGroup: 65534, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:v1.145.0@sha256:71f19af5c80bec6ea955c171bab0aae01314a80016b3600412c2b4bbb8d95d70
          args:
            - --promscrape.config=/config/scrape.yml
            # scrape config(ConfigMap) 변경을 자동 반영 — 없으면 vmagent가 옛 config를 계속 써서
            # GitOps 변경이 rollout restart 전까지 silent staleness(vmalert configCheckInterval과 동형 규약).
            - --promscrape.configCheckInterval=30s
            - --remoteWrite.url=http://vmsingle:8428/api/v1/write
            - --promscrape.noStaleMarkers
            - --memory.allowedPercent=60
            - --httpListenAddr=:8429
            - --remoteWrite.tmpDataPath=/tmpdata
            - --remoteWrite.maxDiskUsagePerURL=450MiB   # 512Mi emptyDir 미만 — 큐가 차면 oldest drop(eviction+전량유실 회피)
          env:
            - { name: GOMEMLIMIT, value: "200MiB" } # 224Mi의 약 90% (right-size 2026-06-22)
          ports: [{ name: http, containerPort: 8429 }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 224Mi }
          readinessProbe: { httpGet: { path: /health, port: 8429 } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: tmpdata, mountPath: /tmpdata }
      volumes:
        - { name: config, configMap: { name: vmagent-scrape-config } }
        - { name: tmpdata, emptyDir: { sizeLimit: 512Mi } }
---
apiVersion: v1
kind: Service
metadata:
  name: vmagent
  labels: { app.kubernetes.io/name: vmagent }
spec:
  selector: { app.kubernetes.io/name: vmagent }
  ports: [{ name: http, port: 8429, targetPort: 8429 }]
