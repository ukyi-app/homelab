apiVersion: v1
kind: ConfigMap
metadata: { name: deadmanswitch-relay-script }
data:
  relay.sh: |
    #!/bin/sh
    set -eu
    # busybox nc 루프를 이용한 최소 HTTP 리스너.
    # /ping에 어떤 POST가 오든 healthchecks.io로 ping 한 번을 보낸다.
    # 주의: busybox 1.36 nc에는 -q 옵션이 없다(invalid option으로 리스너가 즉시 죽어
    # webhook이 영구 connection refused가 되고, while 루프가 healthchecks를 과도하게
    # ping해 dead-man switch를 무력화한다).
    while true; do
      printf 'HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nok' | nc -l -p 9095 2>/dev/null || true
      wget -q -T 10 -O /dev/null "$HEALTHCHECKS_URL" || echo "ping failed $(date)"
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadmanswitch-relay
  labels: { app.kubernetes.io/name: deadmanswitch-relay }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: deadmanswitch-relay }
  template:
    metadata:
      labels: { app.kubernetes.io/name: deadmanswitch-relay }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 65534 }
      containers:
        - name: relay
          image: busybox:1.36
          command: ["/bin/sh", "/script/relay.sh"]
          env:
            - { name: HEALTHCHECKS_URL, valueFrom: { secretKeyRef: { name: alerting-secrets, key: HEALTHCHECKS_URL } } }
          ports: [{ name: http, containerPort: 9095 }]
          resources:
            requests: { cpu: 5m, memory: 8Mi }
            limits: { memory: 16Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts: [{ name: script, mountPath: /script }]
      volumes: [{ name: script, configMap: { name: deadmanswitch-relay-script } }]
---
apiVersion: v1
kind: Service
metadata:
  name: deadmanswitch-relay
  labels: { app.kubernetes.io/name: deadmanswitch-relay }
spec:
  selector: { app.kubernetes.io/name: deadmanswitch-relay }
  ports: [{ name: http, port: 9095, targetPort: 9095 }]
