oauth:
  # operator는 M2가 시드한 SOPS Secret 'operator-oauth'를 읽는다 (인라인 아님)
  existingSecret: operator-oauth
apiServerProxyConfig:
  mode: "false" # kube-apiserver 노출 없음; Traefik만 프록시한다
operatorConfig:
  hostname: homelab-operator
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 200m, memory: 128Mi }
proxyConfig:
  defaultProxyClass: "resource-capped" # 거버넌스 캡: 전 proxy에 proxyclass.yaml 적용(메모리 limit 192Mi)
