apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: tailscale-secret-generator
  annotations:
    # --enable-exec 경로로 ksops를 찾게 하는 필수 주석 — 없으면 legacy 플러그인 디렉토리를
    # 뒤지다 "unable to find plugin root"로 실패한다(cnpg generator와 동일 스타일).
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - operator-oauth.enc.yaml # M2가 시드 → Secret 'operator-oauth' (ns edge)
