apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# 여기에 `namespace:` 금지. 전역 namespace 트랜스포머는 `traefik-ts` Ingress를 포함한
# 모든 namespaced 리소스를 한 namespace로 강제해, Ingress의 gateway ns backend 참조를
# 망가뜨린다. 대신: operator helmrelease + operator-oauth Secret은 `namespace: tailscale`를
# 선언하고(전용 privileged ns), Ingress는 `namespace: gateway`를 선언한다. ArgoCD는 각 리소스를
# 각자 선언된 namespace에 apply한다.
resources:
  - traefik-ingress.yaml
  - proxyclass.yaml # 거버넌스 캡: proxy 파드 메모리 limit(defaultProxyClass로 적용). cluster-scoped.
  - networkpolicy.yaml # tailscale ns egress 격리(privileged proxy lateral 방지). ns-wide default-deny.
generators:
  - helmrelease.yaml
  - secret-generator.yaml # 이 컴포넌트 전용 KSOPS generator → operator-oauth (tailscale)
