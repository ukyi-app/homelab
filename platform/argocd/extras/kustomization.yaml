apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd # argocd-extras Application의 권위 있는 대상 namespace
resources:
  - argocd-accounts.sealed.yaml # ukkiee 비밀번호 + webhook.github.secret patch-mode SealedSecret(argocd-secret 머지)
  - httproute.yaml # argocd UI를 argocd.home.ukyi.app로 노출(web-internal-tls)
  - httproute-webhook.yaml # argocd /api/webhook만 argocd-webhook.ukyi.app로 공개(web-public, GitHub 즉시 sync)
