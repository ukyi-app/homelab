# 단일 노드용 경량 ArgoCD. HA는 전부 OFF; processor 수 튜닝(§5).
# 아래 KSOPS repo-server 배선은 M2 소유; M3/M4/M5가 이를 상속한다.
global:
  domain: argocd.home.ukyi.app
  # 차트 10.0.0이 networkPolicy.create 기본을 false→true로 바꿨다 — 홈랩은 자체 netpol
  # (network-policies-prod)로 argocd 네임스페이스를 관리하므로 차트 생성 NetworkPolicy를
  # 비활성해 기존 동작을 유지한다(차트 netpol 4개가 자체 정책과 충돌/과제약하는 것 방지).
  networkPolicy:
    create: false

redis-ha:
  enabled: false

controller:
  # ARGOCD_CONTROLLER_REPLICAS env를 여기 명시하면 안 된다 — 차트가 replicas에서 같은 env를
  # 자동 생성해 k8s SSA가 중복 키로 StatefulSet 생성을 거부한다(라이브 bootstrap에서 확인).
  replicas: 1
  args:
    statusProcessors: "4"
    operationProcessors: "2"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 640Mi } # OOM-watch: 상시 ~79%(peak 464)·앱 온보딩 성장형 → 선제 상향(512→640)

repoServer:
  replicas: 1
  env:
    - name: ARGOCD_EXEC_TIMEOUT
      value: "90s"
    # KSOPS가 렌더 시점에 마운트된 Secret에서 age 키를 읽는다.
    - name: SOPS_AGE_KEY_FILE
      value: /home/argocd/.config/sops/age/keys.txt
  # ksops 바이너리 + exec 지원 kustomize를 repo-server에 설치한다.
  # ⚠️ 이 initContainer는 ksops뿐 아니라 repo-server가 쓰는 kustomize 바이너리 자체를 공급한다
  #    (/custom-tools → /usr/local/bin/kustomize subPath 마운트). KSOPS를 제거하더라도 이 컨테이너를
  #    통째로 지우면 안 된다 — kustomize(helm inflation용 --enable-helm)를 먼저 대체해야 한다.
  #    하이브리드 명료화(2026-06-15)에서 KSOPS 제거는 비목표.
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.3.3
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "installing ksops + kustomize (exec-enabled)";
          cp /usr/local/bin/ksops /custom-tools/;
          cp /usr/local/bin/kustomize /custom-tools/;
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools
  # 클러스터 내 sops-age Secret(make bootstrap이 생성)을 read-only로 마운트한다.
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age
  volumeMounts:
    - name: custom-tools
      mountPath: /usr/local/bin/kustomize
      subPath: kustomize
    - name: custom-tools
      mountPath: /usr/local/bin/ksops
      subPath: ksops
    - name: sops-age
      mountPath: /home/argocd/.config/sops/age
      readOnly: true
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 384Mi }
  # parallelismLimit는 diff 동시성을 조절한다(§5).
  extraArgs:
    - --parallelismlimit=2

server:
  replicas: 1
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }

applicationSet:
  replicas: 1
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }

notifications:
  enabled: true
  # 봇 토큰 Secret은 SealedSecret(extras)이 단독 소유 — 차트가 빈 Secret을 만들면 이중 소유 충돌(트랩).
  secret:
    create: false
  # 상주 워크로드 — 자원 limit 필수(원장 SSOT·CI 강제). Go 워크로드지만 알림 컨트롤러는 소형이라
  # GOMEMLIMIT 연동 불요(대형 Go 컨트롤러만 limit의 90%로 연동).
  resources:
    requests: { cpu: 10m, memory: 64Mi }
    limits: { memory: 128Mi }
  # cm.data로 렌더되는 notifications-engine 설정(notifiers/templates/triggers는 키명이 곧 cm.data 키명).
  # 봇 토큰은 argocd-notifications-secret(SealedSecret·extras)의 $telegram-token으로 참조 — cm엔 평문 없음.
  notifiers:
    service.telegram: |
      token: $telegram-token
  # line1 메시지 계약(3채널 공유): {글리프} <b>{제목}</b> — {상태}. parse_mode HTML(리터럴 <b>는 raw).
  templates:
    template.app-deployed: |
      message: "✅ <b>배포 완료</b> — {{.app.metadata.name}} (Healthy)"
      telegram:
        parseMode: HTML
    template.app-degraded: |
      message: "🔴 <b>앱 저하</b> — {{.app.metadata.name}} (Degraded)"
      telegram:
        parseMode: HTML
  triggers:
    trigger.on-deployed: |
      # ⚠️ 멀티소스 appset(apps)은 status.sync.revision(단수)이 비거나 불안정 → 멀티소스 호환 oncePer.
      #    최종 표현식은 Task 6.4b에서 라이브 app-prod의 status.sync.revisions(복수)로 확정/검증.
      - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
        oncePer: 'app.status.sync.revisions != nil ? join(app.status.sync.revisions, ",") : app.status.sync.revision'
        send: [app-deployed]
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [app-degraded]
  subscriptions:                       # ⚠️ YAML 리스트 — 블록 스칼라 `|` 금지(차트가 cm.data.subscriptions로 래핑; `|`면 중첩되어 무효)
    - recipients:
        - telegram:$telegram-chat-id   # $ 미해석 시 chatId 리터럴로 보정(Task 6.5)
      triggers: [on-deployed, on-health-degraded]
      selector: notify.homelab/telegram=true

dex:
  enabled: false

redis:
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 200m, memory: 64Mi } # right-size 2026-06-22: peak 26Mi, 안정 소형 캐시(2.4x 여유)

# ⚠️ configs.secret에 DATA 필드(argocdServerAdminPassword/extra/webhook 등) 추가 금지 — 추가하면 차트가
#    argocd-secret에 data 블록을 렌더해 SSA가 data.*를 소유하고, sealed-secrets 컨트롤러가 머지한
#    accounts.ukkiee.* 키를 prune할 수 있다. annotations-only는 안전(data 필드 미설정 시 data 블록 자체가
#    렌더되지 않음 — argo-helm argocd-secret.yaml로 확인). ukkiee 비밀번호는 extras의 patch-mode
#    SealedSecret이 additive로 공급한다.
configs:
  params:
    server.insecure: true # TLS는 ArgoCD가 아니라 Traefik/Tailscale에서 종단된다.
  secret:
    # argocd-secret에 patch 어노테이션을 차트 생성 시점에 부여한다. sealed-secrets(patch-mode)가 기존
    # argocd-secret에 accounts.ukkiee.password를 머지하려면 이 어노테이션이 **대상 live Secret에** 있어야 한다
    # (0.38.1 컨트롤러는 SealedSecret 템플릿이 아니라 대상 Secret의 어노테이션에서 patch 여부를 읽는다 —
    # 없으면 'already exists and is not managed by SealedSecret'로 거부해 argocd-extras가 Degraded). 차트가
    # 부여하므로 DR 콜드스타트에도 선언적으로 보장된다. managed는 쓰지 않는다 — controller ownerRef를 만들어
    # SealedSecret 삭제 시 argocd-secret 전체가 cascade delete된다(라이브 검증). patch 단독이 additive(기존 키 보존).
    annotations:
      sealedsecrets.bitnami.com/patch: "true"
  rbac:
    # ukkiee에 직접 subject 정책(p-policy)으로 전체 권한 부여. group 바인딩(g, ukkiee, role:admin)이 아니라
    # p-policy를 쓰는 이유: 추후 SSO(dex) 도입 시 동명 scope/group이 롤을 상속하는 충돌 에스컬레이션 차단(F4).
    # policy.default는 라이브 현재 미설정이며 내장 기본과 동일 — 명시화일 뿐 narrowing 아님.
    policy.default: role:readonly
    policy.csv: |
      p, ukkiee, *, *, *, allow
  cm:
    # 로컬 계정 ukkiee 활성화 — UI/CLI 비밀번호 로그인(login capability). apiKey 미부여(token 발급 불가, 의도).
    # 비밀번호(bcrypt)는 argocd-secret에 patch-mode SealedSecret로 머지(platform/argocd/extras).
    accounts.ukkiee: login
    # built-in admin 비활성화 — ukkiee 단일 어드민(F12). 노출(PR2) 전에 PR1에서 끄고 port-forward로
    # 입증해 'admin 켜진 채 노출' 윈도우를 원천 제거(F17 — same-PR은 두 Application 독립 sync라 비원자적).
    admin.enabled: "false"
    # 배포 수렴 가속 — app 변경 감지 폴링 주기를 기본 180s/현행 120s에서 30s로 단축한다.
    # ArgoCD는 내부 전용(argocd.home.ukyi.app, argocd-ui-internal 설계)이라 GitHub 웹훅(인터넷 도달
    # 필요)을 쓰지 않는다 — 노출 없이 배포 지연을 줄이는 안전한 경로가 폴링 주기 단축이다.
    # 단일 노드 부하는 statusProcessors:4 + resource.exclusions로 흡수(앱 ~10개 규모).
    timeout.reconciliation: 30s
    # 렌더 시점 kustomize 기반 복호화를 위해 KSOPS exec 플러그인을 활성화한다.
    # KSOPS(exec)와 Traefik/Tailscale HelmChartInflationGenerator(helm) 둘 다 각자의 플래그가 필요하다.
    # ⚠️ --enable-exec는 kustomize alpha 기능. ArgoCD/kustomize가 exec 플러그인을 폐기하면 KSOPS
    #    렌더가 깨진다(platform 7개 SOPS 복호화 중단). 폐기 신호 관측 시 좁게 대응(해당 시크릿만
    #    SealedSecrets 이전). 선제 마이그레이션은 비목표.
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec --enable-helm"
    # diff churn을 약 20-30% 줄인다(§5)
    resource.exclusions: |
      - apiGroups: [""]
        kinds: ["Endpoints", "Event"]
      - apiGroups: ["discovery.k8s.io"]
        kinds: ["EndpointSlice"]
