apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # matches platform/argocd/root/SYNC-WAVES.md
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # >= 1.26: required by the barman-cloud CNPG-I plugin (Task 4.1b)
    # chart: 를 쓰면 repoURL은 Helm 레지스트리여야 하고 targetRevision은 차트 semver여야 한다 —
    # git URL+태그(cnpg-v0.26.0)는 "improper constraint"로 거부됨(라이브 확인). 0.26.0 ↔ tag cnpg-v0.26.0.
    - repoURL: https://cloudnative-pg.github.io/charts
      targetRevision: 0.26.0
      chart: cloudnative-pg
      helm:
        valueFiles:
          - $values/platform/cnpg/operator/values.yaml
    - repoURL: https://github.com/ukyi-app/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
