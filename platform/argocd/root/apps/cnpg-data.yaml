apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # operator(-2) 이후, 앱 migration(+1) 이전
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/ukyi-app/homelab.git
    targetRevision: main
    path: platform/cnpg/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
