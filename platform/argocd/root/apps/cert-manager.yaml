apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3" # barman plugin(-2)보다 먼저; plugin의 webhook 인증서를 제공
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.16.5 # 버전 고정
    helm:
      parameters:
        # v1.16에서 deprecated된 `installCRDs`가 `crds.enabled`로 대체되었다.
        - name: crds.enabled
          value: "true"
        - name: crds.keep
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
