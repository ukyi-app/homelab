apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3" # barman plugin(-2)보다 먼저; plugin의 webhook 인증서를 제공
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.3 # 버전 고정
    helm:
      parameters:
        # v1.16에서 deprecated된 `installCRDs`가 `crds.enabled`로 대체되었다.
        - name: crds.enabled
          value: "true"
        - name: crds.keep
          value: "true"
        # DNS-01 self-check를 공개 resolver로 강제. 클러스터→노드 DNS 경로가 외부 권위
        # 레코드(SOA)를 신뢰성 있게 못 풀어 "Could not determine the zone ... SERVFAIL"로
        # 챌린지가 막힌다 — 1.1.1.1/8.8.8.8로 직접 조회한다.
        - name: "dns01RecursiveNameservers"
          value: "1.1.1.1:53,8.8.8.8:53"
        - name: "dns01RecursiveNameserversOnly"
          value: "true"
        # 거버넌스 캡(2026-06-22): 무제한이던 3개 control-plane 컨테이너에 메모리 limit 신설.
        # peak_ws controller 82·cainjector 77·webhook 69 → 각 128Mi(webhook은 admission 게이트라
        # 가장 보수적). cpu는 request만(throttling 회피). 원장 cert-manager 행 180→384 동반.
        - { name: resources.requests.cpu, value: "10m" }
        - { name: resources.requests.memory, value: "32Mi" }
        - { name: resources.limits.memory, value: "128Mi" }
        - { name: cainjector.resources.requests.cpu, value: "10m" }
        - { name: cainjector.resources.requests.memory, value: "32Mi" }
        - { name: cainjector.resources.limits.memory, value: "128Mi" }
        - { name: webhook.resources.requests.cpu, value: "10m" }
        - { name: webhook.resources.requests.memory, value: "24Mi" }
        - { name: webhook.resources.limits.memory, value: "128Mi" }
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
