apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-barman-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # operator(-2) + cert-manager(-3) 이후, Cluster(-1) 이전
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  # ArgoCD는 raw release-URL을 source로 쓸 수 없으므로, plugin의 고정 release manifest
  # (plugin-barman-cloud v0.13.0)를 platform/cnpg/barman-plugin/manifest.yaml에 벤더링했다.
  # 참고: 라이브 apply 전에 v0.13.0 ↔ CNPG 1.26 호환성을 확인할 것 (Task 4.1b).
  source:
    repoURL: https://github.com/ukyi-app/homelab.git
    targetRevision: main
    path: platform/cnpg/barman-plugin
    # directory.recurse=false(zero-value)를 명시하면 컨트롤러의 spec 정규화가 매번 삭제하고
    # root의 selfHeal이 되살리는 플립플롭이 된다(라이브 generation 1111 검증) — 기본값이므로 생략.
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
