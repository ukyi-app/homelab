apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-barman-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # after operator (-2) + cert-manager (-3), before the Cluster (-1)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # ArgoCD cannot source a raw release-URL, so the plugin's pinned release manifest
  # (plugin-barman-cloud v0.12.0) is VENDORED at platform/cnpg/barman-plugin/manifest.yaml.
  # NOTE: verify v0.12.0 ↔ CNPG 1.26 compatibility before the live apply (Task 4.1b).
  source:
    repoURL: https://github.com/ukyi-app/homelab.git
    targetRevision: main
    path: platform/cnpg/barman-plugin
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
