# ApplicationSet 두 개. 플랫폼 컴포넌트는 일반 kustomize 디렉토리로 렌더하고,
# 앱은 공유 Helm 차트(multi-source: 차트 + 앱별 values)를 통해 렌더한다 —
# apps/<name>/deploy/prod에는 values.yaml만 있어서 단순 directory source로는
# 아무것도 렌더되지 않기 때문(Deployment/Service/HTTPRoute/migration Job 없음).
# -------- 1) 플랫폼 컴포넌트 — 일반 git-directory generator --------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-components
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/ukyi-app/homelab.git
        revision: main
        directories:
          - path: platform/*/prod
          # 제외: argocd(자기 관리), cnpg + victoria-stack(M4/M5에서 root/apps/ 아래
          # 수동 작성 Application), charts/(라이브러리이지 앱이 아님),
          # sealed-secrets(root/apps/ 수동 Application — wave 제어 필요, 이중 소유 금지).
          - { path: platform/argocd/*, exclude: true }
          - { path: platform/cnpg/*, exclude: true }
          - { path: platform/victoria-stack/*, exclude: true }
          - { path: platform/charts/*, exclude: true }
          - { path: platform/sealed-secrets/*, exclude: true }
  template:
    metadata:
      name: '{{ index .path.segments 1 }}-{{ .path.basename }}' # <component>-prod
      labels: { homelab.env: '{{ .path.basename }}' }
    spec:
      project: default
      source:
        repoURL: https://github.com/ukyi-app/homelab.git
        targetRevision: main
        path: '{{ .path.path }}' # platform/<component>/prod — kustomization 디렉토리
        # destination.namespace 없음: 각 컴포넌트의 kustomization이 `namespace:`를
        # 직접 지정한다(gateway, edge, ...). 최초 apply는 CreateNamespace가 커버.
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
# -------- 2) 앱 — 공유 차트를 각 앱의 values로 렌더 (multi-source Helm) --------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/ukyi-app/homelab.git
        revision: main
        directories:
          - path: apps/*/deploy/prod # 배포되는 앱만 deploy/ 디렉토리를 가진다 (pg-tools는 없음)
  template:
    metadata:
      name: '{{ index .path.segments 1 }}-{{ .path.basename }}' # <app>-prod
      labels: { homelab.env: '{{ .path.basename }}' }
    spec:
      project: default
      sources:
        # source #1: 공유 deploy 차트 (앱 렌더 방식의 SSOT)
        - repoURL: https://github.com/ukyi-app/homelab.git
          targetRevision: main
          path: platform/charts/app
          helm:
            releaseName: '{{ index .path.segments 1 }}'
            valueFiles:
              - '$values/{{ .path.path }}/values.yaml'
        # source #2: 같은 repo를 $values로 노출해 차트가 앱의 values를 읽게 함
        - repoURL: https://github.com/ukyi-app/homelab.git
          targetRevision: main
          ref: values
        # source #3: 앱의 deploy 디렉토리를 KUSTOMIZE source로 렌더한다. Helm 차트(source #1)는
        # 앱의 secret을 담지 않으므로, 이것이 없으면 Deployment/migration의 envFrom secret이 누락된다.
        # 앱 시크릿 표준 경로는 create-app(v2) + SealedSecret(`<app>-secrets.sealed.yaml`을 resources:에).
        - repoURL: https://github.com/ukyi-app/homelab.git
          targetRevision: main
          path: '{{ .path.path }}' # apps/<name>/deploy/prod: kustomization.yaml + (v2) <app>-secrets.sealed.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: prod
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
