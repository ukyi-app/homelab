apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-9" # M3에서 추가
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ukyi-app/homelab.git
    targetRevision: main
    path: platform/argocd/root
    directory:
      recurse: true # appset.yaml과 root/ 아래 수동 작성 Application들(M4/M5)을 모두 포착
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ServerSideApply=true]
