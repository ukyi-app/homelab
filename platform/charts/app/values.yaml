# --- image ---
image:
  repo: "" # 예: ghcr.io/owner/api  (필수)
  tag: "" # 예: sha-<gitsha>       (필수, 불변)
  pullPolicy: IfNotPresent
# GHCR pull: 패키지는 private 유지(첫 push 기본 — 가시성 변경은 UI 전용·비가역). 클러스터는
# imagePullSecret `ghcr-pull`로 pull한다(platform/ghcr-pull/prod = prod NS dockerconfigjson
# SealedSecret, seed: .env.secrets GHCR_PULL_TOKEN → `make seal-ghcr-pull`). 인레포 앱은 전부
# prod NS라 아래 기본값으로 충분 — 패키지 public 전환 불필요.
imagePullSecrets: [{ name: ghcr-pull }]

# --- 워크로드 형태 ---
kind: web # web | worker | site
replicas: 1

# --- 공유 Gateway (Milestone 3) — 기본값, 오버라이드는 드묾 ---
gateway:
  name: homelab
  namespace: gateway

# --- resources (기본값 없음: 런타임별 메모리는 강제 온보딩 게이트) ---
resources:
  requests: { cpu: "", memory: "" } # 앱별로 반드시 설정
  limits: { cpu: "", memory: "" } # 앱별로 반드시 설정

# --- secret 배선 ---
envFrom: [] # [{secretRef: {name}}]

# --- 라우팅 (기본 internal; public은 명시적 opt-in) ---
route:
  host: "" # web|site에 필수
  paths: ["/"]
  public: false # sectionName 매핑: web-public (true) / web-internal-tls (false)

# --- homepage(gethomepage) 대시보드 자동발견 (served kind만; 기본 off) ---
homepage:
  enabled: false # true면 HTTPRoute에 gethomepage.dev/* annotation 부여 → Apps 그룹 자동 등장 + liveness 점
  name: "" # 표시 이름(기본 릴리스명)
  group: Apps # 대시보드 그룹
  icon: "" # mdi-*/si-*/dashboard-icon 파일명 (선택)

# --- probes ---
probes:
  liveness: { path: /health }
  readiness: { path: /health }

# liveness override (raw probe spec). 비면 기본: served=httpGet, **worker=liveness 없음**.
# distroless(Rust static/scratch) worker는 /bin/true가 없어 기본 liveness가 CrashLoop을 유발하므로,
# liveness가 필요한 worker는 grpc/tcpSocket 등으로 명시 오버라이드한다(기본은 안전하게 미설정).
livenessProbe: {}

# --- static(정적 파일) 서빙 추상화 ---
static:
  server: sws # sws 단일(kind=site일 때만 사용; caddy는 미구현이라 제거 — 테마2)

# --- pod 하드닝 (기본값; 오버라이드는 드묾) ---
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile: { type: RuntimeDefault }
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: ["ALL"] }

terminationGracePeriodSeconds: 30
preStopSleepSeconds: 0 # distroless 기본 안전값. /bin/sleep 있는 이미지에서 drain 지연이 필요할 때만 >0.

# SA 토큰: 앱은 차트가 RBAC를 0 부여하므로 k8s API 불요 → 토큰 미마운트. API 쓰는 앱만 true.
automountServiceAccountToken: false

# 배포 전략: 단일노드 + RWO PVC면 RollingUpdate가 두 파드의 볼륨 경합으로 교착 → 기본 Recreate.
# 멀티레플리카 stateless는 { type: RollingUpdate }로 무중단 배포 opt-in.
strategy:
  type: Recreate

# --- ports (계약) ---
ports:
  http: 8080
  metrics: 9090

# --- scrape ---
metrics:
  enabled: false # true면 service에 metrics 포트 + prometheus.io/scrape annotation 추가

# 추가 매니페스트(NetworkPolicy/ConfigMap 등)는 앱의 deploy 디렉토리(appset source#3,
# apps/<name>/deploy/prod kustomization)로. ⚠️ source#3는 별도 경로라 임의 kind 주입이 여전히
# 가능하다 — 테마2 성과는 "닫음"이 아니라 **차트가 toYaml로 임의 객체를 방출하던 무검증 백도어를
# 차트에서 제거(fail-closed)"한 것이다. source#3 자체의 kind 경계는 테마1 apps AppProject
# namespaceResourceWhitelist로 적용 중(appset이 project:apps 사용); PSA는 Pod에만.
