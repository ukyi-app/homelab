# --- image ---
image:
  repo: "" # 예: ghcr.io/owner/api  (필수)
  tag: "" # 예: sha-<gitsha>       (필수, 불변)
  pullPolicy: IfNotPresent
# GHCR pull: 기본은 빈 값 = GHCR 패키지가 PUBLIC (homelab 기본 — 익명 pull,
# 프로비저닝 불필요; repo의 패키지 가시성을 Public으로 설정). 패키지를 PRIVATE으로
# 유지하려면 [{ name: ghcr-pull }]을 설정하고, M2가 소비하는 모든 namespace(prod, database)에
# dockerconfigjson Secret `ghcr-pull`을 시드해야 한다.
imagePullSecrets: []

# --- 워크로드 형태 ---
kind: service # service | worker | static
replicas: 1

# --- 공유 Gateway (Milestone 3) — 기본값, 오버라이드는 드묾 ---
gateway:
  name: homelab
  namespace: gateway

# --- resources (기본값 없음: 런타임별 메모리는 강제 온보딩 게이트) ---
resources:
  requests: { cpu: "", memory: "" } # 앱별로 반드시 설정
  limits: { cpu: "", memory: "" } # 앱별로 반드시 설정

# --- 설정 & secret ---
env: [] # [{name, value}]
envFrom: [] # [{secretRef: {name}}]

# --- 라우팅 (기본 internal; public은 명시적 opt-in) ---
route:
  host: "" # service|static에 필수
  paths: ["/"]
  public: false # sectionName 매핑: web-public (true) / web-internal (false)

# --- homepage(gethomepage) 대시보드 자동발견 (served kind만; 기본 off) ---
homepage:
  enabled: false # true면 HTTPRoute에 gethomepage.dev/* annotation 부여 → Apps 그룹 자동 등장 + liveness 점
  name: "" # 표시 이름(기본 릴리스명)
  group: Apps # 대시보드 그룹
  icon: "" # mdi-*/si-*/dashboard-icon 파일명 (선택)

# --- 데이터베이스 / migration ---
db:
  enabled: false
  migrateCmd: ["migrate"] # 앱 이미지 내 명령; wave-1 ArgoCD Sync-hook Job이 실행

# --- probes ---
probes:
  liveness: { path: /healthz }
  readiness: { path: /readyz }

# --- static(정적 파일) 서빙 추상화 ---
static:
  server: sws # sws 단일(kind=static일 때만 사용; caddy는 미구현이라 제거 — 테마2)

# --- pod 하드닝 (기본값; 오버라이드는 드묾) ---
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile: { type: RuntimeDefault }
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: ["ALL"] }

terminationGracePeriodSeconds: 30
preStopSleepSeconds: 3

# --- ports (계약) ---
ports:
  http: 8080
  metrics: 9090

# --- scrape ---
metrics:
  enabled: true # prometheus.io/scrape annotation 추가

# 추가 매니페스트(NetworkPolicy/ConfigMap 등)는 앱의 deploy 디렉토리(appset source#3,
# apps/<name>/deploy/prod kustomization)로. ⚠️ source#3는 별도 경로라 임의 kind 주입이 여전히
# 가능하다 — 테마2 성과는 "닫음"이 아니라 **차트가 toYaml로 임의 객체를 방출하던 무검증 백도어를
# 차트에서 제거(fail-closed)"한 것이다. source#3 자체의 kind 경계는 테마1 apps AppProject
# namespaceResourceWhitelist 머지 후 적용(현 origin/main은 project:default라 미적용); PSA는 Pod에만.
