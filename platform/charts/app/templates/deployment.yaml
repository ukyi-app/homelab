{{- include "app.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.labels" . | nindent 8 }}
      annotations:
        {{- if and .Values.metrics.enabled (eq .Values.kind "web") }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.ports.metrics }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- /* checksum/secrets 등 — 봉인 시크릿 회전 시 create-app/update-secrets가
               해시를 갱신해 ArgoCD가 선언적으로 롤링한다(명령형 rollout restart 불필요) */}}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "app.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if eq .Values.kind "site" }}
          {{- if eq .Values.static.server "sws" }}
          # static-web-server (Rust): SPA fallback + 읽기 전용 root
          args: ["--port", "{{ .Values.ports.http }}", "--root", "/public", "--page-fallback", "/public/index.html", "--health"]
          {{- end }}
          {{- end }}
          {{- if include "app.isServed" . }}
          ports:
            - name: http
              containerPort: {{ .Values.ports.http }}
            {{- if and (eq .Values.kind "web") .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if include "app.isServed" . }}
          {{- $live := .Values.probes.liveness.path }}
          {{- $ready := .Values.probes.readiness.path }}
          {{- if eq .Values.kind "site" }}
          {{- /* static-web-server는 --health로 /health만 노출 */}}
          {{- $live = "/health" }}
          {{- $ready = "/health" }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- else }}
          livenessProbe:
            httpGet: { path: {{ $live }}, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          readinessProbe:
            httpGet: { path: {{ $ready }}, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- else }}
          {{- /* worker: 기본 liveness 없음(distroless /bin/true CrashLoop 방지) — 필요 시 livenessProbe override(grpc/tcpSocket) */}}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- if gt (int .Values.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "{{ .Values.preStopSleepSeconds }}"]
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
