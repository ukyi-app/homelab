apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.labels" . | nindent 8 }}
      annotations:
        {{- if and .Values.metrics.enabled (ne .Values.kind "static") }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.ports.metrics }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- /* checksum/secrets 등 — 봉인 시크릿 회전 시 create-app/update-secrets가
               해시를 갱신해 ArgoCD가 선언적으로 롤링한다(명령형 rollout restart 불필요) */}}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "app.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if eq .Values.kind "static" }}
          {{- if eq .Values.static.server "sws" }}
          # static-web-server (Rust): SPA fallback + 읽기 전용 root
          args: ["--port", "{{ .Values.ports.http }}", "--root", "/public", "--page-fallback", "/public/index.html", "--health"]
          {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ports.http }}
            {{- if ne .Values.kind "static" }}
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
            {{- end }}
          {{- if or .Values.env .Values.envFrom }}
          envFrom:
            {{- if .Values.env }}
            - configMapRef:
                name: {{ include "app.fullname" . }}-env
            {{- end }}
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if include "app.isServed" . }}
          {{- $live := .Values.probes.liveness.path }}
          {{- $ready := .Values.probes.readiness.path }}
          {{- if eq .Values.kind "static" }}
          {{- /* static-web-server는 --health로 /health만 노출 (서비스용 /healthz·/readyz 부재) */}}
          {{- $live = "/health" }}
          {{- $ready = "/health" }}
          {{- end }}
          livenessProbe:
            httpGet: { path: {{ $live }}, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: {{ $ready }}, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- else }}
          # worker: 기본 exec /bin/true (Task 4에서 livenessProbe override 추가)
          livenessProbe:
            exec: { command: ["/bin/true"] }
            periodSeconds: 30
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "{{ .Values.preStopSleepSeconds }}"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
