apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.labels" . | nindent 8 }}
      annotations:
        {{- if and .Values.metrics.enabled (eq .Values.kind "service") }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.ports.metrics }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- /* checksum/secrets л“ұ вҖ” лҙүмқё мӢңнҒ¬лҰҝ нҡҢм „ мӢң create-app/update-secretsк°Җ
               н•ҙмӢңлҘј к°ұмӢ н•ҙ ArgoCDк°Җ м„ м–ём ҒмңјлЎң лЎӨл§Ғн•ңлӢӨ(лӘ…л №нҳ• rollout restart л¶Ҳн•„мҡ”) */}}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "app.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if eq .Values.kind "static" }}
          {{- if eq .Values.static.server "sws" }}
          # static-web-server (Rust): SPA fallback + мқҪкё° м „мҡ© root
          args: ["--port", "{{ .Values.ports.http }}", "--root", "/public", "--page-fallback", "/public/index.html", "--health"]
          {{- end }}
          {{- end }}
          {{- if include "app.isServed" . }}
          ports:
            - name: http
              containerPort: {{ .Values.ports.http }}
            {{- if eq .Values.kind "service" }}
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
            {{- end }}
          {{- end }}
          {{- if or .Values.env .Values.envFrom }}
          envFrom:
            {{- if .Values.env }}
            - configMapRef:
                name: {{ include "app.fullname" . }}-env
            {{- end }}
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if include "app.isServed" . }}
          {{- $live := .Values.probes.liveness.path }}
          {{- $ready := .Values.probes.readiness.path }}
          {{- if eq .Values.kind "static" }}
          {{- /* static-web-serverлҠ” --healthлЎң /healthл§Ң л…ём¶ң (м„ңл№„мҠӨмҡ© /healthzВ·/readyz л¶Җмһ¬) */}}
          {{- $live = "/health" }}
          {{- $ready = "/health" }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- else }}
          livenessProbe:
            httpGet: { path: {{ $live }}, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          readinessProbe:
            httpGet: { path: {{ $ready }}, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- else }}
          {{- /* worker кё°ліё liveness=exec true н”Ңл ҲмқҙмҠӨнҷҖлҚ”; distrolessлҠ” livenessProbeлЎң мҳӨлІ„лқјмқҙл“ң */}}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- else }}
          livenessProbe:
            exec: { command: ["/bin/true"] }
            periodSeconds: 30
          {{- end }}
          {{- end }}
          {{- if gt (int .Values.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sleep", "{{ .Values.preStopSleepSeconds }}"]
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
