{{- if .Values.db.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "app.fullname" . }}-migrate
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    # ArgoCD-native Sync hook at wave 1 (Pass-5 Open Item #2). The hook runs in the SYNC phase
    # (NOT PreSync), so it executes AFTER the wave-0 ConfigMap/Secret exist and BEFORE the wave-2
    # Deployment, WITHIN this app's Application. A Helm pre-install/pre-upgrade hook would instead
    # run in ArgoCD's PreSync phase тАФ i.e. before wave-0 config/secrets (install) or with stale
    # config (upgrade) тАФ which is exactly the bug we are fixing here. Cross-Application DB readiness
    # is still enforced by the wait-for-db initContainer below (sync-waves don't gate across Applications).
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    # Delete the prior Job before creating the new one, so a changed migration re-applies on the next
    # sync and a previously failed Job is cleaned up first.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        app.homelab/job: migrate
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # ArgoCD sync-waves order resources WITHIN one Application; they do NOT enforce a
        # cross-Application gate, so "the cnpg-data Application is Healthy" is not guaranteed when
        # this Job runs. Make readiness self-contained: block until the DB accepts connections.
        - name: wait-for-db
          image: ghcr.io/cloudnative-pg/postgresql:16.4
          env:
            # runAsUser 65532ыКФ ьЭ┤ып╕ьзА /etc/passwdьЧР ьЧЖьЦ┤ libpqъ░А ъ╕░ы│╕ ьВмьЪйьЮРыкЕьЭД ык╗ ьаХэХ┤
            # pg_isreadyъ░А 'no attempt'(rc=3)ыбЬ ьШБьЫРэЮИ ьЛдэМиэХЬыЛд(ыЭ╝ьЭ┤ы╕М эЩХьЭ╕) тАФ ыкЕьЛЬ PGUSERыбЬ ьЪ░эЪМ.
            - { name: PGUSER, value: postgres }
          command: ["/bin/sh", "-c"]
          args:
            - |
              host="{{ .Values.db.host | default "pg-rw.database.svc" }}"
              for i in $(seq 1 60); do
                if pg_isready -h "$host" -p 5432 >/dev/null 2>&1; then echo "db ready"; exit 0; fi
                echo "waiting for $host ($i/60)"; sleep 5
              done
              echo "db not ready after 5m" >&2; exit 1
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repo }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.db.migrateCmd | nindent 12 }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            requests: { cpu: 50m, memory: {{ .Values.resources.requests.memory }} }
            limits:   { cpu: 500m, memory: {{ .Values.resources.limits.memory }} }
{{- end }}
