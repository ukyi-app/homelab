{{- if .Values.db.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "app.fullname" . }}-migrate
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    # wave 1의 ArgoCD 네이티브 Sync hook. 이 hook은 PreSync가 아니라
    # SYNC 단계에서 실행되므로, 이 앱의 Application 안에서 wave-0 ConfigMap/Secret이 생긴 뒤,
    # wave-2 Deployment보다 먼저 실행된다. Helm pre-install/pre-upgrade hook이었다면 ArgoCD의
    # PreSync 단계 — 즉 wave-0 설정/secret 이전(install)이거나 오래된 설정(upgrade) — 에서
    # 실행됐을 것이고, 그게 바로 여기서 고치려는 버그다. Application 간 DB 준비 상태는 여전히
    # 아래 wait-for-db initContainer가 강제한다(sync-wave는 Application 경계를 못 넘는다).
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    # 새 Job 생성 전에 이전 Job을 삭제 — 변경된 migration이 다음 sync에서 다시 적용되고,
    # 이전에 실패한 Job이 먼저 정리되도록 한다.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        app.homelab/job: migrate
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # ArgoCD sync-wave는 한 Application 내부의 리소스 순서만 정한다. Application 간
        # 게이트는 강제하지 않으므로 이 Job 실행 시점에 "cnpg-data Application이 Healthy"라는
        # 보장이 없다. 준비 확인을 자체 완결로: DB가 연결을 받을 때까지 블로킹한다.
        - name: wait-for-db
          image: ghcr.io/cloudnative-pg/postgresql:16.4
          env:
            # runAsUser 65532는 이미지 /etc/passwd에 없어 libpq가 기본 사용자명을 못 정해
            # pg_isready가 'no attempt'(rc=3)로 영원히 실패한다(라이브 확인) — 명시 PGUSER로 우회.
            - { name: PGUSER, value: postgres }
          command: ["/bin/sh", "-c"]
          args:
            - |
              host="{{ .Values.db.host | default "pg-rw.database.svc" }}"
              for i in $(seq 1 60); do
                if pg_isready -h "$host" -p 5432 >/dev/null 2>&1; then echo "db ready"; exit 0; fi
                echo "waiting for $host ($i/60)"; sleep 5
              done
              echo "db not ready after 5m" >&2; exit 1
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      containers:
        - name: migrate
          # Deployment와 동일 helper — migration이 다른 이미지를 실행하는 skew를 차단한다
          image: {{ include "app.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.db.migrateCmd | nindent 12 }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- range . }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            # migrate 메모리는 앱 런타임 limit과 독립 — tight 런타임 limit이 migration 도구(prisma/knex/
            # alembic류, steady-state보다 메모리 많이 씀) OOM을 유발하지 않게. 기본 256Mi, db.migrateMemory로 override.
            requests: { cpu: 50m, memory: {{ .Values.db.migrateMemory | default "256Mi" }} }
            limits:   { cpu: 500m, memory: {{ .Values.db.migrateMemory | default "256Mi" }} }
      volumes:
        # securityContext.readOnlyRootFilesystem:true라 마이그레이션 도구(prisma/knex/alembic 등)의
        # /tmp 쓰기가 EROFS로 실패한다 — deployment와 동일하게 쓰기 가능한 tmp emptyDir 제공.
        - name: tmp
          emptyDir: {}
{{- end }}
