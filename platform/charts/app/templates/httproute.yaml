{{- if include "app.isServed" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    {{- if .Values.homepage.enabled }}
    # gethomepage 자동발견(kubernetes.yaml gateway:true). metadata-only라 SSA atomic 리스트 미접촉.
    # pod-selector는 고유 라벨 app.homelab/instance(=Release.Name)로 — name 라벨은 차트명("app")이라 비고유.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: {{ .Values.homepage.name | default (include "app.fullname" .) | quote }}
    gethomepage.dev/group: {{ .Values.homepage.group | default "Apps" | quote }}
    {{- with .Values.homepage.icon }}
    gethomepage.dev/icon: {{ . | quote }}
    {{- end }}
    gethomepage.dev/pod-selector: {{ printf "app.homelab/instance=%s" (include "app.fullname" .) | quote }}
    {{- end }}
spec:
  parentRefs:
    # group/kind/weight는 CRD 기본값이지만 명시한다 — SSA diff가 atomic 리스트의 서버 주입
    # 기본값을 drift로 봐서 영구 OutOfSync가 되는 것을 막는다.
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.name }}            # 단일 공유 Gateway (Milestone 3)
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ if .Values.route.public }}web-public{{ else }}web-internal-tls{{ end }}
  hostnames:
    - {{ .Values.route.host | quote }}
  rules:
    - matches:
        {{- range .Values.route.paths }}
        - path:
            type: PathPrefix
            value: {{ . | quote }}
        {{- end }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "app.fullname" . }}
          port: {{ .Values.ports.http }}
          weight: 1
{{- end }}
