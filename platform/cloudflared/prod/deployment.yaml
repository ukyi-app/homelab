apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: edge

spec:
  replicas: 1
  selector: { matchLabels: { app: cloudflared } }
  template:
    metadata:
      labels: { app: cloudflared }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      automountServiceAccountToken: false # SA 토큰 불요(k8s API 미사용) — 토큰 탈취 표면 제거(보안 감사 SA-1)
      securityContext:
        seccompProfile:
          type: RuntimeDefault   # 표준 정합(homepage/adguard/cnpg 동형) — userspace 터널이라 RuntimeDefault 안전
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.10.1
          args: ["tunnel", "--config", "/etc/cloudflared/config.yaml", "--no-autoupdate", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom: { secretKeyRef: { name: cloudflared-tunnel, key: token } }
            - name: GOMEMLIMIT
              value: "86MiB"
          volumeMounts:
            - { name: config, mountPath: /etc/cloudflared }
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 300m, memory: 96Mi } # right-size 2026-06-22: peak 51Mi, p99 45Mi (1.89x)
          livenessProbe:
            httpGet: { path: /ready, port: 9090 }
            initialDelaySeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: cloudflared }
