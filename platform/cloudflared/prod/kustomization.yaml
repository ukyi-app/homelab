apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: edge # cloudflared-prod Application의 권위 있는(authoritative) 대상 namespace
resources:
  - deployment.yaml
  - configmap.yaml
  - networkpolicy.yaml # edge egress 격리(터널 종단점 lateral 방지) — 워크로드별 self-isolation
generators:
  - secret-generator.yaml # 이 컴포넌트 전용 KSOPS generator → cloudflared-tunnel
