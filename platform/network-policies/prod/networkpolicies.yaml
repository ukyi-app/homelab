# `prod` 앱 namespace의 east-west 격리 (Pass-5 Open Item #3).
# k3s는 번들된 kube-router 컨트롤러로 NetworkPolicy를 강제한다(--disable-network-policy를
# 절대 넘기지 않음). 양방향 default-deny 후 최소한의 명시적 allow만 추가한다.
# 가장 중요한 보안 경계 — "침해된 공개 api/ssr pod가 database/admin 계층에 닿으면 안 된다" —
# 는 여기서 EGRESS로 강제되고(앱의 egress는 DNS, database:5432, 그리고 8080의 prod 내부
# 앱 피어로만 허용), 심층 방어로 database namespace 자체의 ingress default-deny
# (platform/cnpg/prod)가 보완한다.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}            # `prod`의 모든 pod
  policyTypes: [Ingress, Egress]
  # ingress/egress 규칙 없음 => 양방향 전부 거부; 아래 allow들이 최소한만 다시 연다.
---
# Egress: CoreDNS(kube-system)로의 DNS 해석. 이것이 없으면 default-deny-egress가
# 모든 pod의 이름 해석을 망가뜨린다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Egress: 앱 → database 계층, Postgres 5432만 (PgBouncer pg-pooler-rw / Cluster pg-rw, 둘 다
# `database` namespace). 이것과 prod 내부 앱→앱(8080)을 제외하면 앱은 기본적으로 다른 egress가
# 없다; 외부/API egress가 정당하게 필요한 앱은 자체 추가 policy를 함께 배포한다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-database
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: database }
      ports:
        - { protocol: TCP, port: 5432 }
---
# Ingress: 공유 Traefik Gateway(gateway namespace) → 앱 HTTP 포트 8080. 공개/내부 서빙
# 경로이며, 모든 앱 HTTPRoute가 그 Gateway에 attach된다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-gateway
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: gateway }
      ports:
        - { protocol: TCP, port: 8080 }
---
# Ingress: vmagent(observability namespace)가 앱의 /metrics 포트 9090을 scrape한다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-metrics-from-observability
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { protocol: TCP, port: 9090 }
---
# prod 내부 앱->앱, HTTP 포트 8080: 같은 신뢰 계층에 함께 사는 앱들 간의 서버 사이드 호출
# (특히 SSR/web -> api). 이것이 없으면 default-deny가 그 호출들을 조용히 망가뜨린다.
# database 경계를 넓히지 않는다 — egress는 여전히 prod:8080(앱)으로만, database는 아님.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-prod-http
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: prod }
      ports:
        - { protocol: TCP, port: 8080 }
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: prod }
      ports:
        - { protocol: TCP, port: 8080 }
---
# Ingress: kubelet liveness/readiness probe가 HTTP 포트 8080을 친다(metrics 포트도 허용).
# default-deny-ingress 아래에서는 노드발(node-sourced) probe가 드랍되어 모든 앱이
# crash-loop에 빠진다. 소스가 노드이므로 k3s pod/cluster CIDR(기본 10.42.0.0/16)을 허용한다.
# 라이브: bring-up 시 probe 소스를 확인하고(tests/posture/network-policy.bats), k3s
# cluster-cidr이 커스텀이면 이 ipBlock을 노드의 실제 주소로 넓힐 것.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-kubelet-probes
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 9090 }
