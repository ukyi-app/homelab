# `prod` 앱 namespace의 east-west 격리.
# k3s는 번들된 kube-router 컨트롤러로 NetworkPolicy를 강제한다(--disable-network-policy를
# 절대 넘기지 않음). 양방향 default-deny 후 최소한의 명시적 allow만 추가한다.
# 가장 중요한 보안 경계 — "침해된 공개 service pod가 database/admin 계층에 닿으면 안 된다" —
# 는 여기서 EGRESS로 강제되고(앱의 egress는 DNS, database:5432, cache:6379, 그리고 8080의
# prod 내부 앱 피어로만 허용), 심층 방어로 database/cache namespace 자체의 default-deny
# (platform/cnpg/prod, platform/cache/prod)가 보완한다.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}            # `prod`의 모든 pod
  policyTypes: [Ingress, Egress]
  # ingress/egress 규칙 없음 => 양방향 전부 거부; 아래 allow들이 최소한만 다시 연다.
---
# Egress: CoreDNS(kube-system)로의 DNS 해석. 이것이 없으면 default-deny-egress가
# 모든 pod의 이름 해석을 망가뜨린다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Egress: 앱 → database 계층, Postgres 5432만 (PgBouncer pg-pooler-rw / Cluster pg-rw, 둘 다
# `database` namespace). 이것과 prod 내부 앱→앱(8080)을 제외하면 앱은 기본적으로 다른 egress가
# 없다; 외부/API egress가 정당하게 필요한 앱은 자체 추가 policy를 함께 배포한다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-database
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    # 최소권한: database namespace 전체가 아니라 pooler/cluster pod로 한정(직접 primary 우회 차단).
    # ★podSelector 라벨은 CNPG 자동생성값(poolerName=pg-pooler-rw·cluster=pg) — 변경 시 `kubectl -n database get
    #   pods --show-labels`와 대조 필수(라벨 미스 시 DB 전면 차단). namespaceSelector+podSelector는 같은 to 항목(AND).
    - to:
        # pooler(pg-pooler-rw, PgBouncer) — 앱의 권장 런타임 경로
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: database } }
          podSelector: { matchLabels: { cnpg.io/poolerName: pg-pooler-rw } }
        # cnpg 클러스터 pod(pg-rw→primary, pg-ro→replica) — CNPG 자동생성 라벨 cnpg.io/cluster=<cluster명 'pg'>
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: database } }
          podSelector: { matchLabels: { cnpg.io/cluster: pg } }
      ports:
        - { protocol: TCP, port: 5432 }
---
# Egress: 앱 → cache 계층, Valkey 6379만 (<name>.cache.svc — database 경계와 동일 클래스).
# 캐시 자격은 conn SealedSecret(cache-<name>-conn)으로만 공급되고, 대상 측은
# platform/cache/prod의 default-deny + allow-ingress-from-prod가 보완한다.
# 피어는 namespaceSelector로만 — ipBlock에 pod CIDR(10.42.0.0/16)을 넣으면
# default-deny가 무력화된다(라이브 검증 함정).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-cache
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: cache }
      ports:
        - { protocol: TCP, port: 6379 }
---
# Ingress: 공유 Traefik Gateway(gateway namespace) → 앱 HTTP 포트 8080. 공개/내부 서빙
# 경로이며, 모든 앱 HTTPRoute가 그 Gateway에 attach된다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-gateway
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: gateway }
      ports:
        - { protocol: TCP, port: 8080 }
---
# Ingress: vmagent(observability namespace)가 앱의 /metrics 포트 9090을 scrape한다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-metrics-from-observability
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { protocol: TCP, port: 9090 }
---
# prod 내부 앱->앱, HTTP 포트 8080: 같은 신뢰 계층에 함께 사는 앱들 간의 서버 사이드 호출
# (특히 SSR/web -> api). 이것이 없으면 default-deny가 그 호출들을 조용히 망가뜨린다.
# database 경계를 넓히지 않는다 — egress는 여전히 prod:8080(앱)으로만, database는 아님.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-prod-http
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: prod }
      ports:
        - { protocol: TCP, port: 8080 }
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: prod }
      ports:
        - { protocol: TCP, port: 8080 }
---
# Ingress: kubelet liveness/readiness probe가 HTTP 포트 8080을 친다.
# ⚠️ cidr는 노드(cni0=10.42.0.1/32)로만 좁힌다. 10.42.0.0/16은 "전체 파드 CIDR"이라
# 모든 파드에 8080/9090을 개방해 default-deny를 무력화한다(database 쪽과 동일 클래스).
# probe 소스는 노드(cni0)뿐이며, kube-router는 노드발 트래픽을 내장
# `fib saddr type local accept`로 정책 평가 전에 이미 허용한다 — 이 정책은
# CNI 이식성을 위한 의도 선언. 9090(metrics)은 파드발(vmagent)이라 metrics 정책이 담당.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-kubelet-probes
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.1/32
      ports:
        - { protocol: TCP, port: 8080 }
